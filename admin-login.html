<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="firebase-init.js"></script>

  <style>
    .login-container {
      max-width: 400px;
      margin: 3em auto;
      padding: 2em;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    input[type="email"], input[type="password"] {
      width: 90%;
      padding: 0.7em;
      margin: 1em 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      background-color: #228B22;
      color: white;
      padding: 0.7em 2em;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      cursor: pointer;
    }
    button:hover {
      background-color: #006400;
    }
    .error {
      color: red;
      margin-top: 1em;
    }
  </style>
</head>
<body>

<header>
  <img src="Hollidays_Lawn_Garden_Logo.png" alt="Holliday's Lawn & Garden Logo" style="max-height: 80px; margin-top: 10px;">
  <p>Admin Login</p>
</header>

<main>
  <div class="login-container fade-in">
    <h2>Admin Login</h2>

    <input type="email" id="adminEmail" placeholder="Admin Email" required><br>
    <input type="password" id="adminPassword" placeholder="Password" required><br>
    <button onclick="adminLogin()">Login</button>

    <div id="errorMessage" class="error"></div>
  </div>
</main>

<footer>
  &copy; 2025 Holliday's Lawn & Garden. All rights reserved.
</footer>

<script>
  const allowedAdmins = [
    "youradminemail@example.com" // ✅ Replace with your real admin email(s)
  ];

  function adminLogin() {
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value.trim();
    const errorMessage = document.getElementById('errorMessage');
    errorMessage.innerText = "";

    firebase.auth().signInWithEmailAndPassword(email, password)
      .then((userCredential) => {
        const user = userCredential.user;
        if (allowedAdmins.includes(user.email)) {
          window.location.href = "admin.html"; // ✅ Send to Admin Dashboard
        } else {
          firebase.auth().signOut();
          errorMessage.innerText = "Access Denied: Not an authorized admin.";
        }
      })
      .catch((error) => {
        console.error(error);
        errorMessage.innerText = error.message;
      });
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.fade-in').forEach(section => {
    observer.observe(section);
  });
</script>

</body>
</html>
