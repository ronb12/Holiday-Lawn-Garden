<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Holiday Lawn & Garden</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="firebase-init.js"></script>
</head>
<body>

  <header>
    <img src="Hollidays_Lawn_Garden_Logo.png" alt="Holliday's Lawn & Garden Logo" style="max-height: 80px; margin-top: 10px;">
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="gallery.html">Gallery</a>
      <a href="login.html">Login</a>
    </nav>
    <p>Reset Your Password</p>
  </header>

  <main>
    <div class="login-container fade-in">
      <h2>Reset Password</h2>
      <input type="email" id="resetEmail" placeholder="Enter your email" required><br>
      <button onclick="resetPassword()">Send Reset Email</button>
    </div>
  </main>

  <footer>
    &copy; 2025 Holiday Lawn & Garden. All rights reserved.
  </footer>

  <script>
    function resetPassword() {
      const email = document.getElementById('resetEmail').value;

      firebase.auth().sendPasswordResetEmail(email)
        .then(() => {
          alert("Password reset email sent! Please check your inbox.");
          window.location.href = "login.html";
        })
        .catch((error) => {
          alert(error.message);
        });
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in').forEach(section => {
      observer.observe(section);
    });
  </script>

</body>
</html>
