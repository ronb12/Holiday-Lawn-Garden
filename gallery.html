<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <style>
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5em;
      padding: 2em;
    }
    .gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }
    .gallery img:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <header>
    <h1>Holliday's Lawn & Garden</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="pay-your-bill.html">Pay Your Bill</a>
      <a href="gallery.html">Gallery</a> <!-- ✅ New tab -->
    </nav>
  </header>

  <main>
    <h2>Gallery</h2>
    <p>Take a look at some of our recent projects!</p>

    <div class="gallery">
      <img src="https://via.placeholder.com/400x300?text=Project+1" alt="Lawn Project 1">
      <img src="https://via.placeholder.com/400x300?text=Project+2" alt="Lawn Project 2">
      <img src="https://via.placeholder.com/400x300?text=Landscape+Design" alt="Landscape Design">
      <img src="https://via.placeholder.com/400x300?text=Seasonal+Cleanup" alt="Seasonal Cleanup">
      <img src="https://via.placeholder.com/400x300?text=Mulching" alt="Mulching">
      <img src="https://via.placeholder.com/400x300?text=Commercial+Lawn+Care" alt="Commercial Lawn Care">
    </div>
  </main>

  <footer>
    &copy; 2025 Holliday's Lawn & Garden. All rights reserved.
  </footer>

</body>
</html>
