<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .success-container {
      max-width: 600px;
      margin: 5em auto;
      padding: 2em;
      background: white;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .success-container h1 {
      color: #228B22;
      margin-bottom: 20px;
    }
    .success-container p {
      font-size: 1.2em;
      margin-bottom: 30px;
    }
    .btn {
      background-color: #228B22;
      color: white;
      padding: 0.7em 2em;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      text-decoration: none;
      display: inline-block;
      margin-top: 10px;
    }
    .btn:hover {
      background-color: #006400;
    }
  </style>

</head>
<body>

<header>
  <img src="Hollidays_Lawn_Garden_Logo.png" alt="Holliday's Lawn & Garden Logo" style="max-height: 80px; margin-top: 10px;">
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="gallery.html">Gallery</a>
  </nav>
</header>

<main>
  <div class="success-container fade-in">
    <h1>✅ Payment Successful!</h1>
    <p>Thank you for your payment.<br> We have received your invoice payment and your service is scheduled as promised.</p>
    <a href="dashboard.html" class="btn">Return to Dashboard</a>
  </div>
</main>

<footer>
  &copy; 2025 Holliday's Lawn & Garden. All rights reserved.
</footer>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.fade-in').forEach(section => {
    observer.observe(section);
  });
</script>

</body>
</html>
