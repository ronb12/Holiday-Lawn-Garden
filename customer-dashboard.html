
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Dashboard - Holliday's Lawn & Garden</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.paypal.com/sdk/js?client-id=test&currency=USD"></script>
  <script src="firebase-init.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f9f4; margin: 0; padding: 1em; }
    h1, h2 { color: #228B22; }
    table { width: 100%; border-collapse: collapse; margin-top: 1em; }
    th, td { border: 1px solid #ccc; padding: 0.75em; text-align: left; }
    th { background: #228B22; color: white; }
    input, textarea { width: 100%; padding: 0.5em; margin-top: 0.5em; }
    button { background: #228B22; color: white; padding: 0.5em 1em; border: none; margin-top: 1em; cursor: pointer; }
    button:hover { background: #1a6b1a; }
  </style>
</head>
<body>
  <h1>Welcome to Your Dashboard</h1>

  <h2>New Service Request</h2>
  <form id="requestForm">
    <input type="text" id="fullName" placeholder="Your Name" required><br>
    <input type="email" id="email" placeholder="Your Email" required><br>
    <textarea id="message" rows="4" placeholder="Describe your request..." required></textarea><br>
    <button type="submit">Send Request</button>
  </form>

  <h2>Your Quotes</h2>
  <table id="quotesTable">
    <thead><tr><th>Service</th><th>Amount</th><th>Action</th></tr></thead>
    <tbody><tr><td colspan="3">Loading...</td></tr></tbody>
  </table>

  <h2>Your Invoices</h2>
  <table id="invoicesTable">
    <thead><tr><th>Service</th><th>Amount</th><th>Status</th><th>Pay</th></tr></thead>
    <tbody><tr><td colspan="4">Loading...</td></tr></tbody>
  </table>

  <div id="paypal-button-container"></div>

  <script>
    const db = firebase.firestore();
    let currentUserEmail = "";

    firebase.auth().onAuthStateChanged(user => {
      if (user) {
        currentUserEmail = user.email;
        loadQuotes();
        loadInvoices();
      } else {
        window.location.href = "login.html";
      }
    });

    function loadQuotes() {
      const tbody = document.querySelector("#quotesTable tbody");
      db.collection("quotes").where("email", "==", currentUserEmail).onSnapshot(snapshot => {
        tbody.innerHTML = "";
        snapshot.forEach(doc => {
          const q = doc.data();
          const row = document.createElement("tr");
          row.innerHTML = \`
            <td>\${q.service}</td>
            <td>$\${q.amount.toFixed(2)}</td>
            <td><button onclick="approveQuote('\${doc.id}', \${q.amount}, '\${q.service}')">Approve</button></td>
          \`;
          tbody.appendChild(row);
        });
      });
    }

    function approveQuote(quoteId, amount, service) {
      db.collection("quotes").doc(quoteId).get().then(doc => {
        const q = doc.data();
        return db.collection("invoices").add({
          name: q.name,
          customerEmail: q.email,
          service,
          amount,
          paid: false,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }).then(() => {
        alert("✅ Quote approved and invoice generated.");
      });
    }

    function loadInvoices() {
      const tbody = document.querySelector("#invoicesTable tbody");
      db.collection("invoices").where("customerEmail", "==", currentUserEmail).onSnapshot(snapshot => {
        tbody.innerHTML = "";
        snapshot.forEach(doc => {
          const inv = doc.data();
          const row = document.createElement("tr");
          row.innerHTML = \`
            <td>\${inv.service}</td>
            <td>$\${inv.amount.toFixed(2)}</td>
            <td>\${inv.paid ? "✅ Paid" : "❌ Unpaid"}</td>
            <td>\${inv.paid ? "" : "<div id='paypal-button-" + doc.id + "'></div>"}</td>
          \`;
          tbody.appendChild(row);
          if (!inv.paid) {
            renderPayPalButton(doc.id, inv.amount);
          }
        });
      });
    }

    function renderPayPalButton(invoiceId, amount) {
      paypal.Buttons({
        createOrder: function(data, actions) {
          return actions.order.create({
            purchase_units: [{ amount: { value: amount.toFixed(2) } }]
          });
        },
        onApprove: function(data, actions) {
          return actions.order.capture().then(() => {
            db.collection("invoices").doc(invoiceId).update({ paid: true });
            alert("✅ Payment completed!");
          });
        }
      }).render("#paypal-button-" + invoiceId);
    }

    document.getElementById("requestForm").addEventListener("submit", async e => {
      e.preventDefault();
      const data = {
        fullName: fullName.value,
        email: email.value,
        notes: message.value,
        serviceType: "Customer Submission",
        submittedAt: new Date(),
        adminRead: false,
        hasUnreadFromCustomer: true
      };
      await db.collection("service_requests").add(data);
      alert("✅ Request sent!");
      requestForm.reset();
    });
  </script>
</body>
</html>
