<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.paypal.com/sdk/js?client-id=test&currency=USD"></script>
  <script src="firebase-init.js"></script>
  <style>
    body { font-family: Arial; padding: 1em; background: #f4f9f4; }
    h1, h2 { color: #228B22; }
    input, textarea, button, select {
      width: 100%; margin: 0.5em 0; padding: 0.5em;
    }
    table { width: 100%; margin-top: 1em; border-collapse: collapse; }
    th, td { padding: 0.5em; border: 1px solid #ccc; }
    th { background: #228B22; color: white; }
    .paypal-button-container { margin-top: 0.5em; }
  </style>
</head>
<body>
<h1>Welcome to Your Dashboard</h1>

<h2>New Service Request</h2>
<form id="requestForm">
  <input type="text" id="fullName" placeholder="Full Name" required />
  <input type="email" id="email" placeholder="Email" required />
  <textarea id="message" placeholder="Describe your request..." required></textarea>
  <button type="submit">Submit Request</button>
</form>

<h2>Your Quotes</h2>
<table id="quotesTable"><thead>
  <tr><th>Service</th><th>Amount</th><th>Status</th></tr></thead><tbody></tbody>
</table>

<h2>Your Invoices</h2>
<table id="invoicesTable"><thead>
  <tr><th>Service</th><th>Amount</th><th>Status</th><th>Pay</th></tr></thead><tbody></tbody>
</table>

<script>
const db = firebase.firestore();
let currentUser = null;

firebase.auth().onAuthStateChanged(user => {
  if (!user) return location.href = "login.html";
  currentUser = user;
  loadQuotes();
  loadInvoices();
});

document.getElementById("requestForm").addEventListener("submit", async e => {
  e.preventDefault();
  await db.collection("service_requests").add({
    fullName: fullName.value, email: email.value,
    notes: message.value, submittedAt: new Date(),
    hasUnreadFromCustomer: true, adminRead: false
  });
  alert("Request sent!");
  e.target.reset();
});

function loadQuotes() {
  const tbody = document.querySelector("#quotesTable tbody");
  db.collection("quotes").where("email", "==", currentUser.email).onSnapshot(snapshot => {
    tbody.innerHTML = "";
    snapshot.forEach(doc => {
      const q = doc.data();
      tbody.innerHTML += `<tr>
        <td>${q.service}</td><td>$${q.amount.toFixed(2)}</td><td>${q.status || 'pending'}</td>
      </tr>`;
    });
  });
}

function loadInvoices() {
  const tbody = document.querySelector("#invoicesTable tbody");
  db.collection("invoices").where("customerEmail", "==", currentUser.email).onSnapshot(snapshot => {
    tbody.innerHTML = "";
    snapshot.forEach(doc => {
      const i = doc.data();
      const id = doc.id;
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${i.service}</td>
        <td>$${i.amount.toFixed(2)}</td>
        <td>${i.paid ? "✅ Paid" : "❌ Unpaid"}</td>
        <td><div id="paypal-${id}" class="paypal-button-container"></div></td>`;
      tbody.appendChild(row);
      if (!i.paid) renderPaypal(id, i.amount);
    });
  });
}

function renderPaypal(invoiceId, amount) {
  paypal.Buttons({
    createOrder: (data, actions) => actions.order.create({
      purchase_units: [{ amount: { value: amount.toFixed(2) } }]
    }),
    onApprove: (data, actions) => actions.order.capture().then(() => {
      db.collection("invoices").doc(invoiceId).update({ paid: true });
      alert("Payment successful!");
    })
  }).render(`#paypal-${invoiceId}`);
}
</script>
</body>
</html>
