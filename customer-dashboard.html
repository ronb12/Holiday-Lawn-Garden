<!-- CUSTOMER DASHBOARD WITH UPDATED PROFILE STRUCTURE -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Dashboard - Holliday's Lawn & Garden</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
  <style>
    body { font-family: Arial; padding: 1em; background: #f4f9f4; }
    h1, h2 { color: #228B22; }
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .profile-toggle { font-size: 20px; cursor: pointer; }
    .logout-btn {
      background: #228B22; color: white; border: none;
      padding: 6px 12px; border-radius: 6px; cursor: pointer;
    }
    #profileModal, #modalOverlay {
      display: none; position: fixed; z-index: 1000;
    }
    #modalOverlay {
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 999;
    }
    #profileModal {
      top: 10%; left: 50%; transform: translateX(-50%);
      background: white; padding: 1em; border-radius: 8px;
      width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    label { font-weight: bold; margin-top: 0.5em; display: block; }
    input { width: 100%; margin-top: 0.25em; padding: 0.5em; }
    button { margin-top: 1em; }
  </style>
</head>
<body>

<div class="header-bar">
  <h1>Welcome to Your Dashboard</h1>
  <div>
    <span class="profile-toggle" onclick="toggleProfileModal()">👤</span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<!-- Profile Modal -->
<div id="modalOverlay" onclick="toggleProfileModal()"></div>
<div id="profileModal">
  <div>
    <label>Name:</label><div id="displayName">-</div>
    <label>Email:</label><div id="displayEmail">-</div>
    <label>Phone:</label><div id="displayPhone">-</div>
    <label>Address:</label>
    <div id="displayStreet">-</div>
    <div><span id="displayCity">-</span>, <span id="displayState">-</span> <span id="displayZip">-</span></div>
  </div>
  <hr>
  <form id="editProfileForm">
    <input id="editName" placeholder="Full Name" required />
    <input id="editEmail" placeholder="Email" required />
    <input id="editPhone" placeholder="Phone Number" />
    <input id="editStreet" placeholder="Street Address" />
    <input id="editCity" placeholder="City" />
    <input id="editState" placeholder="State" />
    <input id="editZip" placeholder="ZIP Code" />
    <button type="submit">Save Profile</button>
  </form>
</div>

<script>
const db = firebase.firestore();
let currentUser = null;

firebase.auth().onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    loadProfile();
  } else {
    window.location.href = "login.html";
  }
});

function logout() {
  firebase.auth().signOut();
}

function toggleProfileModal() {
  const modal = document.getElementById("profileModal");
  const overlay = document.getElementById("modalOverlay");
  const show = modal.style.display !== "block";
  modal.style.display = show ? "block" : "none";
  overlay.style.display = show ? "block" : "none";
}

function loadProfile() {
  db.collection("profiles").doc(currentUser.uid).get().then(doc => {
    const d = doc.exists ? doc.data() : {};
    const a = d.address || {};
    document.getElementById("displayName").innerText = d.name || "-";
    document.getElementById("displayEmail").innerText = d.email || currentUser.email;
    document.getElementById("displayPhone").innerText = d.phone || "-";
    document.getElementById("displayStreet").innerText = a.street || "-";
    document.getElementById("displayCity").innerText = a.city || "-";
    document.getElementById("displayState").innerText = a.state || "-";
    document.getElementById("displayZip").innerText = a.zip || "-";

    document.getElementById("editName").value = d.name || "";
    document.getElementById("editEmail").value = d.email || currentUser.email;
    document.getElementById("editPhone").value = d.phone || "";
    document.getElementById("editStreet").value = a.street || "";
    document.getElementById("editCity").value = a.city || "";
    document.getElementById("editState").value = a.state || "";
    document.getElementById("editZip").value = a.zip || "";
  });
}

document.getElementById("editProfileForm").addEventListener("submit", async e => {
  e.preventDefault();
  const profile = {
    name: document.getElementById("editName").value,
    email: document.getElementById("editEmail").value,
    phone: document.getElementById("editPhone").value,
    address: {
      street: document.getElementById("editStreet").value,
      city: document.getElementById("editCity").value,
      state: document.getElementById("editState").value,
      zip: document.getElementById("editZip").value
    }
  };
  await db.collection("profiles").doc(currentUser.uid).set(profile, { merge: true });
  alert("✅ Profile updated!");
  toggleProfileModal();
  loadProfile();
});
</script>
</body>
</html>
