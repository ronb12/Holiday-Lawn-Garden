<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Dashboard - Holiday Lawn & Garden</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="firebase-init.js"></script>
  <style>
    body { background: #f4f9f4; font-family: Arial, sans-serif; margin: 0; }
    header { background-color: #228B22; padding: 1em; color: white; text-align: center; }
    main { max-width: 800px; margin: 3em auto; background: white; padding: 2em; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
    button {
      background-color: #228B22;
      color: white;
      padding: 0.7em 2em;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      cursor: pointer;
      margin-top: 2em;
    }
    button:hover { background-color: #006400; }
  </style>
</head>
<body>

<header>
  <h1>Welcome to Your Dashboard</h1>
</header>

<main>
  <h2>Hello, Customer!</h2>
  <p>Thank you for choosing Holiday Lawn & Garden.</p>
  <p>Our team will be in contact with you shortly regarding your service requests.</p>

  <button onclick="logout()">Logout</button>
</main>

<footer>
  <p style="text-align: center; margin-top: 2em;">&copy; 2025 Holiday Lawn & Garden</p>
</footer>

<script>
function logout() {
  firebase.auth().signOut().then(() => {
    window.location.href = "login.html";
  }).catch((error) => {
    console.error("Logout error:", error);
  });
}
</script>

</body>
</html>
