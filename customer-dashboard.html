<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Customer Dashboard - Holliday's Lawn & Garden</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
  <style>
    body { background: #f4f9f4; font-family: Arial; margin: 0; }
    header, footer { background-color: #228B22; color: white; padding: 1em; text-align: center; }
    .container { max-width: 1000px; margin: 2em auto; background: white; padding: 2em; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    table { width: 100%; border-collapse: collapse; margin-bottom: 2em; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    th { background: #228B22; color: white; }
    button { background: #228B22; color: white; padding: 0.5em 1em; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #006400; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
    .modal-content { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 600px; }
    .close { float: right; font-size: 24px; cursor: pointer; }
    .avatar { width: 100px; border-radius: 50%; margin-bottom: 10px; }
    #profileBtn { float: right; margin: -2.5em 1em 1em 0; background: transparent; border: none; font-size: 24px; cursor: pointer; }
  </style>
</head>
<body>

<header>
  <h1>Your Dashboard</h1>
  <button id="profileBtn" onclick="openProfile()">👤</button>
</header>

<div class="container">
  <h2 id="greeting">Welcome!</h2>

  <h3>Submit a Service Request</h3>
  <form onsubmit="submitRequest(event)">
    <label>Service Type:</label>
    <select id="serviceType" required>
      <option value="">Select</option>
      <option>Lawn Mowing</option>
      <option>Hedge Trimming</option>
      <option>Leaf Cleanup</option>
      <option>Other</option>
    </select>
    <label>Preferred Date:</label>
    <input type="date" id="preferredDate" required>
    <label>Notes:</label>
    <textarea id="requestNotes" placeholder="Any additional notes..."></textarea>
    <label>Street:</label><input type="text" id="street" required>
    <label>City:</label><input type="text" id="city" required>
    <label>State:</label><input type="text" id="state" required>
    <label>ZIP:</label><input type="text" id="zip" required>
    <button type="submit">Submit Request</button>
  </form>

  <h3>Your Requests</h3>
  <table id="requestsTable">
    <thead><tr><th>Service</th><th>Date</th><th>Status</th><th>Address</th><th>Action</th></tr></thead>
    <tbody><tr><td colspan="5">Loading...</td></tr></tbody>
  </table>

  <h3>Your Quotes</h3>
  <table id="quotesTable">
    <thead><tr><th>Description</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
    <tbody><tr><td colspan="4">Loading...</td></tr></tbody>
  </table>

  <h3>Your Invoices</h3>
  <table id="invoicesTable">
    <thead><tr><th>Invoice #</th><th>Due Date</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
    <tbody><tr><td colspan="5">Loading...</td></tr></tbody>
  </table>

  <br><button onclick="logout()">Logout</button>
</div>

<!-- Modals -->
<div id="invoiceModal" class="modal" onclick="closeModal(event)">
  <div class="modal-content">
    <span class="close" onclick="closeModal(event)">&times;</span>
    <h2>Invoice Receipt</h2>
    <div id="invoiceDetails"></div>
    <div style="text-align:center;margin-top:20px;">
      <button onclick="window.print()">🖨️ Print Receipt</button>
    </div>
  </div>
</div>

<!-- Profile Modal -->
<div id="profileModal" class="modal" onclick="closeModal(event)">
  <div class="modal-content">
    <span class="close" onclick="closeModal(event)">&times;</span>
    <h2>Your Profile</h2>
    <div style="text-align:center;">
      <img id="avatarImg" src="assets/default-avatar.png" alt="Avatar" class="avatar">
      <br><input type="file" id="avatarUpload" accept="image/*" onchange="previewAvatar(event)">
    </div>
    <label>Full Name:</label><input type="text" id="fullName">
    <label>Street:</label><input type="text" id="profileStreet">
    <label>City:</label><input type="text" id="profileCity">
    <label>State:</label><input type="text" id="profileState">
    <label>ZIP:</label><input type="text" id="profileZip">
    <button onclick="saveProfile()">💾 Save</button>
  </div>
</div>
<footer>&copy; 2025 Holliday's Lawn & Garden</footer>

<script>
const db = firebase.firestore();
let currentUser;
let userProfile = {};

firebase.auth().onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.getElementById("greeting").innerText = `Welcome, ${user.email}`;
    loadUserProfile();
    loadRequests();
    loadQuotes();
    loadInvoices();
  } else {
    window.location.href = "login.html";
  }
});

function loadUserProfile() {
  db.collection("profiles").doc(currentUser.uid).get().then(doc => {
    if (doc.exists) {
      userProfile = doc.data();
      document.getElementById("street").value = userProfile.street || "";
      document.getElementById("city").value = userProfile.city || "";
      document.getElementById("state").value = userProfile.state || "";
      document.getElementById("zip").value = userProfile.zip || "";

      document.getElementById("fullName").value = userProfile.fullName || "";
      document.getElementById("profileStreet").value = userProfile.street || "";
      document.getElementById("profileCity").value = userProfile.city || "";
      document.getElementById("profileState").value = userProfile.state || "";
      document.getElementById("profileZip").value = userProfile.zip || "";

      if (userProfile.avatarURL) {
        document.getElementById("avatarImg").src = userProfile.avatarURL;
      }
    }
  });
}

function saveProfile() {
  const updated = {
    fullName: document.getElementById("fullName").value,
    street: document.getElementById("profileStreet").value,
    city: document.getElementById("profileCity").value,
    state: document.getElementById("profileState").value,
    zip: document.getElementById("profileZip").value
  };

  db.collection("profiles").doc(currentUser.uid).set(updated).then(() => {
    alert("✅ Profile updated");
    loadUserProfile();
    closeModal({ target: { classList: ['modal'] } });
  });
}

function previewAvatar(event) {
  const img = document.getElementById("avatarImg");
  const file = event.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = e => {
      img.src = e.target.result;
      db.collection("profiles").doc(currentUser.uid).set({ avatarURL: e.target.result }, { merge: true });
    };
    reader.readAsDataURL(file);
  }
}

function submitRequest(e) {
  e.preventDefault();
  const data = {
    fullName: userProfile.fullName || "",
    email: currentUser.email,
    serviceType: document.getElementById("serviceType").value,
    preferredDate: document.getElementById("preferredDate").value,
    notes: document.getElementById("requestNotes").value,
    street: document.getElementById("street").value,
    city: document.getElementById("city").value,
    state: document.getElementById("state").value,
    zip: document.getElementById("zip").value,
    status: "Pending",
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  };
  db.collection("service_requests").add(data).then(() => {
    alert("✅ Request submitted.");
    e.target.reset();
    loadRequests();
  });
}

function loadRequests() {
  const tbody = document.querySelector("#requestsTable tbody");
  db.collection("service_requests").where("email", "==", currentUser.email).orderBy("timestamp", "desc").get()
    .then(snapshot => {
      tbody.innerHTML = "";
      if (snapshot.empty) return tbody.innerHTML = "<tr><td colspan='5'>No requests yet</td></tr>";
      snapshot.forEach(doc => {
        const r = doc.data();
        const address = `${r.street}, ${r.city}, ${r.state} ${r.zip}`;
        const date = r.preferredDate ? new Date(r.preferredDate).toLocaleDateString() : "N/A";
        tbody.innerHTML += `
          <tr>
            <td>${r.serviceType}</td>
            <td>${date}</td>
            <td>${r.status}</td>
            <td>${address}</td>
            <td><button onclick="deleteRequest('${doc.id}')">❌</button></td>
          </tr>`;
      });
    });
}

function deleteRequest(id) {
  if (confirm("Delete this request?")) {
    db.collection("service_requests").doc(id).delete().then(loadRequests);
  }
}

function loadQuotes() {
  const tbody = document.querySelector("#quotesTable tbody");
  db.collection("quotes").where("email", "==", currentUser.email).orderBy("createdAt", "desc").get().then(snapshot => {
    tbody.innerHTML = "";
    if (snapshot.empty) return tbody.innerHTML = "<tr><td colspan='4'>No quotes found</td></tr>";
    snapshot.forEach(doc => {
      const q = doc.data();
      const accepted = q.status === "Accepted";
      tbody.innerHTML += `
        <tr>
          <td>${q.quote}</td>
          <td>$${parseFloat(q.amount || 0).toFixed(2)}</td>
          <td>${q.status || "Pending"}</td>
          <td>${!accepted ? `<button onclick="acceptQuote('${doc.id}')">Accept</button>` : "Accepted"}</td>
        </tr>`;
    });
  });
}

function acceptQuote(id) {
  db.collection("quotes").doc(id).update({ status: "Accepted" }).then(() => {
    alert("✅ Quote accepted!");
    loadQuotes();
  });
}

function loadInvoices() {
  const tbody = document.querySelector("#invoicesTable tbody");
  db.collection("invoices").where("customerEmail", "==", currentUser.email).orderBy("dueDate", "asc").get().then(snapshot => {
    tbody.innerHTML = "";
    if (snapshot.empty) return tbody.innerHTML = "<tr><td colspan='5'>No invoices found</td></tr>";
    snapshot.forEach(doc => {
      const d = doc.data();
      tbody.innerHTML += `
        <tr>
          <td>${d.invoiceNumber}</td>
          <td>${new Date(d.dueDate).toLocaleDateString()}</td>
          <td>$${d.amountDue.toFixed(2)}</td>
          <td>${d.paid ? "Paid" : "Unpaid"}</td>
          <td>${d.paid ? `<button onclick='viewInvoice(${JSON.stringify(d)})'>Receipt</button>` : "-"}</td>
        </tr>`;
    });
  });
}

function viewInvoice(data) {
  const address = `${data.street || ''}, ${data.city || ''}, ${data.state || ''} ${data.zip || ''}`;
  const html = `
    <p><strong>Invoice #:</strong> ${data.invoiceNumber}</p>
    <p><strong>Due Date:</strong> ${new Date(data.dueDate).toLocaleDateString()}</p>
    <p><strong>Amount Paid:</strong> $${data.amountDue.toFixed(2)}</p>
    <hr>
    <p><strong>Services:</strong></p>
    <ul>${(data.services || []).map(s => `<li>${s.description} - $${s.amount.toFixed(2)}</li>`).join("")}</ul>
    <hr>
    <p><strong>Billing Address:</strong> ${address}</p>
    <p><strong>Status:</strong> Paid</p>
    <p style="text-align:center;">Thank you for your business!</p>
  `;
  document.getElementById("invoiceDetails").innerHTML = html;
  document.getElementById("invoiceModal").style.display = "flex";
}

function openProfile() {
  document.getElementById("profileModal").style.display = "flex";
}

function closeModal(e) {
  if (e.target.classList.contains("modal") || e.target.classList.contains("close")) {
    document.getElementById("invoiceModal").style.display = "none";
    document.getElementById("profileModal").style.display = "none";
  }
}

function logout() {
  firebase.auth().signOut().then(() => location.href = "login.html");
}
</script>
</body>
</html>
