<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Customer Dashboard - Holliday's Lawn & Garden</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
  <script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=USD"></script>
  <style>
    body { font-family: Arial; background: #f4f9f4; margin: 0; }
    header, footer { background: #228B22; color: white; padding: 1em; text-align: center; }
    .container { max-width: 1000px; margin: 2em auto; background: white; padding: 2em; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    table { width: 100%; border-collapse: collapse; margin-bottom: 2em; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    th { background: #228B22; color: white; }
    button { background: #228B22; color: white; padding: 0.5em 1em; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #006400; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
    .modal-content { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 600px; }
    .close { float: right; font-size: 24px; cursor: pointer; }
    .paypal-button-container { margin-top: 20px; }
  </style>
</head>
<body>
<header>
  <h1>Your Dashboard</h1>
</header>
<div class="container">
  <h2 id="greeting">Welcome!</h2>

  <h3>Your Invoices</h3>
  <table id="invoicesTable">
    <thead>
      <tr><th>Invoice #</th><th>Due Date</th><th>Amount</th><th>Status</th><th>Action</th></tr>
    </thead>
    <tbody><tr><td colspan="5">Loading...</td></tr></tbody>
  </table>

  <div id="paypalModal" class="modal" onclick="closeModal(event)">
    <div class="modal-content">
      <span class="close" onclick="closeModal(event)">&times;</span>
      <h2>Pay Invoice</h2>
      <div id="paypalButtons"></div>
    </div>
  </div>

  <br><button onclick="logout()">Logout</button>
</div>

<footer>&copy; 2025 Holliday's Lawn & Garden</footer>
<script>
const db = firebase.firestore();
let currentUser;
let selectedInvoice = null;

firebase.auth().onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.getElementById("greeting").innerText = `Welcome, ${user.email}`;
    loadInvoices();
  } else {
    window.location.href = "login.html";
  }
});

function loadInvoices() {
  const tbody = document.querySelector("#invoicesTable tbody");
  db.collection("invoices").where("customerEmail", "==", currentUser.email).orderBy("dueDate", "asc").get()
    .then(snapshot => {
      tbody.innerHTML = "";
      if (snapshot.empty) return tbody.innerHTML = "<tr><td colspan='5'>No invoices found</td></tr>";
      snapshot.forEach(doc => {
        const d = doc.data();
        const actionBtn = d.paid ? "Paid" : `<button onclick="initiatePay('${doc.id}', ${d.amountDue})">Pay Now</button>`;
        tbody.innerHTML += `
          <tr>
            <td>${d.invoiceNumber}</td>
            <td>${new Date(d.dueDate).toLocaleDateString()}</td>
            <td>$${d.amountDue.toFixed(2)}</td>
            <td>${d.paid ? "Paid" : "Unpaid"}</td>
            <td>${actionBtn}</td>
          </tr>`;
      });
    });
}

function initiatePay(invoiceId, amount) {
  selectedInvoice = invoiceId;
  document.getElementById("paypalModal").style.display = "flex";
  renderPayPal(amount);
}

function renderPayPal(amount) {
  document.getElementById("paypalButtons").innerHTML = ""; // Clear previous buttons
  paypal.Buttons({
    createOrder: function(data, actions) {
      return actions.order.create({
        purchase_units: [{
          amount: {
            value: amount.toFixed(2)
          }
        }]
      });
    },
    onApprove: function(data, actions) {
      return actions.order.capture().then(function(details) {
        db.collection("invoices").doc(selectedInvoice).update({ paid: true }).then(() => {
          alert("✅ Payment successful!");
          document.getElementById("paypalModal").style.display = "none";
          loadInvoices();
        });
      });
    }
  }).render('#paypalButtons');
}

function closeModal(e) {
  if (e.target.classList.contains("modal") || e.target.classList.contains("close")) {
    document.getElementById("paypalModal").style.display = "none";
  }
}

function logout() {
  firebase.auth().signOut().then(() => location.href = "login.html");
}
</script>
</body>
</html>
