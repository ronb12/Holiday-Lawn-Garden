<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Dashboard - Holliday's Lawn & Garden</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f9f4; margin: 0; padding: 1em; }
    h1, h2 { color: #228B22; }
    table { width: 100%; border-collapse: collapse; margin-top: 1em; }
    th, td { border: 1px solid #ccc; padding: 0.75em; text-align: left; }
    th { background: #228B22; color: white; }
    input, textarea { width: 100%; padding: 0.5em; margin-top: 0.5em; }
    button { background: #228B22; color: white; padding: 0.5em 1em; border: none; margin-top: 1em; cursor: pointer; }
    button:hover { background: #1a6b1a; }
  </style>
</head>
<body>

  <h1>Welcome to Your Dashboard</h1>

  <!-- New Request Form -->
  <h2>New Service Request</h2>
  <form id="requestForm">
    <input type="text" id="fullName" placeholder="Your Name" required><br>
    <input type="email" id="email" placeholder="Your Email" required><br>
    <input type="text" id="phone" placeholder="Phone Number"><br>
    <textarea id="message" rows="4" placeholder="Describe your request..." required></textarea><br>
    <button type="submit">Send Request</button>
  </form>

  <!-- Past Requests -->
  <h2>Your Requests</h2>
  <table id="requestsTable">
    <thead><tr><th>Submitted</th><th>Service</th><th>Chat</th></tr></thead>
    <tbody><tr><td colspan="3">Loading...</td></tr></tbody>
  </table>

  <!-- Chat Modal -->
  <div id="chatModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background-color:rgba(0,0,0,0.6); z-index:1000;">
    <div style="background:white; width:90%; max-width:600px; height:80%; margin:5% auto; display:flex; flex-direction:column; border-radius:8px; overflow:hidden;">
      <div style="background:#228B22; color:white; padding:1em; font-weight:bold;">
        Chat with Admin
        <button onclick="closeChat()" style="float:right; background:none; border:none; color:white; font-size:1.2em;">✖</button>
      </div>
      <div id="chatMessages" style="flex:1; padding:1em; overflow-y:auto; background:#f9f9f9;"></div>
      <div style="padding:1em; border-top:1px solid #ddd;">
        <input id="chatInput" type="text" placeholder="Type your message..." style="width:80%; padding:0.5em;" />
        <button onclick="sendChatMessage()" style="padding:0.5em 1em;">Send</button>
      </div>
    </div>
  </div>

  <script>
    const db = firebase.firestore();
    let currentUser = null;
    let currentChatRequestId = null;

    firebase.auth().onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        loadRequests();
      } else {
        window.location.href = "login.html";
      }
    });

    // Submit new service request
    document.getElementById("requestForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const data = {
        fullName: fullName.value,
        email: email.value,
        phone: phone.value,
        notes: message.value,
        serviceType: "Customer Submission",
        submittedAt: new Date(),
        adminRead: false,
        hasUnreadFromCustomer: true
      };
      await db.collection("service_requests").add(data);
      alert("✅ Request sent!");
      requestForm.reset();
      loadRequests();
    });

    // Load user's requests
    function loadRequests() {
      const tbody = document.querySelector("#requestsTable tbody");
      db.collection("service_requests")
        .where("email", "==", currentUser.email)
        .orderBy("submittedAt", "desc")
        .onSnapshot(snapshot => {
          tbody.innerHTML = "";
          if (snapshot.empty) {
            tbody.innerHTML = "<tr><td colspan='3'>No requests yet.</td></tr>";
            return;
          }
          snapshot.forEach(doc => {
            const d = doc.data();
            const tr = document.createElement("tr");
            const date = new Date(d.submittedAt.toDate()).toLocaleString();
            tr.innerHTML = `
              <td>${date}</td>
              <td>${d.notes}</td>
              <td><button onclick="openChat('${doc.id}')">💬 Chat</button></td>
            `;
            tbody.appendChild(tr);
          });
        });
    }

    // Open chat modal
    function openChat(id) {
      currentChatRequestId = id;
      chatModal.style.display = "block";
      loadChatMessages(id);
    }

    // Close chat modal
    function closeChat() {
      chatModal.style.display = "none";
      chatMessages.innerHTML = "";
      currentChatRequestId = null;
    }

    // Load chat messages
    function loadChatMessages(requestId) {
      const chatBox = document.getElementById("chatMessages");
      chatBox.innerHTML = "";
      db.collection("service_requests").doc(requestId)
        .collection("messages")
        .orderBy("timestamp")
        .onSnapshot(snapshot => {
          chatBox.innerHTML = "";
          snapshot.forEach(doc => {
            const msg = doc.data();
            const isCustomer = msg.sender === "customer";
            const bubble = document.createElement("div");
            bubble.style = `
              max-width: 75%;
              margin: 0.5em 0;
              padding: 0.6em 1em;
              border-radius: 1em;
              background: ${isCustomer ? "#d1f7c4" : "#e5e5ea"};
              align-self: ${isCustomer ? "flex-end" : "flex-start"};
            `;
            bubble.innerHTML = `
              <div>${msg.text}</div>
              <small style="font-size:0.7em; color:gray;">${new Date(msg.timestamp?.toDate()).toLocaleTimeString()}</small>
            `;
            chatBox.appendChild(bubble);
          });
          chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    // Send customer chat message
    function sendChatMessage() {
      const text = chatInput.value.trim();
      if (!text || !currentChatRequestId) return;

      db.collection("service_requests").doc(currentChatRequestId)
        .collection("messages").add({
          text,
          sender: "customer",
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

      db.collection("service_requests").doc(currentChatRequestId).update({
        hasUnreadFromCustomer: true
      });

      chatInput.value = "";
    }
  </script>

</body>
</html>
