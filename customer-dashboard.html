<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Dashboard - Holliday's Lawn & Garden</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.paypal.com/sdk/js?client-id=test&currency=USD"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="firebase-init.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f9f4; margin: 0; padding: 1em; }
    h1, h2 { color: #228B22; }
    table { width: 100%; border-collapse: collapse; margin-top: 1em; }
    th, td { border: 1px solid #ccc; padding: 0.75em; text-align: left; }
    th { background: #228B22; color: white; }
    input, textarea, button { width: 100%; padding: 0.5em; margin-top: 0.5em; }
    button { background: #228B22; color: white; border: none; cursor: pointer; }
    button:hover { background: #1a6b1a; }
    .paypal-button-container { margin-top: 10px; }
    .logout-btn {
      float: right;
      background: red;
      color: white;
      padding: 0.4em 1em;
      border: none;
      cursor: pointer;
      font-size: 0.9em;
    }
    @media (max-width: 600px) {
      table, thead, tbody, th, td, tr { display: block; width: 100%; }
      th { text-align: left; }
    }
  </style>
</head>
<body>

<h1>Welcome to Your Dashboard <button class="logout-btn" onclick="logout()">Logout</button></h1>

<h2>New Service Request</h2>
<form id="requestForm">
  <input type="text" id="fullName" placeholder="Your Name" required>
  <input type="email" id="email" placeholder="Your Email" required>
  <textarea id="message" rows="4" placeholder="Describe your request..." required></textarea>
  <button type="submit">Send Request</button>
</form>

<h2>Your Quotes</h2>
<button onclick="exportQuotesPDF()">📄 Download Quotes as PDF</button>
<table id="quotesTable">
  <thead><tr><th>Service</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
  <tbody><tr><td colspan="4">Loading...</td></tr></tbody>
</table>

<h2>Your Invoices</h2>
<button onclick="exportInvoicesPDF()">📄 Download Invoices as PDF</button>
<table id="invoicesTable">
  <thead><tr><th>Service</th><th>Amount</th><th>Status</th><th>Pay</th></tr></thead>
  <tbody><tr><td colspan="4">Loading...</td></tr></tbody>
</table>

<footer>&copy; 2025 Holliday's Lawn & Garden. All rights reserved.</footer>

<script>
const db = firebase.firestore();
let currentUser = null;

firebase.auth().onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.getElementById("email").value = user.email;
    if (user.displayName) {
      document.getElementById("fullName").value = user.displayName;
    }
    loadQuotes();
    loadInvoices();
  } else {
    window.location.href = "login.html";
  }
});

function logout() {
  if (confirm("Are you sure you want to logout?")) {
    firebase.auth().signOut();
  }
}

document.getElementById("requestForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  const data = {
    fullName: fullName.value,
    email: email.value,
    notes: message.value,
    submittedAt: new Date(),
    hasUnreadFromCustomer: true,
    adminRead: false
  };
  await db.collection("service_requests").add(data);
  alert("✅ Request sent!");
  requestForm.reset();
});

function loadQuotes() {
  const tbody = document.querySelector("#quotesTable tbody");
  db.collection("quotes").where("email", "==", currentUser.email).onSnapshot(snapshot => {
    tbody.innerHTML = "";
    snapshot.forEach(doc => {
      const q = doc.data();
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${q.service}</td>
        <td>$${q.amount.toFixed(2)}</td>
        <td>${q.status || 'pending'}</td>
        <td><button onclick="approveQuote('${doc.id}', ${q.amount}, '${q.service}')" ${q.status === 'approved' ? 'disabled' : ''}>Approve</button></td>
      `;
      tbody.appendChild(row);
    });
  });
}

function approveQuote(quoteId, amount, service) {
  db.collection("quotes").doc(quoteId).get().then(doc => {
    const q = doc.data();
    return db.collection("invoices").add({
      name: q.name,
      customerEmail: q.email,
      service,
      amount,
      paid: false,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
      return db.collection("quotes").doc(quoteId).update({ status: "approved" });
    });
  }).then(() => {
    alert("✅ Quote approved.");
  });
}

function loadInvoices() {
  const tbody = document.querySelector("#invoicesTable tbody");
  db.collection("invoices").where("customerEmail", "==", currentUser.email).onSnapshot(snapshot => {
    tbody.innerHTML = "";
    snapshot.forEach(doc => {
      const i = doc.data();
      const id = doc.id;
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${i.service}</td>
        <td>$${i.amount.toFixed(2)}</td>
        <td>${i.paid ? "✅ Paid" : "❌ Unpaid"}</td>
        <td><div id="paypal-${id}" class="paypal-button-container"></div></td>
      `;
      tbody.appendChild(row);
      if (!i.paid) renderPaypalButton(id, i.amount);
    });
  });
}

function renderPaypalButton(invoiceId, amount) {
  paypal.Buttons({
    createOrder: (data, actions) => {
      return actions.order.create({
        purchase_units: [{ amount: { value: amount.toFixed(2) } }]
      });
    },
    onApprove: (data, actions) => {
      return actions.order.capture().then(() => {
        db.collection("invoices").doc(invoiceId).update({ paid: true });
        alert("✅ Payment successful.");
      });
    }
  }).render("#paypal-" + invoiceId);
}

async function exportQuotesPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.text("Quotes", 10, 10);
  const quotes = await db.collection("quotes").where("email", "==", currentUser.email).get();
  let y = 20;
  quotes.forEach((q, i) => {
    const d = q.data();
    doc.text(`${i + 1}. ${d.service} - $${d.amount} - ${d.status || 'pending'}`, 10, y += 10);
  });
  doc.save("quotes.pdf");
}

async function exportInvoicesPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.text("Invoices", 10, 10);
  const invs = await db.collection("invoices").where("customerEmail", "==", currentUser.email).get();
  let y = 20;
  invs.forEach((inv, i) => {
    const d = inv.data();
    const status = d.paid ? "Paid" : "Unpaid";
    doc.text(`${i + 1}. ${d.service} - $${d.amount} - ${status}`, 10, y += 10);
  });
  doc.save("invoices.pdf");
}
</script>

</body>
</html>
