<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Dashboard – Holliday's Lawn & Garden</title>
  <link rel="icon" href="icons/icon-192.png">
  <style>
    body { font-family: Arial, sans-serif; background: #f4f9f4; margin: 0; padding: 2em; }
    header { background: #228B22; color: white; padding: 1em; text-align: center; }
    section { background: white; padding: 1.5em; margin-bottom: 2em; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    input, textarea, select, button {
      width: 100%; padding: 0.75em; margin-bottom: 1em; border: 1px solid #ccc; border-radius: 4px;
    }
    button { background: #228B22; color: white; cursor: pointer; border: none; }
    button:hover { background: #1a6e1a; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.75em; border: 1px solid #ccc; text-align: left; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <header>
    <h1>Welcome to Your Dashboard</h1>
  </header>

  <section>
    <h2>Submit a New Service Request</h2>
    <form id="requestForm">
      <input name="customer" placeholder="Your Name" required />
      <input name="email" type="email" placeholder="Your Email" required />
      <textarea name="description" placeholder="Describe your request..." required></textarea>
      <button type="submit">Submit Request</button>
    </form>
  </section>

  <section>
    <h2>My Service Requests</h2>
    <table id="requestsTable">
      <thead><tr><th>Description</th><th>Status</th><th>Date</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <section>
    <h2>My PayPal Invoices</h2>
    <table id="invoicesTable">
      <thead><tr><th>PayPal ID</th><th>Status</th><th>Notes</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <section>
    <h2>Export My History</h2>
    <button onclick="exportHistory('requests')">Download Requests CSV</button>
    <button onclick="exportHistory('paypalInvoices')">Download Invoices CSV</button>
  </section>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDrdga_hOO52nicYN3AwqqDjSbcnre6iM4",
      authDomain: "mobile-debt-crusher.firebaseapp.com",
      projectId: "mobile-debt-crusher"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const requestForm = document.getElementById("requestForm");
    requestForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(requestForm));
      data.createdAt = new Date();
      data.status = "Pending";
      try {
        await db.collection("requests").add(data);
        alert("Request submitted!");
        requestForm.reset();
        loadRequests(data.email);
      } catch (err) {
        console.error("Error submitting request:", err);
      }
    });

    async function loadRequests(email) {
      const table = document.querySelector("#requestsTable tbody");
      table.innerHTML = "";
      const snapshot = await db.collection("requests").where("email", "==", email).get();
      snapshot.forEach(doc => {
        const d = doc.data();
        table.innerHTML += `<tr><td>${d.description}</td><td>${d.status}</td><td>${new Date(d.createdAt.toDate()).toLocaleDateString()}</td></tr>`;
      });
    }

    async function loadInvoices(email) {
      const table = document.querySelector("#invoicesTable tbody");
      table.innerHTML = "";
      const snapshot = await db.collection("paypalInvoices").where("email", "==", email).get();
      snapshot.forEach(doc => {
        const d = doc.data();
        table.innerHTML += `<tr><td>${d.paypalId}</td><td>${d.status}</td><td>${d.notes || ""}</td></tr>`;
      });
    }

    async function exportHistory(collection) {
      const email = document.querySelector("input[name='email']").value;
      const snapshot = await db.collection(collection).where("email", "==", email).get();
      const rows = [];
      snapshot.forEach(doc => rows.push(doc.data()));
      const csv = Papa.unparse(rows);
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `${collection}.csv`;
      link.click();
    }

    document.querySelector("input[name='email']").addEventListener("blur", (e) => {
      const email = e.target.value;
      if (email) {
        loadRequests(email);
        loadInvoices(email);
      }
    });
  </script>
</body>
</html>
