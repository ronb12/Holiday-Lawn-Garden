<!-- Customer Dashboard - Holliday's Lawn & Garden -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Customer Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { background: #f4f9f4; font-family: Arial; margin: 0; }
    header, footer { background-color: #228B22; color: white; padding: 1em; text-align: center; }
    .container { max-width: 960px; margin: 2em auto; background: white; padding: 2em; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    table { width: 100%; border-collapse: collapse; margin-bottom: 2em; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    th { background: #228B22; color: white; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; }
    .modal-content { background:white; padding:20px; border-radius:8px; width:90%; max-width:500px; }
    .close { float:right; font-size:24px; cursor:pointer; }
    button { background: #228B22; color: white; border: none; padding: 0.5em 1em; border-radius: 5px; cursor: pointer; }
    button:hover { background: #006400; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
</head>
<body>

<header><h1>Your Dashboard</h1></header>
<div class="container">
  <h2 id="greeting">Welcome!</h2>

  <h3>Submit a New Service Request</h3>
  <form onsubmit="submitRequest(event)">
    <label>Service Type:</label>
    <select id="serviceType" required>
      <option value="">Select</option>
      <option value="Lawn Mowing">Lawn Mowing</option>
      <option value="Leaf Cleanup">Leaf Cleanup</option>
      <option value="Custom">Custom</option>
    </select>
    <label>Preferred Date:</label>
    <input type="date" id="preferredDate" required>
    <label>Notes:</label>
    <textarea id="requestNotes" placeholder="Additional details"></textarea>
    <label>Street:</label><input type="text" id="street" required>
    <label>City:</label><input type="text" id="city" required>
    <label>State:</label><input type="text" id="state" required>
    <label>ZIP:</label><input type="text" id="zip" required>
    <br><button type="submit">Submit Request</button>
  </form>

  <h3>Your Requests</h3>
  <table id="requestsTable">
    <thead><tr><th>Service</th><th>Date</th><th>Status</th><th>Address</th><th>Action</th></tr></thead>
    <tbody><tr><td colspan="5">Loading...</td></tr></tbody>
  </table>

  <h3>Your Quotes</h3>
  <table id="quotesTable">
    <thead><tr><th>Description</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
    <tbody><tr><td colspan="4">Loading...</td></tr></tbody>
  </table>

  <h3>Your Invoices</h3>
  <table id="invoicesTable">
    <thead><tr><th>Invoice #</th><th>Due</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
    <tbody><tr><td colspan="5">Loading...</td></tr></tbody>
  </table>

  <br><button onclick="logout()">Logout</button>
</div>

<!-- Invoice Modal -->
<div id="invoiceModal" class="modal" onclick="closeModal(event)">
  <div class="modal-content">
    <span class="close" onclick="closeModal(event)">&times;</span>
    <h2>Invoice Details</h2>
    <div id="invoiceDetails"></div>
  </div>
</div>

<footer>&copy; 2025 Holliday's Lawn & Garden</footer>

<script>
const db = firebase.firestore();
let currentUser;

firebase.auth().onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.getElementById("greeting").innerText = `Welcome, ${user.email}`;
    loadRequests();
    loadQuotes();
    loadInvoices();
  } else {
    location.href = "login.html";
  }
});

function submitRequest(e) {
  e.preventDefault();
  const data = {
    email: currentUser.email,
    serviceType: document.getElementById("serviceType").value,
    preferredDate: document.getElementById("preferredDate").value,
    notes: document.getElementById("requestNotes").value,
    street: document.getElementById("street").value,
    city: document.getElementById("city").value,
    state: document.getElementById("state").value,
    zip: document.getElementById("zip").value,
    status: "Pending",
    submittedAt: new Date()
  };
  db.collection("service_requests").add(data).then(() => {
    alert("Request submitted!");
    e.target.reset();
    loadRequests();
  });
}

function loadRequests() {
  const tbody = document.querySelector("#requestsTable tbody");
  db.collection("service_requests").where("email", "==", currentUser.email).orderBy("submittedAt", "desc").get().then(snapshot => {
    tbody.innerHTML = "";
    if (snapshot.empty) return tbody.innerHTML = "<tr><td colspan='5'>No requests</td></tr>";
    snapshot.forEach(doc => {
      const r = doc.data();
      tbody.innerHTML += `
        <tr>
          <td>${r.serviceType}</td>
          <td>${new Date(r.preferredDate).toLocaleDateString()}</td>
          <td>${r.status}</td>
          <td>${r.street}, ${r.city}, ${r.state} ${r.zip}</td>
          <td>${r.status !== "Completed" ? `<button onclick="deleteRequest('${doc.id}')">Cancel</button>` : "-"}</td>
        </tr>`;
    });
  });
}

function deleteRequest(id) {
  if (confirm("Cancel this request?")) {
    db.collection("service_requests").doc(id).delete().then(loadRequests);
  }
}

function loadQuotes() {
  const tbody = document.querySelector("#quotesTable tbody");
  db.collection("quotes").where("email", "==", currentUser.email).orderBy("createdAt", "desc").get().then(snapshot => {
    tbody.innerHTML = "";
    if (snapshot.empty) return tbody.innerHTML = "<tr><td colspan='4'>No quotes</td></tr>";
    snapshot.forEach(doc => {
      const q = doc.data();
      tbody.innerHTML += `
        <tr>
          <td>${q.quote}</td>
          <td>$${(q.amount || 0).toFixed(2)}</td>
          <td>${q.status || "Pending"}</td>
          <td>${q.status !== "Accepted" ? `<button onclick="acceptQuote('${doc.id}')">Accept</button>` : "Accepted"}</td>
        </tr>`;
    });
  });
}

function acceptQuote(id) {
  db.collection("quotes").doc(id).update({ status: "Accepted" }).then(() => {
    alert("Quote accepted");
    loadQuotes();
  });
}

function loadInvoices() {
  const tbody = document.querySelector("#invoicesTable tbody");
  db.collection("invoices").where("customerEmail", "==", currentUser.email).orderBy("dueDate").get().then(snapshot => {
    tbody.innerHTML = "";
    if (snapshot.empty) return tbody.innerHTML = "<tr><td colspan='5'>No invoices</td></tr>";
    snapshot.forEach(doc => {
      const d = doc.data();
      tbody.innerHTML += `
        <tr>
          <td>${d.invoiceNumber}</td>
          <td>${new Date(d.dueDate).toLocaleDateString()}</td>
          <td>$${(d.amountDue || 0).toFixed(2)}</td>
          <td>${d.paid ? "Paid" : "Unpaid"}</td>
          <td><button onclick='viewInvoice(${JSON.stringify(d)})'>View</button></td>
        </tr>`;
    });
  });
}

function viewInvoice(data) {
  const html = `
    <p><strong>Invoice #:</strong> ${data.invoiceNumber}</p>
    <p><strong>Due Date:</strong> ${new Date(data.dueDate).toLocaleDateString()}</p>
    <p><strong>Amount Due:</strong> $${data.amountDue.toFixed(2)}</p>
    <hr>
    <p><strong>Services:</strong></p>
    <ul>${(data.services || []).map(s => `<li>${s.description} - $${s.amount.toFixed(2)}</li>`).join("")}</ul>
    <hr>
    <p><strong>Status:</strong> ${data.paid ? "Paid" : "Unpaid"}</p>
  `;
  document.getElementById("invoiceDetails").innerHTML = html;
  document.getElementById("invoiceModal").style.display = "flex";
}

function closeModal(e) {
  if (e.target.classList.contains("modal") || e.target.classList.contains("close")) {
    document.getElementById("invoiceModal").style.display = "none";
  }
}

function logout() {
  firebase.auth().signOut().then(() => location.href = "login.html");
}
</script>
</body>
</html>
