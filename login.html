<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self'; 
    script-src 'self' https://www.gstatic.com https://www.googleapis.com; 
    style-src 'self'; 
    font-src 'self'; 
    connect-src 'self' https://firestore.googleapis.com https://www.googleapis.com; 
    img-src 'self' data:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <style>
    .login-container {
      max-width: 400px;
      margin: 3rem auto;
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: left;
    }
    .login-container h2 {
      text-align: center;
    }
    label {
      display: block;
      font-weight: bold;
      margin-top: 1em;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.6em;
      margin-top: 0.3em;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      margin-top: 1.5em;
      width: 100%;
      background-color: #228B22;
      color: white;
      padding: 0.7em;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      cursor: pointer;
    }
    button:hover {
      background-color: #006400;
    }
    .login-links {
      text-align: center;
      margin-top: 1.2em;
      font-size: 0.9em;
    }
    .login-links a {
      color: #228B22;
      text-decoration: none;
    }
    footer {
      margin-top: 2rem;
      padding: 1rem;
      background: #e0f0e0;
      color: #333;
      font-size: 0.9em;
      text-align: center;
    }
    header nav {
      text-align: center;
      margin-top: 1rem;
    }
    header nav a {
      margin: 0 10px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <img src="Hollidays_Lawn_Garden_Logo.png" alt="Holliday's Lawn & Garden Logo" style="max-height: 80px;" />
    <nav>
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="pay-your-bill.html">Pay Your Bill</a>
      <a href="gallery.html">Gallery</a>
      <a href="login.html">Login</a>
    </nav>
    <p style="color: white; margin-top: 10px;">Professional Lawn Care & Landscaping Services</p>
  </header>

  <main>
    <div class="login-container">
      <h2>Customer Login</h2>
      <form onsubmit="event.preventDefault(); emailPasswordLogin();">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" required>

        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" required>

        <button type="submit" id="loginBtn">Login</button>
      </form>
      <div class="login-links">
        <p><a href="forgot-password.html">Forgot Password?</a></p>
        <p>Don't have an account? <a href="create-account.html">Create one here</a>.</p>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2025 Holliday's Lawn & Garden. All rights reserved.
  </footer>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="firebase-init.js"></script>
  <script src="login.js"></script>
</body>
</html>
