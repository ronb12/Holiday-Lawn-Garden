<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="firebase-init.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f9f4;
    }

    header {
      background-color: #228B22;
      color: white;
      padding: 1rem;
      text-align: center;
    }

    header img {
      max-height: 80px;
      margin-top: 10px;
    }

    nav.nav-links {
      margin-top: 1rem;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
    }

    .login-container {
      max-width: 400px;
      margin: 3rem auto;
      padding: 2rem;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 0.75rem;
      margin: 0.75rem 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1rem;
    }

    button {
      width: 100%;
      background-color: #228B22;
      color: white;
      padding: 0.75rem;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background-color: #006400;
    }

    .login-links {
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .login-links a {
      color: #228B22;
      text-decoration: none;
    }

    footer {
      background: #e0f0e0;
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
      color: #333;
    }
  </style>
</head>
<body>

  <header>
    <img src="Hollidays_Lawn_Garden_Logo.png" alt="Holliday's Lawn & Garden Logo">
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="pay-your-bill.html">Pay Your Bill</a>
      <a href="gallery.html">Gallery</a>
      <a href="login.html">Login</a>
    </nav>
    <p>Professional Lawn Care & Landscaping Services</p>
  </header>

  <main>
    <div class="login-container fade-in">
      <h2>Customer Login</h2>
      <form onsubmit="event.preventDefault(); emailPasswordLogin();">
        <input type="email" id="loginEmail" placeholder="Email Address" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>
      <div class="login-links">
        <p><a href="forgot-password.html">Forgot Password?</a></p>
        <p>Don't have an account? <a href="create-account.html">Create one here</a>.</p>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2025 Holliday's Lawn & Garden. All rights reserved.
  </footer>

  <script>
    function emailPasswordLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();

      if (!email || !password) {
        alert("Please enter both email and password.");
        return;
      }

    function emailPasswordLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;

  if (!email || !password) {
    alert("Please enter both email and password.");
    return;
  }

  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(userCredential => {
      const userEmail = userCredential.user.email;
      console.log("Logged in as:", userEmail); // ✅ Debug log
      const isAdmin = ["ronellbradley@bradleyvs.com"].includes(userEmail);
      window.location.href = isAdmin ? "admin.html" : "customer-dashboard.html";
    })
    .catch(error => {
      alert("Login failed: " + error.message);
    });
}

    // Optional fade-in (clean, harmless)
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>

</body>
</html>
