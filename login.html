<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self'; 
    script-src 'self' https://www.gstatic.com https://www.googleapis.com; 
    style-src 'self' 'unsafe-inline'; 
    font-src 'self' https://fonts.gstatic.com; 
    connect-src 'self' https://firestore.googleapis.com https://www.googleapis.com; 
    img-src 'self' data:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f9f4;
      margin: 0;
      text-align: center;
    }
    header {
      background: #228B22;
      color: white;
      padding: 1rem 0.5rem;
    }
    header img {
      max-height: 80px;
    }
    nav {
      margin-top: 10px;
    }
    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
    }
    .login-container {
      max-width: 400px;
      margin: 3rem auto;
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    input[type="email"], input[type="password"] {
      width: 90%;
      padding: 0.7em;
      margin: 1em 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      background-color: #228B22;
      color: white;
      padding: 0.7em 2em;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      cursor: pointer;
    }
    button:hover {
      background-color: #006400;
    }
    .login-links {
      margin-top: 1em;
      font-size: 0.9em;
    }
    .login-links a {
      color: #228B22;
      text-decoration: none;
    }
    footer {
      margin-top: 2rem;
      padding: 1rem;
      background: #e0f0e0;
      color: #333;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <header>
    <img src="Hollidays_Lawn_Garden_Logo.png" alt="Holliday's Lawn & Garden Logo" />
    <nav>
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="pay-your-bill.html">Pay Your Bill</a>
      <a href="gallery.html">Gallery</a>
      <a href="login.html">Login</a>
    </nav>
    <p>Professional Lawn Care & Landscaping Services</p>
  </header>

  <main>
    <div class="login-container">
      <h2>Customer Login</h2>
      <input type="email" id="loginEmail" placeholder="Email Address" required><br>
      <input type="password" id="loginPassword" placeholder="Password" required><br>
      <button onclick="emailPasswordLogin()">Login</button>
      <div class="login-links">
        <p><a href="forgot-password.html">Forgot Password?</a></p>
        <p>Don't have an account? <a href="create-account.html">Create one here</a>.</p>
      </div>
    </div>
  </main>
  <footer>
    &copy; 2025 Holliday's Lawn & Garden. All rights reserved.
  </footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <!-- Firebase Init -->
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDrdga_hOO52nicYN3AwqqDjSbcnre6iM4",
      authDomain: "mobile-debt-tracker.firebaseapp.com",
      projectId: "mobile-debt-tracker",
      storageBucket: "mobile-debt-tracker.appspot.com",
      messagingSenderId: "153601029964",
      appId: "1:153601029964:web:ddd1880ba21bce2e9041e9"
    };
    firebase.initializeApp(firebaseConfig);
  </script>

  <!-- Login Logic -->
  <script>
    function emailPasswordLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();

      if (!email || !password) {
        alert("Please enter both email and password.");
        return;
      }

      firebase.auth().signInWithEmailAndPassword(email, password)
        .then(userCredential => {
          const userEmail = userCredential.user.email;
          const isAdmin = userEmail === "ronellbradley@bradleyvs.com";

          if (isAdmin) {
            window.location.href = "admin.html";
          } else {
            window.location.href = "customer-dashboard.html";
          }
        })
        .catch(error => {
          console.error("Login error:", error);
          alert("Login failed: " + error.message);
        });
    }
  </script>
</body>
</html>
