<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="firebase-init.js"></script>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    .login-container {
      max-width: 400px;
      margin: 3em auto;
      padding: 2em;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    input[type="email"], input[type="password"] {
      width: 90%;
      padding: 0.7em;
      margin: 1em 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      background-color: #228B22;
      color: white;
      padding: 0.7em 2em;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      cursor: pointer;
    }
    button:hover {
      background-color: #006400;
    }
    .login-links {
      margin-top: 1em;
      font-size: 0.9em;
    }
    .login-links a {
      color: #228B22;
      text-decoration: none;
    }
    .g_id_signin {
      margin-top: 20px;
      display: flex;
      justify-content: center;
    }
    #loginErrorMessage {
      color: red;
      margin-top: 1em;
      min-height: 1.2em; /* Reserve space to prevent layout shifts */
    }
  </style>
</head>
<body>

<header>
  <img src="Hollidays_Lawn_Garden_Logo.png" alt="Holliday's Lawn & Garden Logo" style="max-height: 80px; margin-top: 10px;">
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="pay-your-bill.html">Pay Your Bill</a>
    <a href="gallery.html">Gallery</a>
    <a href="login.html">Login</a>
  </nav>
  <p>Professional Lawn Care & Landscaping Services</p>
</header>

<main>
  <div class="login-container fade-in">
    <h2>Customer Login</h2>

    <!-- Email/Password Login -->
    <input type="email" id="loginEmail" placeholder="Email Address" required><br>
    <input type="password" id="loginPassword" placeholder="Password" required><br>
    <button onclick="emailPasswordLogin()">Login</button>

    <!-- Error Message Display -->
    <div id="loginErrorMessage"></div>

    <!-- Google Sign In -->
    <div class="g_id_signin"
         data-type="standard"
         data-shape="rectangular"
         data-theme="outline"
         data-text="sign_in_with"
         data-size="large"
         data-logo_alignment="left"
         data-width="250"
         data-callback="handleGoogleSignInCallback">
    </div>

    <div class="login-links">
      <p><a href="forgot-password.html">Forgot Password?</a></p>
      <p>Don't have an account? <a href="create-account.html">Create one here</a>.</p>
    </div>
  </div>
</main>

<footer>
  &copy; 2025 Holliday's Lawn & Garden. All rights reserved.
</footer>

<script src="login.js"></script>

</body>
</html>
