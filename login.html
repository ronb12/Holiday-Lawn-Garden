<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com https://www.googleapis.com; style-src 'self' 'unsafe-inline';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="firebase-init.js"></script>

  <style>
    .login-container {
      max-width: 400px;
      margin: 3em auto;
      padding: 2em;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    input[type="email"], input[type="password"] {
      width: 90%;
      padding: 0.7em;
      margin: 1em 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      background-color: #228B22;
      color: white;
      padding: 0.7em 2em;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      cursor: pointer;
    }
    button:hover {
      background-color: #006400;
    }
    .login-links {
      margin-top: 1em;
      font-size: 0.9em;
    }
    .login-links a {
      color: #228B22;
      text-decoration: none;
    }
    .error-message {
      color: red;
      font-size: 0.9em;
      margin-top: 0.5em;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <img src="Hollidays_Lawn_Garden_Logo.png" alt="Holliday's Lawn & Garden Logo" style="max-height: 80px; margin-top: 10px;">
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="pay-your-bill.html">Pay Your Bill</a>
    <a href="gallery.html">Gallery</a>
    <a href="login.html">Login</a>
  </nav>
  <p>Professional Lawn Care & Landscaping Services</p>
</header>

<main>
  <div class="login-container fade-in">
    <h2>Customer Login</h2>

    <form id="loginForm" onsubmit="return emailPasswordLogin(event)">
      <input type="email" id="loginEmail" placeholder="Email Address" required autocomplete="email"><br>
      <input type="password" id="loginPassword" placeholder="Password" required autocomplete="off"><br>
      <button type="submit">Login</button>
      <div id="errorMsg" class="error-message"></div>
    </form>

    <div class="login-links">
      <p><a href="forgot-password.html">Forgot Password?</a></p>
      <p>Don't have an account? <a href="create-account.html">Create one here</a>.</p>
    </div>
  </div>
</main>

<footer>
  &copy; 2025 Holliday's Lawn & Garden. All rights reserved.
</footer>

<script>
  function emailPasswordLogin(event) {
    event.preventDefault();
    const email = document.getElementById('loginEmail');
    const password = document.getElementById('loginPassword');
    const errorMsg = document.getElementById('errorMsg');

    errorMsg.style.display = 'none';

    if (!email.validity.valid || !password.validity.valid) {
      errorMsg.textContent = "Please enter a valid email and password.";
      errorMsg.style.display = 'block';
      return false;
    }

    firebase.auth().signInWithEmailAndPassword(email.value.trim(), password.value)
      .then((userCredential) => {
        const userEmail = userCredential.user.email;
        const isAdmin = ["ronellbradley@bradleyvs.com"].includes(userEmail);

        if (isAdmin) {
          window.location.href = "admin.html";
        } else {
          window.location.href = "customer-dashboard.html";
        }
      })
      .catch((error) => {
        errorMsg.textContent = "Login failed: " + error.message;
        errorMsg.style.display = 'block';
      });

    return false;
  }

  // Fade-in effect
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.fade-in').forEach(section => {
    observer.observe(section);
  });
</script>

</body>
</html>
