<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js" onerror="console.error('Firebase config failed to load'); window.firebaseConfigFailed = true;"></script>
  <script src="firebase-init.js" onerror="console.error('Firebase init failed to load'); window.firebaseInitFailed = true;"></script>

  <!-- Removed Google Identity Services - using Firebase Google Auth instead -->

  <style>
    .login-container {
      max-width: 400px;
      margin: 3em auto;
      padding: 2em;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    input[type="email"], input[type="password"] {
      width: 90%;
      padding: 0.7em;
      margin: 1em 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      background-color: #228B22;
      color: white;
      padding: 0.7em 2em;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      cursor: pointer;
    }
    button:hover {
      background-color: #006400;
    }
    .login-links {
      margin-top: 1em;
      font-size: 0.9em;
    }
    .login-links a {
      color: #228B22;
      text-decoration: none;
    }
    #loginErrorMessage {
      color: red;
      margin-top: 1em;
      min-height: 1.2em; /* Reserve space to prevent layout shifts */
    }
    
    /* Ensure page is visible even if scripts fail */
    body {
      background: #f4f9f4;
      font-family: Arial, sans-serif;
      margin: 0;
      visibility: visible !important;
    }
    
    header, footer {
      background-color: #228B22;
      color: white;
      padding: 1em;
      text-align: center;
    }
    
    /* Force login container to be visible */
    .login-container {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
    
    /* Debug styling */
    main {
      min-height: 400px;
      background: #f4f9f4;
      padding: 20px;
    }
  </style>
  
  <noscript>
    <style>
      #loginErrorMessage::after {
        content: "JavaScript is required for full functionality.";
        color: orange;
      }
    </style>
  </noscript>

  <!-- Debug Script -->
  <script>
    // Ensure page content is visible regardless of Firebase status
    document.addEventListener('DOMContentLoaded', function() {
      console.log('DOM loaded - ensuring login form is visible');
      const loginContainer = document.querySelector('.login-container');
      if (loginContainer) {
        loginContainer.style.display = 'block';
        loginContainer.style.visibility = 'visible';
        loginContainer.style.opacity = '1';
        console.log('Login container made visible');
      } else {
        console.error('Login container not found');
      }
    });
  </script>
</head>
<body>

<header>
  <img src="Hollidays_Lawn_Garden_Logo.png" alt="Holliday's Lawn & Garden Logo" style="max-height: 80px; margin-top: 10px;">
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="pay-your-bill.html">Pay Your Bill</a>
    <a href="gallery.html">Gallery</a>
    <a href="login.html">Login</a>
  </nav>
  <p>Professional Lawn Care & Landscaping Services</p>
</header>

<main>
  <div class="login-container fade-in">
    <h2>Customer Login</h2>

    <!-- Email/Password Login -->
    <input type="email" id="loginEmail" placeholder="Email Address" required><br>
    <input type="password" id="loginPassword" placeholder="Password" required><br>
    <button onclick="emailPasswordLogin()">Login</button>

    <!-- Error Message Display -->
    <div id="loginErrorMessage"></div>

    <!-- Simple Google Sign-In Button (using Firebase) -->
    <button onclick="googleSignIn()" style="background-color: #4285f4; color: white; margin-top: 20px; border: none; padding: 0.7em 2em; border-radius: 5px; font-size: 1em; cursor: pointer;">
      🔵 Sign in with Google
    </button>

    <div class="login-links">
      <p><a href="forgot-password.html">Forgot Password?</a></p>
      <p>Don't have an account? <a href="create-account.html">Create one here</a>.</p>
    </div>
  </div>
</main>

<footer>
  &copy; 2025 Holliday's Lawn & Garden. All rights reserved.
</footer>

<script src="login.js"></script>

</body>
</html>
