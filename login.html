<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="firebase-init.js"></script>

  <!-- Google Identity Services (optional for future use) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    .login-container {
      max-width: 400px;
      margin: 3em auto;
      padding: 2em;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    input[type="email"], input[type="password"] {
      width: 90%;
      padding: 0.7em;
      margin: 1em 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      background-color: #228B22;
      color: white;
      padding: 0.7em 2em;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      cursor: pointer;
    }
    button:hover {
      background-color: #006400;
    }
    .login-links {
      margin-top: 1em;
      font-size: 0.9em;
    }
    .login-links a {
      color: #228B22;
      text-decoration: none;
    }
    .g_id_signin {
      margin-top: 20px;
      display: flex;
      justify-content: center;
    }
    #loginErrorMessage {
      color: red;
      margin-top: 1em;
      min-height: 1.2em; /* Reserve space to prevent layout shifts */
    }
  </style>
</head>
<body>

<header>
  <img src="Hollidays_Lawn_Garden_Logo.png" alt="Holliday's Lawn & Garden Logo" style="max-height: 80px; margin-top: 10px;">
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="pay-your-bill.html">Pay Your Bill</a>
    <a href="gallery.html">Gallery</a>
    <a href="login.html">Login</a>
  </nav>
  <p>Professional Lawn Care & Landscaping Services</p>
</header>

<main>
  <div class="login-container fade-in">
    <h2>Customer Login</h2>

    <!-- Email/Password Login -->
    <input type="email" id="loginEmail" placeholder="Email Address" required><br>
    <input type="password" id="loginPassword" placeholder="Password" required><br>
    <button onclick="emailPasswordLogin()">Login</button>

    <!-- Error Message Display -->
    <div id="loginErrorMessage"></div>

    <!-- Google Sign In (optional) -->
    <div class="g_id_signin"
         data-type="standard"
         data-shape="rectangular"
         data-theme="outline"
         data-text="sign_in_with"
         data-size="large"
         data-logo_alignment="left"
         data-width="250"
         data-callback="handleGoogleSignInCallback">
    </div>

    <div class="login-links">
      <p><a href="forgot-password.html">Forgot Password?</a></p>
      <p>Don't have an account? <a href="create-account.html">Create one here</a>.</p>
    </div>
  </div>
</main>

<footer>
  &copy; 2025 Holliday's Lawn & Garden. All rights reserved.
</footer>

<script>
  const loginErrorMessage = document.getElementById('loginErrorMessage');

  // Initialize Google Sign-In
  window.onload = function () {
    if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
      google.accounts.id.initialize({
        client_id: "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com", // <!-- REPLACE WITH YOUR ACTUAL GOOGLE CLIENT ID -->
        callback: handleGoogleSignInCallback 
      });
      // The button is already configured with data-callback, so explicit renderButton may not be needed
      // if it's not working, uncomment and ensure the div ID matches:
      // google.accounts.id.renderButton(
      //   document.getElementById("googleSignInButtonDiv"), // Ensure you have a div with this ID if using renderButton
      //   { theme: "outline", size: "large", text: "sign_in_with", shape: "rectangular", logo_alignment: "left" } 
      // );
    } else {
      console.error("Google Identity Services script not loaded yet or google object not available.");
      loginErrorMessage.textContent = "Google Sign-In is currently unavailable. Please try again later.";
    }
  };

  async function handleUserLogin(firebaseUser) {
    if (!firebaseUser) {
      loginErrorMessage.textContent = "User authentication failed.";
      return;
    }
    
    try {
      const userDocRef = db.collection("users").doc(firebaseUser.uid);
      const userDoc = await userDocRef.get();

      if (userDoc.exists && userDoc.data().role === "admin") {
        window.location.href = "admin.html";
      } else {
        if (!userDoc.exists) {
          // If user doc doesn't exist (e.g., first Google Sign-In), create it with customer role
          await userDocRef.set({
            email: firebaseUser.email,
            displayName: firebaseUser.displayName || firebaseUser.email.split('@')[0],
            uid: firebaseUser.uid,
            role: "customer",
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          console.log("New user document created for:", firebaseUser.email);
        }
        window.location.href = "customer-dashboard.html";
      }
    } catch (error) {
      console.error("Error during role check or user doc creation: ", error);
      loginErrorMessage.textContent = "Login error: Could not verify user role. " + error.message;
    }
  }

  // Email/Password Login with role-based redirect
  function emailPasswordLogin() {
    loginErrorMessage.textContent = ""; // Clear previous errors
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
      loginErrorMessage.textContent = "Please enter both email and password.";
      return;
    }

    firebase.auth().signInWithEmailAndPassword(email, password)
      .then((userCredential) => {
        handleUserLogin(userCredential.user);
      })
      .catch((error) => {
        loginErrorMessage.textContent = "Login failed: " + error.message;
      });
  }

  // Google Sign-In Callback
  async function handleGoogleSignInCallback(response) {
    loginErrorMessage.textContent = ""; // Clear previous errors
    if (response.credential) {
      const googleCredential = firebase.auth.GoogleAuthProvider.credential(response.credential);
      firebase.auth().signInWithCredential(googleCredential)
        .then((result) => {
          // result.user contains the Firebase user
          // result.additionalUserInfo.isNewUser can be used if needed
          console.log("Google Sign-In successful for Firebase user:", result.user.email);
          handleUserLogin(result.user);
        })
        .catch((error) => {
          console.error("Firebase Google Sign-In error:", error);
          loginErrorMessage.textContent = "Google Sign-In failed: " + error.message;
          if (error.code === 'auth/account-exists-with-different-credential') {
            loginErrorMessage.textContent += " Try logging in with the original method you used for this email.";
          }
        });
    } else {
      console.error("Google Sign-In response did not contain credential.");
      loginErrorMessage.textContent = "Google Sign-In failed: No credential received.";
    }
  }

  // Fade-in animation
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.fade-in').forEach(section => {
    observer.observe(section);
  });
</script>

</body>
</html>
