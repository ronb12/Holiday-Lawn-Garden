<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self'; 
    script-src 'self' https://www.gstatic.com https://www.googleapis.com; 
    style-src 'self'; 
    font-src 'self'; 
    connect-src 'self' https://firestore.googleapis.com https://www.googleapis.com; 
    img-src 'self' data:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Holliday's Lawn & Garden</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f9f4;
      margin: 0;
      padding: 0;
    }

    header {
      background: #228B22;
      color: white;
      text-align: center;
      padding: 1em;
    }

    header img {
      max-height: 80px;
      margin-top: 10px;
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
    }

    main {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80vh;
      padding: 2rem;
    }

    .login-container {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }

    .login-container h2 {
      margin-bottom: 1.5rem;
    }

    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1rem;
    }

    button {
      width: 100%;
      padding: 0.75rem;
      background-color: #228B22;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background-color: #006400;
    }

    .login-links {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .login-links a {
      color: #228B22;
      text-decoration: none;
    }

    footer {
      text-align: center;
      padding: 1rem;
      background: #e0f0e0;
      font-size: 0.9rem;
      color: #444;
    }
  </style>
</head>
<body>
  <header>
    <img src="Hollidays_Lawn_Garden_Logo.png" alt="Holliday's Lawn & Garden Logo" />
    <nav>
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="pay-your-bill.html">Pay Your Bill</a>
      <a href="gallery.html">Gallery</a>
      <a href="login.html">Login</a>
    </nav>
    <p>Professional Lawn Care & Landscaping Services</p>
  </header>

  <main>
    <div class="login-container">
      <h2>Customer Login</h2>
      <form onsubmit="event.preventDefault(); emailPasswordLogin();">
        <input type="email" id="loginEmail" placeholder="Email Address" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button id="loginBtn" type="submit">Login</button>
      </form>
      <div class="login-links">
        <p><a href="forgot-password.html">Forgot Password?</a></p>
        <p>Don't have an account? <a href="create-account.html">Create one here</a>.</p>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2025 Holliday's Lawn & Garden. All rights reserved.
  </footer>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="firebase-init.js"></script>
  <script src="login.js"></script>
</body>
</html>
