<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>

  <style>
    .dashboard-container {
      max-width: 800px;
      margin: 3em auto;
      padding: 2em;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    .dashboard-info, .service-request-form, .notifications {
      margin-bottom: 2em;
    }
    .dashboard-buttons button {
      background-color: #228B22;
      color: white;
      border: none;
      padding: 0.7em 1.5em;
      margin: 0.5em;
      border-radius: 5px;
      font-size: 1em;
      cursor: pointer;
    }
    .dashboard-buttons button:hover {
      background-color: #006400;
    }
    input, select, textarea {
      width: 90%;
      padding: 0.7em;
      margin: 0.5em 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .logout {
      margin-top: 2em;
      display: inline-block;
      color: #228B22;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }
    .logout:hover {
      text-decoration: underline;
    }
    .notification-item {
      background: #f9f9f9;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 1em;
      margin: 0.5em 0;
      text-align: left;
    }
  </style>
</head>
<body>

<header>
  <img src="Hollidays_Lawn_Garden_Logo.png" alt="Holliday's Lawn & Garden Logo" style="max-height: 80px; margin-top: 10px;">
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="gallery.html">Gallery</a>
    <a href="login.html">Logout</a>
  </nav>
  <p>Customer Dashboard</p>
</header>

<main>
  <div class="dashboard-container fade-in">
    <h2 id="welcome">Welcome!</h2>

    <!-- 🔔 Notifications Section -->
    <div class="notifications">
      <h3>🔔 Notifications</h3>
      <div id="notificationsList">
        <p>Loading your notifications...</p>
      </div>
    </div>

    <div class="dashboard-info">
      <p><strong>Last Payment:</strong> Paid <strong>$120</strong> on <strong>April 20, 2025</strong>.</p>
      <p><strong>Next Service:</strong> Scheduled for <strong>May 5, 2025</strong>.</p>
    </div>

    <div class="dashboard-buttons">
      <button onclick="toggleServiceForm()">Request New Service</button>
      <button onclick="location.href='pay-your-bill.html'">Pay Another Invoice</button>
    </div>

    <!-- Request New Service Form -->
    <div id="serviceForm" class="service-request-form" style="display: none;">
      <h3>Request New Service</h3>
      <form id="newServiceForm" onsubmit="submitServiceRequest(event)">
        <input type="text" id="fullName" placeholder="Full Name" required><br>
        <input type="email" id="email" placeholder="Email Address" required><br>
        <select id="serviceType" required>
          <option value="">Select a Service</option>
          <option value="Mowing & Trimming">Mowing & Trimming</option>
          <option value="Landscape Design">Landscape Design</option>
          <option value="Leaf Removal">Leaf Removal</option>
          <option value="Fertilization & Seeding">Fertilization & Seeding</option>
          <option value="Seasonal Cleanup">Seasonal Cleanup</option>
          <option value="Mulching & Edging">Mulching & Edging</option>
          <option value="Pressure Washing">Pressure Washing</option>
          <option value="Commercial Lawn Care">Commercial Lawn Care</option>
        </select><br>
        <input type="date" id="preferredDate" required><br>
        <textarea id="notes" placeholder="Additional notes..." rows="4"></textarea><br>
        <button type="submit">Submit Request</button>
      </form>
    </div>

    <a onclick="logout()" class="logout">Logout</a>
  </div>
</main>

<footer>
  &copy; 2025 Holliday's Lawn & Garden. All rights reserved.
</footer>

<script>
  const db = firebase.firestore();

  function toggleServiceForm() {
    const form = document.getElementById('serviceForm');
    form.style.display = (form.style.display === 'none') ? 'block' : 'none';
  }

  function submitServiceRequest(event) {
    event.preventDefault();

    const fullName = document.getElementById('fullName').value;
    const email = document.getElementById('email').value;
    const serviceType = document.getElementById('serviceType').value;
    const preferredDate = document.getElementById('preferredDate').value;
    const notes = document.getElementById('notes').value;

    db.collection("service_requests").add({
      fullName,
      email,
      serviceType,
      preferredDate,
      notes,
      submittedAt: firebase.firestore.FieldValue.serverTimestamp()
    })
    .then(() => {
      alert("✅ Your service request has been submitted successfully!");
      document.getElementById('newServiceForm').reset();
      document.getElementById('serviceForm').style.display = 'none';
      loadNotifications();
    })
    .catch((error) => {
      console.error("Error adding document: ", error);
      alert("❌ Error submitting service request. Please try again.");
    });
  }

  function loadNotifications() {
    const notificationsList = document.getElementById('notificationsList');
    const user = firebase.auth().currentUser;
    if (!user) return;

    db.collection("notifications")
      .where("email", "==", user.email)
      .orderBy("createdAt", "desc")
      .limit(10)
      .get()
      .then(snapshot => {
        notificationsList.innerHTML = "";
        if (snapshot.empty) {
          notificationsList.innerHTML = "<p>No new notifications.</p>";
          return;
        }
        snapshot.forEach(doc => {
          const data = doc.data();
          const div = document.createElement("div");
          div.className = "notification-item";
          div.innerText = data.message;
          notificationsList.appendChild(div);
        });
      });
  }

  firebase.auth().onAuthStateChanged(user => {
    if (user) {
      document.getElementById('welcome').innerText = `Welcome, ${user.email}!`;
      document.getElementById('email').value = user.email;
      loadNotifications();
    } else {
      window.location.href = 'login.html'; // redirect if not logged in
    }
  });

  function logout() {
    firebase.auth().signOut().then(() => {
      window.location.href = "login.html";
    });
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.fade-in').forEach(section => {
    observer.observe(section);
  });
</script>

</body>
</html>
