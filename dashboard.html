<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Dashboard - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>

  <!-- jsPDF for PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    .dashboard-container {
      max-width: 800px;
      margin: 3em auto;
      padding: 2em;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    .invoice-box {
      margin-top: 2em;
      text-align: left;
      background: #f9f9f9;
      padding: 1.5em;
      border-radius: 8px;
    }
    .invoice-box h3 {
      margin-bottom: 1em;
    }
    .invoice-item {
      margin-bottom: 1em;
      font-size: 1.1em;
    }
    .dashboard-buttons button {
      background-color: #228B22;
      color: white;
      padding: 0.7em 1.5em;
      border: none;
      border-radius: 5px;
      margin-top: 1em;
      font-size: 1em;
      cursor: pointer;
    }
    .dashboard-buttons button:hover {
      background-color: #006400;
    }
    .logout {
      margin-top: 2em;
      display: inline-block;
      color: #228B22;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }
    .logout:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<header>
  <img src="Hollidays_Lawn_Garden_Logo.png" alt="Holliday's Lawn & Garden Logo" style="max-height: 80px; margin-top: 10px;">
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="pay-your-bill.html">Pay Your Bill</a>
    <a href="gallery.html">Gallery</a>
    <a href="login.html">Logout</a>
  </nav>
  <p>Customer Dashboard</p>
</header>

<main>
  <div class="dashboard-container fade-in">
    <h2 id="welcome">Welcome!</h2>

    <div id="invoiceSection" class="invoice-box" style="display:none;">
      <h3>Your Latest Invoice</h3>
      <div id="invoiceDetails"></div>
      <button onclick="downloadInvoice()">Download Invoice (PDF)</button>
    </div>

    <a onclick="logout()" class="logout">Logout</a>
  </div>
</main>

<footer>
  &copy; 2025 Holliday's Lawn & Garden. All rights reserved.
</footer>

<script>
  const db = firebase.firestore();
  let currentInvoiceData = null; // For use in PDF

  firebase.auth().onAuthStateChanged(user => {
    if (user) {
      document.getElementById('welcome').innerText = `Welcome, ${user.email}!`;

      // Load user's latest invoice
      db.collection("invoices")
        .where("customerEmail", "==", user.email)
        .orderBy("dueDate", "desc")
        .limit(1)
        .get()
        .then(snapshot => {
          if (!snapshot.empty) {
            const doc = snapshot.docs[0];
            currentInvoiceData = doc.data();
            displayInvoice(currentInvoiceData);
          }
        });

    } else {
      window.location.href = 'login.html';
    }
  });

  function displayInvoice(data) {
    const invoiceDetails = document.getElementById('invoiceDetails');
    invoiceDetails.innerHTML = `
      <div class="invoice-item"><strong>Invoice #:</strong> ${data.invoiceNumber}</div>
      <div class="invoice-item"><strong>Amount Due:</strong> $${data.amountDue.toFixed(2)}</div>
      <div class="invoice-item"><strong>Due Date:</strong> ${data.dueDate}</div>
    `;
    document.getElementById('invoiceSection').style.display = 'block';
  }

  async function downloadInvoice() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    if (!currentInvoiceData) {
      alert("No invoice found.");
      return;
    }

    doc.setFontSize(18);
    doc.text("Holliday's Lawn & Garden", 20, 20);
    doc.setFontSize(12);
    doc.text("Professional Lawn Care & Landscaping", 20, 28);

    doc.setLineWidth(0.5);
    doc.line(20, 32, 190, 32);

    doc.text(`Invoice #: ${currentInvoiceData.invoiceNumber}`, 20, 50);
    doc.text(`Customer Email: ${currentInvoiceData.customerEmail}`, 20, 60);
    doc.text(`Amount Due: $${currentInvoiceData.amountDue.toFixed(2)}`, 20, 70);
    doc.text(`Due Date: ${currentInvoiceData.dueDate}`, 20, 80);

    doc.setLineWidth(0.5);
    doc.line(20, 90, 190, 90);

    doc.text("Thank you for your business!", 20, 100);

    doc.save(`Invoice-${currentInvoiceData.invoiceNumber}.pdf`);
  }

  function logout() {
    firebase.auth().signOut().then(() => {
      window.location.href = "login.html";
    });
  }

  // Fade in animation
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.fade-in').forEach(section => {
    observer.observe(section);
  });
</script>

</body>
</html>
