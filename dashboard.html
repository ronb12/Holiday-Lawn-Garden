<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Dashboard - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>

  <style>
    .dashboard-container {
      max-width: 1000px;
      margin: 3em auto;
      padding: 2em;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ddd;
    }
    th {
      background-color: #228B22;
      color: white;
    }
    .btn {
      background-color: #228B22;
      color: white;
      border: none;
      padding: 0.5em 1em;
      margin: 5px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1em;
    }
    .btn:hover {
      background-color: #006400;
    }
    .logout {
      margin-top: 2em;
      display: inline-block;
      color: #228B22;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }
    .logout:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<header>
  <img src="Hollidays_Lawn_Garden_Logo.png" alt="Holliday's Lawn & Garden Logo" style="max-height: 80px; margin-top: 10px;">
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="gallery.html">Gallery</a>
    <a href="login.html">Logout</a>
  </nav>
  <p>Customer Dashboard</p>
</header>

<main>
  <div class="dashboard-container fade-in">
    <h2 id="welcome">Welcome!</h2>

    <h2>Your Invoices</h2>
    <table id="customerInvoicesTable">
      <thead>
        <tr>
          <th>Invoice #</th>
          <th>Amount</th>
          <th>Due Date</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <a onclick="logout()" class="logout">Logout</a>
  </div>
</main>

<footer>
  &copy; 2025 Holliday's Lawn & Garden. All rights reserved.
</footer>

<script>
  const db = firebase.firestore();
  let userEmail = "";

  firebase.auth().onAuthStateChanged(user => {
    if (user) {
      userEmail = user.email;
      document.getElementById('welcome').innerText = `Welcome, ${user.email}!`;
      loadCustomerInvoices();
    } else {
      window.location.href = "login.html";
    }
  });

  function loadCustomerInvoices() {
    db.collection("invoices").where("customerEmail", "==", userEmail).get()
      .then(snapshot => {
        const tbody = document.querySelector("#customerInvoicesTable tbody");
        tbody.innerHTML = "";
        snapshot.forEach(doc => {
          const data = doc.data();
          const row = `<tr>
            <td>${data.invoiceNumber}</td>
            <td>$${data.amountDue.toFixed(2)}</td>
            <td>${data.dueDate}</td>
            <td>${data.paid ? "Paid" : "Unpaid"}</td>
            <td>
              ${data.paid ? "✅ Paid" : `<button class="btn" onclick="payInvoice('${data.invoiceNumber}', ${data.amountDue})">Pay Now</button>`}
            </td>
          </tr>`;
          tbody.innerHTML += row;
        });
      })
      .catch(error => {
        console.error("Error loading invoices:", error);
        alert("❌ Error loading your invoices. Please try again.");
      });
  }

  function payInvoice(invoiceNumber, amount) {
    const paypalLink = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=your-paypal-email@example.com&item_name=Invoice%20${invoiceNumber}&amount=${amount}&currency_code=USD`;
    window.open(paypalLink, "_blank");
  }

  function logout() {
    firebase.auth().signOut().then(() => {
      window.location.href = "login.html";
    });
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.fade-in').forEach(section => {
    observer.observe(section);
  });
</script>

</body>
</html>
