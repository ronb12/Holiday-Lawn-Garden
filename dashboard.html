<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="firebase-init.js"></script>

  <style>
    .dashboard-container {
      max-width: 600px;
      margin: 3em auto;
      padding: 2em;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    .dashboard-info {
      margin-bottom: 2em;
    }
    .dashboard-buttons button {
      background-color: #228B22;
      color: white;
      border: none;
      padding: 0.7em 1.5em;
      margin: 0.5em;
      border-radius: 5px;
      font-size: 1em;
      cursor: pointer;
    }
    .dashboard-buttons button:hover {
      background-color: #006400;
    }
    .logout {
      margin-top: 2em;
      display: inline-block;
      color: #228B22;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }
    .logout:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <header>
    <img src="Hollidays_Lawn_Garden_Logo.png" alt="Holliday's Lawn & Garden Logo" style="max-height: 80px; margin-top: 10px;">
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="gallery.html">Gallery</a>
      <a href="login.html">Login</a>
    </nav>
    <p>Customer Dashboard</p>
  </header>

  <main>
    <div class="dashboard-container fade-in">
      <h2 id="welcome">Welcome!</h2>

      <div class="dashboard-info">
        <p><strong>Last Payment:</strong> Paid <strong>$120</strong> on <strong>April 20, 2025</strong>.</p>
        <p><strong>Next Service:</strong> Scheduled for <strong>May 5, 2025</strong>.</p>
      </div>

      <div class="dashboard-buttons">
        <button onclick="alert('Service request form coming soon!')">Request New Service</button>
        <button onclick="location.href='pay-your-bill.html'">Pay Another Invoice</button>
      </div>

      <a onclick="logout()" class="logout">Logout</a>
    </div>
  </main>

  <footer>
    &copy; 2025 Holliday's Lawn & Garden. All rights reserved.
  </footer>

  <script>
    // Firebase observer for auth state
    firebase.auth().onAuthStateChanged(user => {
      if (user) {
        const email = user.email;
        document.getElementById('welcome').innerText = `Welcome, ${email}!`;
      } else {
        // Not logged in, redirect to login page
        window.location.href = "login.html";
      }
    });

    function logout() {
      firebase.auth().signOut()
        .then(() => {
          window.location.href = "login.html";
        })
        .catch((error) => {
          alert(error.message);
        });
    }

    // Fade-in animation
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.fade-in').forEach(section => {
      observer.observe(section);
    });
  </script>

</body>
</html>
