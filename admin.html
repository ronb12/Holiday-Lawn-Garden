<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - Holliday's Lawn & Garden</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <style>
    body { font-family: Arial, sans-serif; background: #f4f9f4; margin: 0; }
    header, footer { background: #228B22; color: white; text-align: center; padding: 1em; }
    .admin-container { max-width: 1100px; margin: auto; padding: 2em; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    h2 { color: #228B22; text-align: center; }
    table { width: 100%; border-collapse: collapse; margin: 1em 0; }
    th, td { padding: 10px; border: 1px solid #ccc; text-align: left; }
    th { background: #228B22; color: white; }
    input, select { padding: 0.5em; margin: 0.3em 0; width: 100%; }
    button { background: #228B22; color: white; border: none; padding: 0.5em 1em; border-radius: 5px; cursor: pointer; font-weight: bold; }
    button:hover { background: #006400; }
    .logout { margin-top: 1em; color: #228B22; text-decoration: underline; cursor: pointer; }
  </style>
</head>
<body>

<header><h1>Admin Dashboard</h1></header>

<main class="admin-container">
  <h2>Service Requests</h2>
  <table id="serviceRequestsTable">
    <thead>
      <tr><th>Name</th><th>Email</th><th>Request</th><th>Status</th><th>Update</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>Invoice from Request</h2>
  <div id="invoiceFormWrapper" style="display:none;">
    <form id="invoiceForm" onsubmit="createInvoice(event)">
      <input type="email" id="invoiceEmail" placeholder="Customer Email" required>
      <input type="text" id="invoiceNumber" placeholder="Invoice Number" required>
      <input type="date" id="invoiceDueDate" required><br>
      <input type="text" id="invoiceDescription" placeholder="Description" required>
      <input type="number" id="invoiceAmount" placeholder="Amount ($)" min="0" step="0.01" required><br>
      <button type="submit">Create Invoice</button>
    </form>
  </div>

  <a onclick="logout()" class="logout">Logout</a>
</main>

<footer id="footer"></footer>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="firebase-init.js"></script>

<script>
const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user => {
  if (user?.email === "ronellbradley@bradleyvs.com") {
    loadRequests();
  } else {
    window.location.href = "login.html";
  }
});

function loadRequests() {
  const tbody = document.querySelector("#serviceRequestsTable tbody");
  db.collection("service_requests").where("archived", "!=", true).onSnapshot(snapshot => {
    tbody.innerHTML = "";
    snapshot.forEach(doc => {
      const r = doc.data();
      tbody.innerHTML += `
        <tr>
          <td>${r.fullName || ''}</td>
          <td>${r.email || ''}</td>
          <td>${r.notes || ''}</td>
          <td>${r.status || "Pending"}</td>
          <td>
            <select onchange="updateStatus('${doc.id}', this.value, '${r.fullName}', '${r.email}', \`${r.notes}\`)">
              <option value="">Change</option>
              <option value="Approved">Approved</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
            </select>
          </td>
        </tr>`;
    });
  });
}

function updateStatus(id, status, name, email, notes) {
  db.collection("service_requests").doc(id).update({ status }).then(() => {
    if (status === "Completed") {
      if (confirm("✅ Request marked as Completed. Do you want to convert this into an invoice?")) {
        document.getElementById("invoiceFormWrapper").style.display = "block";
        document.getElementById("invoiceEmail").value = email;
        document.getElementById("invoiceDescription").value = notes || `Service Request from ${name}`;
        document.getElementById("invoiceNumber").value = "INV-" + Math.floor(Math.random() * 100000);
        document.getElementById("invoiceDueDate").valueAsDate = new Date();
        db.collection("service_requests").doc(id).update({ archived: true });
      }
    }
  });
}

function createInvoice(e) {
  e.preventDefault();
  const email = document.getElementById("invoiceEmail").value;
  const number = document.getElementById("invoiceNumber").value;
  const dueDate = document.getElementById("invoiceDueDate").value;
  const description = document.getElementById("invoiceDescription").value;
  const amount = parseFloat(document.getElementById("invoiceAmount").value || 0);

  db.collection("invoices").add({
    customerEmail: email,
    invoiceNumber: number,
    services: [{ description, amount }],
    amountDue: amount,
    dueDate: dueDate,
    paid: false,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(() => {
    alert("✅ Invoice created.");
    document.getElementById("invoiceFormWrapper").style.display = "none";
    document.getElementById("invoiceForm").reset();
  });
}

function logout() {
  firebase.auth().signOut().then(() => window.location.href = "login.html");
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("footer").innerHTML =
    `&copy; ${new Date().getFullYear()} Holliday's Lawn & Garden. All rights reserved.`;
});
</script>
</body>
</html>
