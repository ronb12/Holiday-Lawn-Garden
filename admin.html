<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    /* Admin styles (keep same) */
    .admin-container { max-width: 1200px; margin: 3em auto; padding: 2em; background: white; border-radius: 8px; text-align: center; }
    table { width: 100%; margin-top: 20px; border-collapse: collapse; }
    th, td { padding: 10px; border: 1px solid #ddd; }
    th { background-color: #228B22; color: white; }
    td.overdue { background-color: #ffcccc; }
    button { background-color: #228B22; color: white; border: none; padding: 0.5em 1em; margin: 5px; border-radius: 5px; cursor: pointer; }
    button:hover { background-color: #006400; }
    .logout { margin-top: 2em; display: inline-block; color: #228B22; text-decoration: none; font-weight: bold; cursor: pointer; }
    .logout:hover { text-decoration: underline; }
    input { padding: 0.5em; margin: 0.5em; width: 250px; }
    #loadingSpinner { display: none; margin-top: 20px; font-size: 1.2em; color: #228B22; }
  </style>
</head>
<body>

<header>
  <img src="Hollidays_Lawn_Garden_Logo.png" alt="Holliday's Lawn & Garden Logo" style="max-height: 80px; margin-top: 10px;">
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="gallery.html">Gallery</a>
    <a href="login.html">Login</a>
  </nav>
  <p>Admin Dashboard</p>
</header>

<main>
  <div class="admin-container fade-in">
    <h2>Create Invoice</h2>
    <form id="invoiceForm" onsubmit="createInvoice(event)">
      <input type="text" id="invoiceEmail" placeholder="Customer Email" required><br>
      <input type="text" id="invoiceNumber" placeholder="Invoice Number" required><br>
      <input type="date" id="invoiceDueDate" required><br>
      <input type="number" id="taxRate" placeholder="Tax Rate (%) - Optional"><br>

      <h3>Add Services</h3>
      <div id="servicesList"></div>
      <button type="button" onclick="addService()">➕ Add Service</button><br><br>

      <button type="submit">Create Invoice</button>
    </form>

    <h2>Invoices</h2>
    <table id="invoicesTable">
      <thead>
        <tr>
          <th>Customer</th>
          <th>Email</th>
          <th>Invoice #</th>
          <th>Amount Due</th>
          <th>Due Date</th>
          <th>Status</th>
          <th>PDF</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <a onclick="logout()" class="logout">Logout</a>
    <div id="loadingSpinner">Logging out...</div>
  </div>
</main>

<footer>
  &copy; 2025 Holliday's Lawn & Garden. All rights reserved.
</footer>

<script>
const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user => {
  if (user) {
    const adminEmails = ["ronellbradley@bradleyvs.com"];
    if (!adminEmails.includes(user.email)) {
      alert("Access Denied. Redirecting...");
      window.location.href = "index.html";
    } else {
      loadInvoices();
    }
  } else {
    window.location.href = "login.html";
  }
});

function addService() {
  const div = document.createElement('div');
  div.innerHTML = `
    <input type="text" placeholder="Service Description" class="serviceDesc" required>
    <input type="number" placeholder="Service Amount" class="serviceAmount" required><br>
  `;
  document.getElementById('servicesList').appendChild(div);
}

function createInvoice(event) {
  event.preventDefault();
  const email = document.getElementById('invoiceEmail').value;
  const number = document.getElementById('invoiceNumber').value;
  const dueDate = document.getElementById('invoiceDueDate').value;
  const taxRate = parseFloat(document.getElementById('taxRate').value) || 0;

  const serviceDescs = Array.from(document.getElementsByClassName('serviceDesc')).map(input => input.value);
  const serviceAmounts = Array.from(document.getElementsByClassName('serviceAmount')).map(input => parseFloat(input.value));
  
  const services = serviceDescs.map((desc, idx) => ({
    description: desc,
    amount: serviceAmounts[idx]
  }));

  const subtotal = serviceAmounts.reduce((sum, amt) => sum + amt, 0);
  const tax = subtotal * (taxRate / 100);
  const grandTotal = subtotal + tax;

  db.collection("invoices").add({
    customerEmail: email,
    invoiceNumber: number,
    dueDate: dueDate,
    services: services,
    taxRate: taxRate,
    subtotal: subtotal,
    tax: tax,
    grandTotal: grandTotal,
    paid: false,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  })
  .then(() => {
    alert("✅ Invoice Created!");
    document.getElementById('invoiceForm').reset();
    document.getElementById('servicesList').innerHTML = '';
    loadInvoices();
  })
  .catch(error => {
    console.error("Error creating invoice:", error);
    alert("❌ Error creating invoice.");
  });
}

function loadInvoices() {
  const tbody = document.querySelector("#invoicesTable tbody");
  tbody.innerHTML = "";

  db.collection("invoices").orderBy("dueDate", "asc").get().then(snapshot => {
    snapshot.forEach(doc => {
      const data = doc.data();
      const row = `<tr>
        <td>${data.customerEmail.split('@')[0]}</td>
        <td>${data.customerEmail}</td>
        <td>${data.invoiceNumber}</td>
        <td>$${data.grandTotal.toFixed(2)}</td>
        <td>${data.dueDate}</td>
        <td>${data.paid ? "Paid" : "Unpaid"}</td>
        <td><button onclick="downloadPDF('${doc.id}')">📄 Download</button></td>
      </tr>`;
      tbody.innerHTML += row;
    });
  });
}

async function downloadPDF(invoiceId) {
  const docRef = await db.collection("invoices").doc(invoiceId).get();
  const data = docRef.data();
  
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  pdf.addImage("Hollidays_Lawn_Garden_Logo.png", "PNG", 10, 10, 40, 20);
  pdf.setFontSize(18);
  pdf.text("INVOICE", 105, 40, { align: "center" });

  pdf.setFontSize(12);
  pdf.text(`Customer: ${data.customerEmail}`, 20, 60);
  pdf.text(`Invoice #: ${data.invoiceNumber}`, 20, 70);
  pdf.text(`Due Date: ${data.dueDate}`, 20, 80);

  let y = 100;
  pdf.text("Services:", 20, y);
  y += 10;

  data.services.forEach(service => {
    pdf.text(`${service.description}`, 25, y);
    pdf.text(`$${service.amount.toFixed(2)}`, 160, y, { align: "right" });
    y += 10;
  });

  pdf.line(20, y, 190, y);
  y += 10;
  pdf.text(`Subtotal: $${data.subtotal.toFixed(2)}`, 160, y, { align: "right" });
  y += 10;
  pdf.text(`Tax: $${data.tax.toFixed(2)}`, 160, y, { align: "right" });
  y += 10;
  pdf.text(`Grand Total: $${data.grandTotal.toFixed(2)}`, 160, y, { align: "right" });

  pdf.save(`Invoice_${data.invoiceNumber}.pdf`);
}

function logout() {
  document.getElementById('loadingSpinner').style.display = 'block';
  firebase.auth().signOut().then(() => {
    setTimeout(() => {
      alert("✅ Logged out successfully!");
      window.location.href = "login.html";
    }, 1000);
  }).catch(error => {
    console.error("Logout error:", error);
    alert("❌ Error logging out. Please try again.");
  });
}
</script>

</body>
</html>
