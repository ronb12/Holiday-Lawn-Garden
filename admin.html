<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - Holliday's Lawn & Garden</title>
  <link rel="icon" href="icons/icon-192.png" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: Arial; background: #f4f9f4; margin: 0; }
    header, footer { background: #228B22; color: white; padding: 1em; text-align: center; }
    .admin-container { max-width: 1100px; margin: auto; padding: 2em; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    h2 { color: #228B22; }
    table { width: 100%; border-collapse: collapse; margin: 1em 0; }
    th, td { border: 1px solid #ccc; padding: 10px; }
    th { background: #228B22; color: white; }
    input, select { padding: 0.5em; width: 100%; margin-top: 0.3em; }
    button { background: #228B22; color: white; border: none; padding: 0.5em 1em; border-radius: 5px; cursor: pointer; }
    button:hover { background: #006400; }
    .service-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .service-row input, .service-row select { flex: 1; }
    .summary { display: flex; justify-content: space-between; background: #e8f5e9; padding: 1em; border-radius: 8px; margin-top: 1em; }
    .export-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 10px; }
  </style>
</head>
<body>
<header><h1>Admin Dashboard</h1></header>
<main class="admin-container">
  <div class="summary">
    <div>📄 <strong>Quotes Pending:</strong> <span id="quoteCount">0</span></div>
    <div>🧾 <strong>Invoices Due:</strong> <span id="invoiceCount">0</span></div>
    <div>💵 <strong>Total Paid:</strong> $<span id="totalPaid">0.00</span></div>
  </div>

  <h2>Service Requests</h2>
  <table id="serviceRequestsTable">
    <thead>
      <tr><th>Name</th><th>Email</th><th>Address</th><th>Request</th><th>Status</th><th>Update</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>Create Invoice</h2>
  <form id="invoiceForm" onsubmit="createInvoice(event)">
    <input type="email" id="invoiceEmail" placeholder="Customer Email" required />
    <div class="service-row">
      <input id="street" placeholder="Street Address" />
      <input id="city" placeholder="City" />
      <input id="state" placeholder="State" />
      <input id="zip" placeholder="ZIP Code" />
    </div>
    <input type="text" id="invoiceNumber" placeholder="Invoice Number" required />
    <input type="date" id="invoiceDueDate" required />
    <div id="serviceList"></div>
    <button type="button" onclick="addServiceRow()">+ Add Service</button>
    <p><strong>Total: $<span id="totalAmount">0.00</span></strong></p>
    <button type="submit">Create Invoice</button>
  </form>

  <h2>Invoices Due</h2>
  <div class="export-buttons">
    <button onclick="exportInvoicesCSV(false)">📤 Export Unpaid (CSV)</button>
  </div>
  <table id="invoicesDueTable"><thead><tr><th>Email</th><th>Invoice #</th><th>Amount</th><th>Due</th><th>Status</th><th>Actions</th></tr></thead><tbody></tbody></table>

  <h2>Paid Invoices</h2>
  <div class="export-buttons">
    <button onclick="exportInvoicesCSV(true)">📤 Export Paid (CSV)</button>
  </div>
  <table id="invoicesPaidTable"><thead><tr><th>Email</th><th>Invoice #</th><th>Amount</th><th>Due</th><th>Status</th><th>Download</th></tr></thead><tbody></tbody></table>

  <br /><button onclick="logout()">Logout</button>
</main>
<footer>&copy; 2025 Holliday's Lawn & Garden</footer>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="firebase-init.js"></script>

<script>
const db = firebase.firestore();
let currentUser;
let invoiceSequence = 1000;

firebase.auth().onAuthStateChanged(async user => {
  if (!user) return location.href = "login.html";
  currentUser = user;
  const roleDoc = await db.collection("users").doc(user.uid).get();
  if (roleDoc.exists && roleDoc.data().role === "admin") {
    fetchInvoiceSequence();
    addServiceRow();
    loadServiceRequests(); // ✅ FIXED: Now declared correctly in Part 2
    loadQuotes();
    loadInvoices();
  } else {
    alert("Access denied. Admins only.");
    location.href = "login.html";
  }
});
</script>
<script>
function fetchInvoiceSequence() {
  db.collection("meta").doc("counters").get().then(doc => {
    invoiceSequence = doc.exists ? (doc.data().invoice || 1000) : 1000;
    document.getElementById("invoiceNumber").value = invoiceSequence;
  });
}

function addServiceRow(desc = "", amt = "") {
  const container = document.getElementById("serviceList");
  const row = document.createElement("div");
  row.className = "service-row";
  row.innerHTML = `
    <select onchange="this.nextElementSibling.value=this.value==='Custom'?'':this.value; calcTotal();">
      <option value="">Select Service</option>
      <option value="Lawn Mowing">Lawn Mowing</option>
      <option value="Leaf Raking">Leaf Raking</option>
      <option value="Hedge Trimming">Hedge Trimming</option>
      <option value="Custom">Custom</option>
    </select>
    <input type="text" placeholder="Description" value="${desc}" />
    <input type="number" placeholder="Amount" value="${amt}" step="0.01" oninput="calcTotal()" />
    <button type="button" onclick="this.parentElement.remove(); calcTotal()">❌</button>
  `;
  container.appendChild(row);
  calcTotal();
}

function calcTotal() {
  let total = 0;
  document.querySelectorAll("#serviceList .service-row").forEach(row => {
    total += parseFloat(row.querySelector("input[type=number]").value || 0);
  });
  document.getElementById("totalAmount").innerText = total.toFixed(2);
}

function createInvoice(e) {
  e.preventDefault();
  const email = document.getElementById("invoiceEmail").value.trim();
  const number = document.getElementById("invoiceNumber").value.trim();
  const due = document.getElementById("invoiceDueDate").value;
  const services = [];
  document.querySelectorAll("#serviceList .service-row").forEach(row => {
    const desc = row.querySelector("input[type=text]").value.trim();
    const amt = parseFloat(row.querySelector("input[type=number]").value || 0);
    if (desc && amt) services.push({ description: desc, amount: amt });
  });
  const total = services.reduce((sum, s) => sum + s.amount, 0);
  const address = {
    street: document.getElementById("street").value,
    city: document.getElementById("city").value,
    state: document.getElementById("state").value,
    zip: document.getElementById("zip").value
  };

  if (!email || !number || !due || services.length === 0) {
    alert("❌ Please fill in all fields and add at least one service.");
    return;
  }

  db.collection("invoices").add({
    customerEmail: email,
    invoiceNumber: number,
    services,
    amountDue: total,
    dueDate: due,
    ...address,
    paid: false,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(() => {
    invoiceSequence++;
    db.collection("meta").doc("counters").set({ invoice: invoiceSequence }, { merge: true });
    alert("✅ Invoice Created");
    document.getElementById("invoiceForm").reset();
    document.getElementById("serviceList").innerHTML = "";
    addServiceRow();
    loadInvoices();
  }).catch(error => {
    alert("❌ Error creating invoice: " + error.message);
  });
}

function loadServiceRequests() {
  const tbody = document.querySelector("#serviceRequestsTable tbody");
  if (!tbody) return;
  db.collection("service_requests").orderBy("timestamp", "desc").onSnapshot(snapshot => {
    tbody.innerHTML = "";
    snapshot.forEach(doc => {
      const r = doc.data();
      const address = `${r.street || ""}, ${r.city || ""}, ${r.state || ""} ${r.zip || ""}`;
      tbody.innerHTML += `
        <tr>
          <td>${r.fullName || ""}</td>
          <td>${r.email || ""}</td>
          <td>${address}</td>
          <td><strong>Service:</strong> ${r.serviceType || "N/A"}<br/><strong>Notes:</strong> ${r.notes || "None"}</td>
          <td>${r.status || "Pending"}</td>
          <td>
            <select onchange="updateStatus('${doc.id}', this.value)">
              <option value="">Change</option>
              <option value="Approved">Approved</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
            </select>
          </td>
        </tr>`;
    });
  });
}

function updateStatus(id, status) {
  if (status === "Completed") {
    db.collection("service_requests").doc(id).get().then(doc => {
      const d = doc.data();
      const amount = prompt("Enter a quote amount:");
      if (!amount || isNaN(amount)) return alert("❌ Invalid quote amount.");
      db.collection("quotes").add({
        ...d,
        quote: d.serviceType,
        amount: parseFloat(amount),
        createdAt: new Date(),
        status: "Pending"
      }).then(() => db.collection("service_requests").doc(id).delete());
    });
  } else {
    db.collection("service_requests").doc(id).update({ status });
  }
}

function exportInvoicesCSV(paid) {
  db.collection("invoices").where("paid", "==", paid).get().then(snapshot => {
    const rows = [];
    snapshot.forEach(doc => rows.push(doc.data()));
    const csv = Papa.unparse(rows);
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = paid ? "invoices_paid.csv" : "invoices_due.csv";
    a.click();
    URL.revokeObjectURL(url);
  });
}

function logout() {
  firebase.auth().signOut().then(() => location.href = "login.html");
}
</script>
</body>
</html>
