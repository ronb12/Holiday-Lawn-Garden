<!-- Full Upgraded Admin Dashboard - Holliday's Lawn & Garden -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f9f4; margin: 0; }
    header, footer { background: #228B22; color: white; text-align: center; padding: 1em; }
    .admin-container { max-width: 1200px; margin: auto; padding: 2em; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    table { width: 100%; border-collapse: collapse; margin: 1em 0; }
    th, td { padding: 10px; border: 1px solid #ccc; text-align: left; }
    th { background: #228B22; color: white; }
    .overdue { background: #ffe5e5; }
    input, select { padding: 0.5em; margin: 0.3em 0; width: 100%; }
    button { background: #228B22; color: white; border: none; padding: 0.5em 1em; border-radius: 5px; cursor: pointer; }
    button:hover { background: #006400; }
    .logout { margin-top: 1em; color: #228B22; text-decoration: underline; cursor: pointer; }
    .service-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .service-row input, .service-row select { flex: 1; }
  </style>
</head>
<body>
<header><h1>Admin Dashboard</h1></header>
<main class="admin-container">

  <h2>Create Invoice</h2>
  <form id="invoiceForm" onsubmit="createInvoice(event)">
    <input type="email" id="invoiceEmail" placeholder="Customer Email" required>
    <input type="text" id="invoiceNumber" placeholder="Invoice Number" required>
    <input type="date" id="invoiceDueDate" required><br>
    
    <div id="serviceList">
      <!-- Service rows inserted here -->
    </div>
    <button type="button" onclick="addServiceRow()">+ Add Service</button>

    <p><strong>Total: $<span id="totalAmount">0.00</span></strong></p>
    <button type="submit">Create Invoice</button>
  </form>

  <h2>Invoices Due</h2>
  <table id="invoicesDueTable">
    <thead>
      <tr><th>Customer</th><th>Email</th><th>Invoice #</th><th>Amount</th><th>Due Date</th><th>Status</th><th>Actions</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>Paid Invoices</h2>
  <table id="invoicesPaidTable">
    <thead>
      <tr><th>Customer</th><th>Email</th><th>Invoice #</th><th>Amount</th><th>Due Date</th><th>Status</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <a onclick="logout()" class="logout">Logout</a>
</main>
<footer id="footer"></footer>

<script>
const db = firebase.firestore();
const preloadedServices = ["Lawn Mowing", "Hedge Trimming", "Leaf Cleanup", "Garden Design"];

firebase.auth().onAuthStateChanged(user => {
  if (user?.email === "ronellbradley@bradleyvs.com") {
    loadInvoices();
    addServiceRow();
  } else {
    window.location.href = "login.html";
  }
});

function addServiceRow() {
  const container = document.getElementById("serviceList");
  const row = document.createElement("div");
  row.className = "service-row";
  row.innerHTML = `
    <select onchange="calcTotal(this)">
      <option value="">Select Service</option>
      ${preloadedServices.map(s => `<option value="${s}">${s}</option>`).join("")}
      <option value="Custom">Other (manual entry)</option>
    </select>
    <input type="text" placeholder="Description" oninput="calcTotal(this)">
    <input type="number" placeholder="Amount ($)" min="0" step="0.01" oninput="calcTotal(this)">
    <button type="button" onclick="this.parentElement.remove(); calcTotal()">❌</button>
  `;
  container.appendChild(row);
}

function calcTotal() {
  const rows = document.querySelectorAll(".service-row");
  let total = 0;
  rows.forEach(row => {
    const amountInput = row.querySelector("input[type=number]");
    total += parseFloat(amountInput.value || 0);
  });
  document.getElementById("totalAmount").innerText = total.toFixed(2);
}

function createInvoice(e) {
  e.preventDefault();
  const email = document.getElementById("invoiceEmail").value;
  const number = document.getElementById("invoiceNumber").value;
  const due = document.getElementById("invoiceDueDate").value;
  const rows = document.querySelectorAll(".service-row");
  const services = [];

  rows.forEach(row => {
    const sel = row.querySelector("select").value;
    const desc = row.querySelector("input[type=text]").value;
    const amt = parseFloat(row.querySelector("input[type=number]").value || 0);
    if (desc && amt) services.push({ description: desc || sel, amount: amt });
  });

  const total = services.reduce((sum, s) => sum + s.amount, 0);

  db.collection("invoices").add({
    customerEmail: email,
    invoiceNumber: number,
    services,
    amountDue: total,
    dueDate: due,
    paid: false,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(() => {
    alert("✅ Invoice Created");
    document.getElementById("invoiceForm").reset();
    document.getElementById("serviceList").innerHTML = "";
    addServiceRow();
    calcTotal();
    loadInvoices();
  });
}

function loadInvoices() {
  const dueTbody = document.querySelector("#invoicesDueTable tbody");
  const paidTbody = document.querySelector("#invoicesPaidTable tbody");
  dueTbody.innerHTML = ""; paidTbody.innerHTML = "";

  db.collection("invoices").orderBy("dueDate", "asc").get().then(snapshot => {
    snapshot.forEach(doc => {
      const d = doc.data();
      const isOverdue = !d.paid && new Date(d.dueDate) < new Date();
      const row = `
        <tr class="${isOverdue ? "overdue" : ""}">
          <td>${d.customerEmail.split('@')[0]}</td>
          <td>${d.customerEmail}</td>
          <td>${d.invoiceNumber}</td>
          <td>$${d.amountDue.toFixed(2)}</td>
          <td>${d.dueDate}</td>
          <td>${d.paid ? "Paid" : "Unpaid"}</td>
          <td>
            ${!d.paid ? `<button onclick="markPaid('${doc.id}')">Mark Paid</button>` : ""}
            <button onclick='viewInvoice(${JSON.stringify(d)})'>View</button>
            <button onclick="deleteInvoice('${doc.id}')">Delete</button>
          </td>
        </tr>
      `;
      d.paid ? paidTbody.innerHTML += row : dueTbody.innerHTML += row;
    });
  });
}

function viewInvoice(data) {
  const win = window.open("", "_blank");
  win.document.write(`
    <html><head><title>Invoice ${data.invoiceNumber}</title></head>
    <body style="font-family:Arial;padding:2em;">
      <h2 style="color:#228B22;">Holliday's Lawn & Garden</h2>
      <p><strong>Owner:</strong> Karl Holliday<br>
         <strong>Phone:</strong> 504-717-1887<br>
         <strong>Email:</strong> 7holliday@gmail.com</p>
      <hr>
      <h3>Invoice #: ${data.invoiceNumber}</h3>
      <p><strong>Customer:</strong> ${data.customerEmail}</p>
      <p><strong>Due Date:</strong> ${new Date(data.dueDate).toLocaleDateString()}</p>
      <table style="width:100%;border-collapse:collapse;" border="1">
        <thead><tr><th>Description</th><th>Amount</th></tr></thead>
        <tbody>
          ${data.services.map(s => `<tr><td>${s.description}</td><td>$${s.amount.toFixed(2)}</td></tr>`).join("")}
        </tbody>
      </table>
      <h3 style="text-align:right;">Total: $${data.amountDue.toFixed(2)}</h3>
      <p style="text-align:center;">Thank you for your business!</p>
      <button onclick="window.print()">🖨️ Print Invoice</button>
    </body></html>
  `);
}

function markPaid(id) {
  db.collection("invoices").doc(id).update({ paid: true }).then(loadInvoices);
}

function deleteInvoice(id) {
  if (confirm("Delete this invoice?")) {
    db.collection("invoices").doc(id).delete().then(loadInvoices);
  }
}

function logout() {
  firebase.auth().signOut().then(() => window.location.href = "login.html");
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("footer").innerHTML = `&copy; ${new Date().getFullYear()} Holliday's Lawn & Garden. All rights reserved.`;
});
</script>
</body>
</html>
