<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard - Holliday's Lawn & Garden</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="firebase-init.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f9f4; padding: 1em; }
    header, footer { background: #228B22; color: white; text-align: center; padding: 1em; }
    h1, h2 { margin: 0.5em 0; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 2em; }
    th, td { border: 1px solid #ccc; padding: 0.5em; text-align: left; }
    th { background: #e4f5e4; position: sticky; top: 0; }
    .tag { padding: 0.2em 0.5em; border-radius: 5px; font-size: 0.85em; }
    .pending { background: orange; color: white; }
    .in-progress { background: dodgerblue; color: white; }
    .completed { background: green; color: white; }
    .paid { background: green; color: white; }
    .unpaid { background: crimson; color: white; }
    .section { background: white; padding: 1em; margin-bottom: 2em; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .flex { display: flex; justify-content: space-between; gap: 1em; flex-wrap: wrap; }
    button { padding: 0.5em 1em; margin-top: 0.5em; }
    .progress-bar { height: 20px; background: #eee; border-radius: 10px; overflow: hidden; margin-top: 1em; }
    .progress-fill { height: 100%; background: green; width: 0%; text-align: center; color: white; font-size: 0.9em; }
  </style>
</head>
<body>
<header>
  <h1>Admin Dashboard</h1>
  <p>Holliday's Lawn & Garden</p>
</header>

<main>
  <div class="section">
    <h2>Service Requests</h2>
    <table id="requestsTable">
      <thead><tr><th>Name</th><th>Service</th><th>Status</th><th>Date</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="section">
    <h2>Quotes</h2>
    <table id="quotesTable">
      <thead><tr><th>Customer</th><th>Service</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="section">
    <h2>Invoices</h2>
    <table id="invoicesTable">
      <thead><tr><th>Customer</th><th>Invoice #</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="section">
    <h2>Auto-Profit Calculator</h2>
    <label>Service Type: <input type="text" id="serviceType" placeholder="Lawn Mowing" /></label><br>
    <label>Labor Cost: $<input type="number" id="laborCost" /></label><br>
    <label>Materials Cost: $<input type="number" id="materialsCost" /></label><br>
    <label>Overhead: $<input type="number" id="overheadCost" /></label><br>
    <label>Guaranteed Profit: $<input type="number" id="profitTarget" value="50" /></label><br>
    <button onclick="calculatePrice()">Calculate Final Price</button>
    <p id="finalPrice"></p>
    <div class="progress-bar"><div id="profitProgress" class="progress-fill">0%</div></div>
  </div>
</main>

<footer>
  &copy; 2025 Holliday's Lawn & Garden. All rights reserved.
</footer>

<script>
  const db = firebase.firestore();

  // Load service requests
  db.collection("requests").onSnapshot(snapshot => {
    const table = document.querySelector("#requestsTable tbody");
    table.innerHTML = "";
    snapshot.forEach(doc => {
      const data = doc.data();
      const row = `
        <tr>
          <td>${data.name}</td>
          <td>${data.service}</td>
          <td><span class="tag ${data.status.toLowerCase().replace(" ", "-")}">${data.status}</span></td>
          <td>${new Date(data.createdAt?.seconds * 1000).toLocaleDateString()}</td>
        </tr>`;
      table.innerHTML += row;
    });
  });

  // Load quotes
  db.collection("quotes").onSnapshot(snapshot => {
    const table = document.querySelector("#quotesTable tbody");
    table.innerHTML = "";
    snapshot.forEach(doc => {
      const data = doc.data();
      const row = `
        <tr>
          <td>${data.name}</td>
          <td>${data.service}</td>
          <td>$${data.amount.toFixed(2)}</td>
          <td>${data.status}</td>
          <td><button onclick="convertToInvoice('${doc.id}', ${data.amount})">Convert</button></td>
        </tr>`;
      table.innerHTML += row;
    });
  });

  // Load invoices
  db.collection("invoices").onSnapshot(snapshot => {
    const table = document.querySelector("#invoicesTable tbody");
    table.innerHTML = "";
    snapshot.forEach(doc => {
      const data = doc.data();
      const row = `
        <tr>
          <td>${data.customer}</td>
          <td>${data.invoiceNumber}</td>
          <td>$${data.amount.toFixed(2)}</td>
          <td><span class="tag ${data.paid ? 'paid' : 'unpaid'}">${data.paid ? "Paid" : "Unpaid"}</span></td>
          <td><button onclick="downloadInvoice('${doc.id}')">PDF</button></td>
        </tr>`;
      table.innerHTML += row;
    });
  });

  // Convert quote to invoice
  function convertToInvoice(quoteId, amount) {
    db.collection("quotes").doc(quoteId).get().then(doc => {
      const data = doc.data();
      db.collection("invoices").add({
        customer: data.name,
        amount,
        invoiceNumber: `INV${Date.now()}`,
        paid: false,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      alert("✅ Quote converted to invoice.");
    });
  }

  // Download invoice as PDF
  async function downloadInvoice(invoiceId) {
    const doc = await db.collection("invoices").doc(invoiceId).get();
    const data = doc.data();
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();
    pdf.text("Invoice - Holliday's Lawn & Garden", 10, 10);
    pdf.text(`Invoice #: ${data.invoiceNumber}`, 10, 20);
    pdf.text(`Customer: ${data.customer}`, 10, 30);
    pdf.text(`Amount: $${data.amount.toFixed(2)}`, 10, 40);
    pdf.text(`Status: ${data.paid ? "Paid" : "Unpaid"}`, 10, 50);
    pdf.save(`${data.invoiceNumber}.pdf`);
  }

  // Profit calculator
  function calculatePrice() {
    const labor = parseFloat(document.getElementById("laborCost").value) || 0;
    const materials = parseFloat(document.getElementById("materialsCost").value) || 0;
    const overhead = parseFloat(document.getElementById("overheadCost").value) || 0;
    const targetProfit = parseFloat(document.getElementById("profitTarget").value) || 0;

    const totalCost = labor + materials + overhead;
    const finalPrice = totalCost + targetProfit;
    const percentProfit = ((targetProfit / finalPrice) * 100).toFixed(0);

    document.getElementById("finalPrice").innerText = `Suggested Price: $${finalPrice.toFixed(2)}`;
    const bar = document.getElementById("profitProgress");
    bar.style.width = percentProfit + "%";
    bar.innerText = percentProfit + "% Profit";
  }
</script>
</body>
</html>
