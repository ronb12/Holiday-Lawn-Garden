<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard – Holliday's Lawn & Garden</title>
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f9f4; }
    header, footer { background: #228B22; color: white; padding: 1em; text-align: center; }
    nav button { margin: 0.5em; padding: 0.5em 1em; cursor: pointer; background: #eee; border: 1px solid #ccc; }
    .active-tab { background: #228B22; color: white; }
    .tab-content { display: none; padding: 1em; }
    .tab-content.active { display: block; }
    table { width: 100%; border-collapse: collapse; margin-top: 1em; }
    th, td { padding: 0.5em; border: 1px solid #ccc; }
    button { cursor: pointer; }
  </style>
</head>
<body>

<header>
  <h1>Admin Dashboard – Holliday's Lawn & Garden</h1>
</header>

<nav>
  <button onclick="showTab('requests')">Service Requests</button>
  <button onclick="showTab('quotes')">Quotes</button>
  <button onclick="showTab('invoices')">Invoices</button>
</nav>

<main>
  <!-- Service Requests Tab -->
  <section id="requests" class="tab-content">
    <h2>Service Requests</h2>
    <table id="requestsTable">
      <thead><tr><th>Customer</th><th>Description</th><th>Status</th><th>Action</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <!-- Quotes Tab -->
  <section id="quotes" class="tab-content">
    <h2>Quotes</h2>
    <table id="quotesTable">
      <thead><tr><th>Customer</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <!-- Invoices Tab -->
  <section id="invoices" class="tab-content">
    <h2>Invoices</h2>
    <table id="invoicesTable">
      <thead><tr><th>Customer</th><th>Amount</th><th>Due Date</th><th>Status</th><th>Action</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>
</main>

<footer>
  <p>&copy; 2025 Holliday's Lawn & Garden</p>
</footer>

<script>
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'requests') loadRequests();
    if (id === 'quotes') loadQuotes();
    if (id === 'invoices') loadInvoices();
  }

  function loadRequests() {
    const tbody = document.querySelector("#requestsTable tbody");
    db.collection("requests").get().then(snapshot => {
      tbody.innerHTML = "";
      snapshot.forEach(doc => {
        const d = doc.data();
        tbody.innerHTML += `
          <tr>
            <td>${d.customer}</td>
            <td>${d.description}</td>
            <td>${d.status}</td>
            <td>
              <button onclick="markRequestCompleted('${doc.id}')">Complete</button>
              <button onclick="createQuoteFromRequest('${doc.id}')">Quote</button>
            </td>
          </tr>`;
      });
    });
  }

  function loadQuotes() {
    const tbody = document.querySelector("#quotesTable tbody");
    db.collection("quotes").get().then(snapshot => {
      tbody.innerHTML = "";
      snapshot.forEach(doc => {
        const d = doc.data();
        tbody.innerHTML += `
          <tr>
            <td>${d.customer}</td>
            <td>$${d.amount}</td>
            <td>${d.status}</td>
            <td>
              <button onclick="convertQuoteToInvoice('${doc.id}')">Convert</button>
              <button onclick="deleteQuote('${doc.id}')">Delete</button>
            </td>
          </tr>`;
      });
    });
  }

  function loadInvoices() {
    const tbody = document.querySelector("#invoicesTable tbody");
    db.collection("invoices").get().then(snapshot => {
      tbody.innerHTML = "";
      snapshot.forEach(doc => {
        const d = doc.data();
        tbody.innerHTML += `
          <tr>
            <td>${d.customer}</td>
            <td>$${d.amount}</td>
            <td>${d.dueDate}</td>
            <td>${d.paid ? "Paid" : "Unpaid"}</td>
            <td>
              <button onclick="markInvoicePaid('${doc.id}')">Mark Paid</button>
            </td>
          </tr>`;
      });
    });
  }

  function markRequestCompleted(id) {
    db.collection("requests").doc(id).update({ status: "Completed" }).then(loadRequests);
  }

  function createQuoteFromRequest(id) {
    db.collection("requests").doc(id).get().then(doc => {
      const data = doc.data();
      db.collection("quotes").add({
        customer: data.customer,
        amount: 0,
        status: "Pending"
      }).then(() => alert("Quote created"));
    });
  }

  function convertQuoteToInvoice(id) {
    db.collection("quotes").doc(id).get().then(doc => {
      const data = doc.data();
      db.collection("invoices").add({
        customer: data.customer,
        amount: data.amount,
        dueDate: new Date().toISOString().split("T")[0],
        paid: false
      });
      db.collection("quotes").doc(id).delete().then(loadQuotes);
    });
  }

  function deleteQuote(id) {
    db.collection("quotes").doc(id).delete().then(loadQuotes);
  }

  function markInvoicePaid(id) {
    db.collection("invoices").doc(id).update({ paid: true }).then(loadInvoices);
  }

  // Default tab
  showTab('requests');
</script>

</body>
</html>
