<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f9f4; margin: 0; }
    header, footer { background: #228B22; color: white; text-align: center; padding: 1em; }
    header img { max-height: 60px; }
    .admin-container { max-width: 1200px; margin: auto; padding: 2em; background: white; }
    table { width: 100%; border-collapse: collapse; margin: 1em 0; }
    th, td { padding: 10px; border: 1px solid #ccc; }
    th { background: #228B22; color: white; }
    .badge { background: red; color: white; padding: 2px 6px; border-radius: 50%; }
  </style>
</head>
<body>
<header>
  <img src="Hollidays_Lawn_Garden_Logo.png" alt="Holliday's Logo">
  <h1>Admin Dashboard</h1>
</header>
<main class="admin-container">

  <h2>Service Requests <span id="requestCount" class="badge"></span></h2>
  <table id="requestsTable">
    <thead>
      <tr><th>Name</th><th>Email</th><th>Request</th><th>Status</th><th>Update</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>Invoices Due</h2>
  <table id="invoicesDueTable">
    <thead>
      <tr><th>Customer</th><th>Email</th><th>Invoice #</th><th>Amount</th><th>Due Date</th><th>Status</th><th>Actions</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>Paid Invoices</h2>
  <table id="invoicesPaidTable">
    <thead>
      <tr><th>Customer</th><th>Email</th><th>Invoice #</th><th>Amount</th><th>Due Date</th><th>Status</th></tr>
    </thead>
    <tbody></tbody>
  </table>

</main>
<footer>
  <p>&copy; 2025 Holliday's Lawn & Garden</p>
</footer>

<script>
const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user => {
  if (user?.email === "ronellbradley@bradleyvs.com") {
    loadRequests();
    loadInvoices();
  } else {
    window.location.href = "login.html";
  }
});

function loadRequests() {
  const tbody = document.querySelector("#requestsTable tbody");
  db.collection("service_requests").orderBy("timestamp", "desc").onSnapshot(snapshot => {
    tbody.innerHTML = "";
    document.getElementById("requestCount").innerText = snapshot.size || "";
    snapshot.forEach(doc => {
      const r = doc.data();
      const name = r.fullName || "N/A";
      const request = r.serviceType || "N/A";
      const status = r.status || "Pending";
      const row = `
        <tr>
          <td>${name}</td>
          <td>${r.email}</td>
          <td>${request}</td>
          <td>${status}</td>
          <td>
            <select onchange="updateRequest('${doc.id}', this.value)">
              <option ${status === "Pending" ? "selected" : ""}>Pending</option>
              <option ${status === "Approved" ? "selected" : ""}>Approved</option>
              <option ${status === "In Progress" ? "selected" : ""}>In Progress</option>
              <option ${status === "Completed" ? "selected" : ""}>Completed</option>
            </select>
          </td>
        </tr>
      `;
      tbody.innerHTML += row;
    });
  });
}

function updateRequest(id, status) {
  db.collection("service_requests").doc(id).update({ status });
}

function loadInvoices() {
  const dueTbody = document.querySelector("#invoicesDueTable tbody");
  const paidTbody = document.querySelector("#invoicesPaidTable tbody");
  dueTbody.innerHTML = ""; paidTbody.innerHTML = "";

  db.collection("invoices").orderBy("dueDate", "asc").get().then(snapshot => {
    snapshot.forEach(doc => {
      const d = doc.data();
      const isOverdue = !d.paid && new Date(d.dueDate) < new Date();
      const row = `
        <tr ${isOverdue ? 'style="background:#ffe5e5;"' : ''}>
          <td>${d.customerEmail?.split('@')[0] || "N/A"}</td>
          <td>${d.customerEmail || "N/A"}</td>
          <td>${d.invoiceNumber}</td>
          <td>$${d.amountDue?.toFixed(2) || "0.00"}</td>
          <td>${d.dueDate}</td>
          <td>${d.paid ? "Paid" : "Unpaid"}</td>
          <td>
            ${!d.paid ? `<button onclick="markPaid('${doc.id}')">Mark Paid</button>` : ""}
            <button onclick='viewInvoice(${JSON.stringify(d)})'>View</button>
            <button onclick="deleteInvoice('${doc.id}')">Delete</button>
          </td>
        </tr>
      `;
      d.paid ? paidTbody.innerHTML += row : dueTbody.innerHTML += row;
    });
  });
}

function markPaid(id) {
  db.collection("invoices").doc(id).update({ paid: true }).then(loadInvoices);
}

function deleteInvoice(id) {
  if (confirm("Delete this invoice?")) {
    db.collection("invoices").doc(id).delete().then(loadInvoices);
  }
}

function viewInvoice(data) {
  const win = window.open("", "_blank");
  win.document.write(`
    <html><head><title>Invoice ${data.invoiceNumber}</title></head>
    <body style="font-family:Arial;padding:2em;">
      <img src="Hollidays_Lawn_Garden_Logo.png" style="height:60px"><br><br>
      <h2 style="color:#228B22;">Holliday's Lawn & Garden</h2>
      <p><strong>Invoice #:</strong> ${data.invoiceNumber}</p>
      <p><strong>Customer:</strong> ${data.customerEmail}</p>
      <p><strong>Due Date:</strong> ${new Date(data.dueDate).toLocaleDateString()}</p>
      <table style="width:100%;border-collapse:collapse;" border="1">
        <thead><tr><th>Description</th><th>Amount</th></tr></thead>
        <tbody>
          ${(data.services || []).map(s => `<tr><td>${s.description}</td><td>$${s.amount.toFixed(2)}</td></tr>`).join("")}
        </tbody>
      </table>
      <h3 style="text-align:right;">Total: $${data.amountDue?.toFixed(2)}</h3>
      <p style="text-align:center;">Thank you for your business!</p>
      <button onclick="window.print()">🖨️ Print Invoice</button>
    </body></html>
  `);
}
</script>
</body>
</html>
