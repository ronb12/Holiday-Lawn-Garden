<!-- Full Working Admin Dashboard with Quotes and Invoice Flow -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - Holliday's Lawn & Garden</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f9f4;
      margin: 0;
    }
    header, footer {
      background: #228B22;
      color: white;
      text-align: center;
      padding: 1em;
    }
    h2 {
      color: #228B22;
      text-align: center;
    }
    .admin-container {
      max-width: 1100px;
      margin: auto;
      padding: 2em;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ccc;
    }
    th {
      background: #228B22;
      color: white;
    }
    .service-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .service-row input, .service-row select {
      flex: 1;
      padding: 0.5em;
    }
    button {
      background: #228B22;
      color: white;
      padding: 0.5em 1em;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #006400;
    }
    .logout {
      margin-top: 1em;
      text-decoration: underline;
      cursor: pointer;
      color: #228B22;
    }
  </style>
</head>
<body>
<header><h1>Admin Dashboard</h1></header>
<main class="admin-container">

  <h2>Service Requests</h2>
  <table id="serviceRequestsTable">
    <thead><tr><th>Name</th><th>Email</th><th>Request</th><th>Status</th><th>Update</th></tr></thead>
    <tbody></tbody>
  </table>

  <h2>Quotes</h2>
  <table id="quotesTable">
    <thead><tr><th>Name</th><th>Email</th><th>Quote</th><th>Created</th><th>Action</th></tr></thead>
    <tbody></tbody>
  </table>

  <h2>Create Invoice</h2>
  <form id="invoiceForm" onsubmit="createInvoice(event)">
    <input type="email" id="invoiceEmail" placeholder="Customer Email" required>
    <input type="text" id="invoiceNumber" placeholder="Invoice Number" required>
    <input type="date" id="invoiceDueDate" required><br>
    <div id="serviceList"></div>
    <button type="button" onclick="addServiceRow()">+ Add Service</button>
    <p><strong>Total: $<span id="totalAmount">0.00</span></strong></p>
    <button type="submit">Create Invoice</button>
  </form>

  <h2>Invoices Due</h2>
  <table id="invoicesDueTable">
    <thead><tr><th>Customer</th><th>Email</th><th>Invoice #</th><th>Amount</th><th>Due Date</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody></tbody>
  </table>

  <h2>Paid Invoices</h2>
  <table id="invoicesPaidTable">
    <thead><tr><th>Customer</th><th>Email</th><th>Invoice #</th><th>Amount</th><th>Due Date</th><th>Status</th></tr></thead>
    <tbody></tbody>
  </table>

  <a onclick="logout()" class="logout">Logout</a>
</main>
<footer id="footer"></footer>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="firebase-init.js"></script>

<script>
const db = firebase.firestore();
firebase.auth().onAuthStateChanged(user => {
  if (user?.email === "ronellbradley@bradleyvs.com") {
    addServiceRow();
    loadInvoices();
    loadRequests();
    loadQuotes();
  } else {
    window.location.href = "login.html";
  }
});

function addServiceRow() {
  const container = document.getElementById("serviceList");
  const row = document.createElement("div");
  row.className = "service-row";
  row.innerHTML = `
    <input type="text" placeholder="Description" />
    <input type="number" placeholder="Amount ($)" min="0" step="0.01" />
    <button onclick="this.parentElement.remove(); calcTotal()">❌</button>
  `;
  container.appendChild(row);
  calcTotal();
}

function calcTotal() {
  let total = 0;
  document.querySelectorAll(".service-row").forEach(row => {
    const amount = parseFloat(row.querySelector('input[type=number]').value || 0);
    total += amount;
  });
  document.getElementById("totalAmount").innerText = total.toFixed(2);
}

function createInvoice(e) {
  e.preventDefault();
  const email = document.getElementById("invoiceEmail").value;
  const number = document.getElementById("invoiceNumber").value;
  const due = document.getElementById("invoiceDueDate").value;
  const services = [];
  document.querySelectorAll(".service-row").forEach(row => {
    const desc = row.querySelector('input[type=text]').value;
    const amt = parseFloat(row.querySelector('input[type=number]').value || 0);
    if (desc && amt) services.push({ description: desc, amount: amt });
  });
  const total = services.reduce((sum, s) => sum + s.amount, 0);
  db.collection("invoices").add({
    customerEmail: email,
    invoiceNumber: number,
    services,
    amountDue: total,
    dueDate: due,
    paid: false,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(() => {
    alert("✅ Invoice Created");
    document.getElementById("invoiceForm").reset();
    document.getElementById("serviceList").innerHTML = "";
    addServiceRow();
    loadInvoices();
  });
}

function loadInvoices() {
  const due = document.querySelector("#invoicesDueTable tbody");
  const paid = document.querySelector("#invoicesPaidTable tbody");
  db.collection("invoices").onSnapshot(snapshot => {
    due.innerHTML = ""; paid.innerHTML = "";
    snapshot.forEach(doc => {
      const d = doc.data();
      const row = `
        <tr>
          <td>${d.customerEmail.split("@")[0]}</td>
          <td>${d.customerEmail}</td>
          <td>${d.invoiceNumber}</td>
          <td>$${d.amountDue.toFixed(2)}</td>
          <td>${d.dueDate}</td>
          <td>${d.paid ? "Paid" : "Unpaid"}</td>
          <td>
            ${!d.paid ? `<button onclick="markPaid('${doc.id}')">Mark Paid</button>` : ""}
            <button onclick='viewInvoice(${JSON.stringify(d)})'>View</button>
            <button onclick="deleteInvoice('${doc.id}')">Delete</button>
          </td>
        </tr>`;
      d.paid ? paid.innerHTML += row : due.innerHTML += row;
    });
  });
}

function markPaid(id) {
  db.collection("invoices").doc(id).update({ paid: true });
}

function deleteInvoice(id) {
  if (confirm("Delete this invoice?")) {
    db.collection("invoices").doc(id).delete();
  }
}

function viewInvoice(data) {
  const win = window.open("", "_blank");
  win.document.write(`
    <html><body style="font-family:Arial;padding:2em;">
    <img src="Hollidays_Lawn_Garden_Logo.png" style="max-height:60px"><h2 style="color:#228B22;">Holliday's Lawn & Garden</h2>
    <p><strong>Owner:</strong> Karl Holliday<br>Phone: 504-717-1887<br>Email: 7holliday@gmail.com</p><hr>
    <h3>Invoice #: ${data.invoiceNumber}</h3>
    <p><strong>Customer:</strong> ${data.customerEmail}</p>
    <p><strong>Due Date:</strong> ${new Date(data.dueDate).toLocaleDateString()}</p>
    <table border="1" style="width:100%"><thead><tr><th>Description</th><th>Amount</th></tr></thead><tbody>
    ${data.services.map(s => `<tr><td>${s.description}</td><td>$${s.amount.toFixed(2)}</td></tr>`).join("")}
    </tbody></table>
    <h3 style="text-align:right;">Total: $${data.amountDue.toFixed(2)}</h3>
    <p style="text-align:center;">Thank you for your business!</p>
    <button onclick="window.print()">Print Invoice</button></body></html>
  `);
}

function loadRequests() {
  const tbody = document.querySelector("#serviceRequestsTable tbody");
  db.collection("service_requests").orderBy("timestamp", "desc").onSnapshot(snapshot => {
    tbody.innerHTML = "";
    snapshot.forEach(doc => {
      const r = doc.data();
      if (r.status === "Completed") return; // skip to quotes
      tbody.innerHTML += `
        <tr>
          <td>${r.fullName || ''}</td>
          <td>${r.email || ''}</td>
          <td>${r.notes || ''}</td>
          <td>${r.status || "Pending"}</td>
          <td>
            <select onchange="updateStatus('${doc.id}', this.value)">
              <option value="">Change</option>
              <option value="Approved">Approved</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
            </select>
          </td>
        </tr>`;
    });
  });
}

function updateStatus(id, status) {
  if (status === "Completed") {
    db.collection("service_requests").doc(id).get().then(doc => {
      const r = doc.data();
      db.collection("quotes").add({
        fullName: r.fullName,
        email: r.email,
        quote: r.notes,
        createdAt: new Date().toLocaleDateString()
      }).then(() => db.collection("service_requests").doc(id).delete());
    });
  } else {
    db.collection("service_requests").doc(id).update({ status });
  }
}

function loadQuotes() {
  const tbody = document.querySelector("#quotesTable tbody");
  db.collection("quotes").orderBy("createdAt", "desc").onSnapshot(snapshot => {
    tbody.innerHTML = "";
    snapshot.forEach(doc => {
      const q = doc.data();
      tbody.innerHTML += `
        <tr>
          <td>${q.fullName}</td>
          <td>${q.email}</td>
          <td>${q.quote}</td>
          <td>${q.createdAt}</td>
          <td><button onclick="convertToInvoice('${doc.id}', ${JSON.stringify(q)})">Convert to Invoice</button></td>
        </tr>`;
    });
  });
}

function convertToInvoice(id, q) {
  document.getElementById("invoiceEmail").value = q.email;
  document.getElementById("invoiceNumber").value = Math.floor(Math.random() * 10000);
  document.getElementById("invoiceDueDate").valueAsDate = new Date();
  document.getElementById("serviceList").innerHTML = '';
  const row = document.createElement("div");
  row.className = "service-row";
  row.innerHTML = `<input type="text" value="${q.quote}" /><input type="number" placeholder="Amount" /><button onclick="this.parentElement.remove(); calcTotal()">❌</button>`;
  document.getElementById("serviceList").appendChild(row);
  calcTotal();
}
function logout() {
  firebase.auth().signOut().then(() => window.location.href = "login.html");
}
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("footer").innerHTML =
    "&copy; " + new Date().getFullYear() + " Holliday's Lawn & Garden. All rights reserved.";
});
</script>
</body>
</html>
