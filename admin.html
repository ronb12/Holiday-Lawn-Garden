<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
  <style>
    body { font-family: Arial; background: #f4f9f4; margin: 0; }
    header, footer { background: #228B22; color: white; text-align: center; padding: 1em; }
    .admin-container { max-width: 1200px; margin: auto; padding: 2em; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    table { width: 100%; border-collapse: collapse; margin: 1em 0; }
    th, td { padding: 10px; border: 1px solid #ccc; text-align: left; }
    th { background: #228B22; color: white; }
    .overdue { background: #ffe5e5; }
    input, button { padding: 0.5em; margin: 0.5em 0; border-radius: 5px; }
    button { background: #228B22; color: white; border: none; cursor: pointer; }
    button:hover { background: #006400; }
  </style>
</head>
<body>
<header><h1>Admin Dashboard</h1></header>
<main class="admin-container">
  <h2>Invoices Due</h2>
  <table id="invoicesDueTable">
    <thead>
      <tr><th>Customer</th><th>Email</th><th>Invoice #</th><th>Amount</th><th>Due Date</th><th>Status</th><th>Actions</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>Paid Invoices</h2>
  <table id="invoicesPaidTable">
    <thead>
      <tr><th>Customer</th><th>Email</th><th>Invoice #</th><th>Amount</th><th>Due Date</th><th>Status</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</main>
<footer>&copy; 2025 Holliday's Lawn & Garden</footer>
<script>
  const db = firebase.firestore();
  firebase.auth().onAuthStateChanged(user => {
    if (!user || user.email !== 'ronellbradley@bradleyvs.com') {
      window.location.href = 'login.html';
    } else {
      loadInvoices();
    }
  });

  function loadInvoices() {
    const dueTbody = document.querySelector("#invoicesDueTable tbody");
    const paidTbody = document.querySelector("#invoicesPaidTable tbody");
    dueTbody.innerHTML = "";
    paidTbody.innerHTML = "";

    db.collection("invoices").orderBy("dueDate").get().then(snapshot => {
      snapshot.forEach(doc => {
        const d = doc.data();
        const row = `<tr${!d.paid && new Date(d.dueDate) < new Date() ? ' class="overdue"' : ''}>
          <td>${d.customerEmail.split('@')[0]}</td>
          <td>${d.customerEmail}</td>
          <td>${d.invoiceNumber}</td>
          <td>$${d.amountDue.toFixed(2)}</td>
          <td>${d.dueDate}</td>
          <td>${d.paid ? 'Paid' : 'Unpaid'}</td>
          <td>${!d.paid ? `<button onclick="markPaid('${doc.id}')">Mark Paid</button>` : ''} <button onclick="printInvoice('${d.customerEmail}','${d.invoiceNumber}','${d.amountDue}','${d.dueDate}')">Print</button></td>
        </tr>`;
        (d.paid ? paidTbody : dueTbody).innerHTML += row;
      });
    });
  }

  function markPaid(id) {
    db.collection("invoices").doc(id).update({ paid: true }).then(loadInvoices);
  }

  function printInvoice(email, number, amount, dueDate) {
    const win = window.open('', '_blank');
    win.document.write(`<html><head><title>Invoice ${number}</title></head><body>`);
    win.document.write(`<h1>Invoice: ${number}</h1>`);
    win.document.write(`<p><strong>Customer:</strong> ${email}</p>`);
    win.document.write(`<p><strong>Due Date:</strong> ${dueDate}</p>`);
    win.document.write(`<p><strong>Amount Due:</strong> $${parseFloat(amount).toFixed(2)}</p>`);
    win.document.write(`<p><strong>Business:</strong> Karl Holliday<br>Email: 7holliday@gmail.com<br>Phone: 504-717-1887</p>`);
    win.document.write(`<hr><p>Thank you for your business!</p>`);
    win.document.write('</body></html>');
    win.document.close();
    win.print();
  }
</script>
</body>
</html>
