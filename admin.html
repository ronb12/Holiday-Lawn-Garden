<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel – Holliday's Lawn & Garden</title>
  <link rel="icon" href="icons/icon-192.png" />
  <style>
    body { font-family: Arial, sans-serif; background: #f4f9f4; padding: 2em; color: #333; }
    h1, h2 { color: #228B22; }
    form { margin-bottom: 3em; background: #fff; padding: 1.5em; border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.1); max-width: 700px; }
    input, select, textarea, button {
      width: 100%; padding: 0.75em; margin-bottom: 1em; border: 1px solid #ccc; border-radius: 4px;
    }
    button { background: #228B22; color: white; border: none; cursor: pointer; }
    button:hover { background: #1a6e1a; }
    .success { color: green; font-weight: bold; text-align: center; margin-bottom: 1em; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDrdga_hOO52nicYN3AwqqDjSbcnre6iM4",
      authDomain: "mobile-debt-crusher.firebaseapp.com",
      projectId: "mobile-debt-crusher"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function submitForm(event, type) {
      event.preventDefault();
      const form = event.target;
      const formData = Object.fromEntries(new FormData(form).entries());
      formData.createdAt = new Date();

      try {
        await db.collection(type).add(formData);
        form.reset();
        document.getElementById(`${type}Message`).innerText = `✅ ${type.charAt(0).toUpperCase() + type.slice(1)} submitted.`;
      } catch (err) {
        console.error(`❌ Failed to submit ${type}:`, err);
        alert("Something went wrong. Check console for details.");
      }
    }

    async function exportCollection(type, format) {
      const snapshot = await db.collection(type).get();
      const rows = [];
      snapshot.forEach(doc => rows.push(doc.data()));

      if (format === 'csv') {
        const csv = Papa.unparse(rows);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${type}.csv`;
        link.click();
      } else if (format === 'pdf') {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(12);
        doc.text(`${type.charAt(0).toUpperCase() + type.slice(1)} Export`, 14, 16);
        let y = 24;
        rows.forEach((item) => {
          const line = Object.entries(item).map(([k, v]) => `${k}: ${v}`).join(' | ');
          doc.text(line, 14, y);
          y += 8;
          if (y > 270) { doc.addPage(); y = 20; }
        });
        doc.save(`${type}.pdf`);
      }
    }
  </script>
</head>
<body>
  <h1>Admin Panel – Holliday's Lawn & Garden</h1>

  <form onsubmit="submitForm(event, 'requests')">
    <h2>New Service Request</h2>
    <input name="customer" placeholder="Customer Name" required />
    <input name="email" placeholder="Customer Email" required />
    <textarea name="description" placeholder="Service Description" required></textarea>
    <select name="status">
      <option value="Pending">Pending</option>
      <option value="Completed">Completed</option>
    </select>
    <button type="submit">Submit Request</button>
    <div id="requestsMessage" class="success"></div>
  </form>

  <form onsubmit="submitForm(event, 'quotes')">
    <h2>Create Quote</h2>
    <input name="customer" placeholder="Customer Name" required />
    <input name="amount" type="number" placeholder="Quote Amount ($)" required />
    <select name="status">
      <option value="Pending">Pending</option>
      <option value="Approved">Approved</option>
    </select>
    <button type="submit">Submit Quote</button>
    <div id="quotesMessage" class="success"></div>
  </form>

  <form onsubmit="submitForm(event, 'invoices')">
    <h2>Create Invoice</h2>
    <input name="customer" placeholder="Customer Name" required />
    <input name="amount" type="number" placeholder="Invoice Amount ($)" required />
    <input name="dueDate" type="date" required />
    <select name="paid">
      <option value="false">Unpaid</option>
      <option value="true">Paid</option>
    </select>
    <button type="submit">Submit Invoice</button>
    <div id="invoicesMessage" class="success"></div>
  </form>

  <form onsubmit="submitForm(event, 'expenses')">
    <h2>Log Expense</h2>
    <input name="description" placeholder="Expense Description" required />
    <input name="amount" type="number" placeholder="Amount ($)" required />
    <input name="date" type="date" required />
    <button type="submit">Add Expense</button>
    <div id="expensesMessage" class="success"></div>
  </form>

  <div style="text-align:center; margin-top: 2em;">
    <h2>📤 Export Records</h2>
    <select id="exportType">
      <option value="requests">Service Requests</option>
      <option value="quotes">Quotes</option>
      <option value="invoices">Invoices</option>
      <option value="expenses">Expenses</option>
    </select>
    <button onclick="exportCollection(document.getElementById('exportType').value, 'csv')">Export CSV</button>
    <button onclick="exportCollection(document.getElementById('exportType').value, 'pdf')">Export PDF</button>
  </div>
</body>
</html>
