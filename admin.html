<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
  <style>
    body { font-family: Arial; background: #f4f9f4; margin: 0; }
    header, footer { background: #228B22; color: white; text-align: center; padding: 1em; }
    .admin-container { max-width: 1200px; margin: auto; padding: 2em; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    table { width: 100%; border-collapse: collapse; margin: 1em 0; }
    th, td { padding: 10px; border: 1px solid #ccc; text-align: left; }
    th { background: #228B22; color: white; }
    .overdue { background: #ffe5e5; }
    input, textarea, button { padding: 0.5em; margin: 0.5em 0; border-radius: 5px; width: 100%; }
    button { background: #228B22; color: white; border: none; cursor: pointer; }
    button:hover { background: #006400; }
    .logout { display: inline-block; margin-top: 1em; color: #228B22; cursor: pointer; text-decoration: underline; }
    #loadingSpinner { display: none; margin-top: 1em; color: #228B22; }
  </style>
</head>
<body>
<header>
  <h1>Admin Dashboard</h1>
</header>
<main class="admin-container">
  <h2>Service Requests</h2>
  <table id="requestsTable">
    <thead>
      <tr><th>Customer Name</th><th>Email</th><th>Service Requested</th><th>Preferred Date</th><th>Notes</th><th>Status</th><th>Actions</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>Create Invoice</h2>
  <form id="invoiceForm" onsubmit="createInvoice(event)">
    <input type="email" id="invoiceEmail" placeholder="Customer Email" required />
    <input type="text" id="invoiceNumber" placeholder="Invoice Number" required />
    <textarea id="invoiceItems" placeholder="Service Descriptions & Amounts (e.g. Lawn:$50, Hedges:$30)" required></textarea>
    <input type="date" id="invoiceDueDate" required />
    <button type="submit">Create Invoice</button>
  </form>

  <h2>Invoices Due</h2>
  <table id="invoicesDueTable">
    <thead>
      <tr><th>Customer</th><th>Email</th><th>Invoice #</th><th>Amount</th><th>Due Date</th><th>Status</th><th>Actions</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>Paid Invoices</h2>
  <table id="invoicesPaidTable">
    <thead>
      <tr><th>Customer</th><th>Email</th><th>Invoice #</th><th>Amount</th><th>Due Date</th><th>Status</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <a onclick="logout()" class="logout">Logout</a>
  <div id="loadingSpinner">Logging out...</div>
</main>
<footer id="footer"></footer>

<script>
const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user => {
  if (user) {
    const adminEmails = ["ronellbradley@bradleyvs.com"];
    if (!adminEmails.includes(user.email)) {
      alert("Access Denied.");
      window.location.href = "index.html";
    } else {
      loadServiceRequests();
      loadInvoices();
    }
  } else {
    window.location.href = "login.html";
  }
});

function loadServiceRequests() {
  db.collection("service_requests").orderBy("submittedAt", "desc").get().then(snapshot => {
    const tbody = document.querySelector("#requestsTable tbody");
    tbody.innerHTML = "";
    snapshot.forEach(doc => {
      const d = doc.data();
      tbody.innerHTML += `<tr>
        <td>${d.fullName || "N/A"}</td>
        <td>${d.email}</td>
        <td>${d.serviceType}</td>
        <td>${new Date(d.preferredDate).toLocaleDateString()}</td>
        <td>${d.notes || "-"}</td>
        <td>Pending</td>
        <td><button onclick="markCompleted('${doc.id}')">Mark Completed</button></td>
      </tr>`;
    });
  });
}

function loadInvoices() {
  const dueTbody = document.querySelector("#invoicesDueTable tbody");
  const paidTbody = document.querySelector("#invoicesPaidTable tbody");
  dueTbody.innerHTML = "";
  paidTbody.innerHTML = "";

  db.collection("invoices").orderBy("dueDate", "asc").get().then(snapshot => {
    snapshot.forEach(doc => {
      const data = doc.data();
      const dueDate = new Date(data.dueDate);
      const today = new Date();
      const isOverdue = dueDate < today && !data.paid;
      const trClass = isOverdue ? 'overdue' : '';
      const encodedItems = btoa(JSON.stringify(data.items || []));

      const rowHTML = `
        <tr class="${trClass}">
          <td>${data.customerEmail.split('@')[0]}</td>
          <td>${data.customerEmail}</td>
          <td>${data.invoiceNumber}</td>
          <td>$${(data.items || []).reduce((sum, i) => sum + i.amount, 0).toFixed(2)}</td>
          <td>${dueDate.toLocaleDateString()}</td>
          <td>${data.paid ? 'Paid' : 'Unpaid'}</td>
          <td>
            ${!data.paid ? `<button onclick="markPaid('${doc.id}')">Mark Paid</button>` : ''}
            <button onclick="viewInvoice('${data.invoiceNumber}', '${data.customerEmail}', '${data.dueDate}', '${encodedItems}')">View</button>
            <button onclick="deleteInvoice('${doc.id}')">Delete</button>
          </td>
        </tr>`;
      data.paid ? paidTbody.innerHTML += rowHTML : dueTbody.innerHTML += rowHTML;
    });
  });
}

function createInvoice(e) {
  e.preventDefault();
  const email = document.getElementById('invoiceEmail').value;
  const number = document.getElementById('invoiceNumber').value;
  const due = document.getElementById('invoiceDueDate').value;
  const rawItems = document.getElementById('invoiceItems').value;

  const items = rawItems.split(',').map(s => {
    const [desc, amt] = s.split(':');
    return { desc: desc.trim(), amount: parseFloat(amt.trim()) };
  });

  db.collection("invoices").add({
    customerEmail: email,
    invoiceNumber: number,
    dueDate: due,
    paid: false,
    items,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(() => {
    alert("✅ Invoice created!");
    document.getElementById("invoiceForm").reset();
    loadInvoices();
  });
}

function markCompleted(id) {
  db.collection("service_requests").doc(id).delete().then(loadServiceRequests);
}

function markPaid(id) {
  db.collection("invoices").doc(id).update({ paid: true }).then(loadInvoices);
}

function deleteInvoice(id) {
  if (confirm("Delete this invoice?")) {
    db.collection("invoices").doc(id).delete().then(loadInvoices);
  }
}

function viewInvoice(number, email, dueDate, encodedItems) {
  const items = JSON.parse(atob(encodedItems));
  const total = items.reduce((a, b) => a + b.amount, 0);
  const rows = items.map(i => `
    <tr>
      <td style="padding:8px;border:1px solid #ccc;">${i.desc}</td>
      <td style="padding:8px;border:1px solid #ccc;text-align:right;">$${i.amount.toFixed(2)}</td>
    </tr>`).join('');

  const win = window.open('', '_blank');
  win.document.write(`
    <html><head><title>Invoice ${number}</title>
      <style>
        body { font-family: Arial; padding: 2em; }
        table { width: 100%; border-collapse: collapse; margin-top: 1em; }
        th, td { border: 1px solid #ccc; padding: 8px; }
        th { background: #f4f4f4; text-align: left; }
        .right { text-align: right; }
      </style>
    </head><body>
      <img src="Hollidays_Lawn_Garden_Logo.png" style="max-height:80px;"><br><br>
      <h2>Holliday's Lawn & Garden</h2>
      <p><strong>Owner:</strong> Karl Holliday<br>
         <strong>Phone:</strong> 504-717-1887<br>
         <strong>Email:</strong> 7holliday@gmail.com</p>
      <hr>
      <h3>Invoice #: ${number}</h3>
      <p><strong>Customer:</strong> ${email}<br>
         <strong>Due Date:</strong> ${new Date(dueDate).toLocaleDateString()}</p>
      <table>
        <tr><th>Description</th><th class="right">Amount</th></tr>
        ${rows}
        <tr><td><strong>Total</strong></td><td class="right"><strong>$${total.toFixed(2)}</strong></td></tr>
      </table>
      <p style="margin-top:2em;">Thank you for your business!</p>
      <button onclick="window.print()">🖨️ Print</button>
    </body></html>
  `);
}

document.addEventListener("DOMContentLoaded", () => {
  const year = new Date().getFullYear();
  document.getElementById("footer").innerHTML = `&copy; ${year} Holliday's Lawn & Garden. All rights reserved.`;
});
</script>
</body>
</html>
