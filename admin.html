<!-- Full Updated Admin Dashboard - Holliday's Lawn & Garden -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - Holliday's Lawn & Garden</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <style>
    body { font-family: Arial, sans-serif; background: #f4f9f4; margin: 0; }
    header, footer { background: #228B22; color: white; text-align: center; padding: 1em; }
    .admin-container { max-width: 1100px; margin: auto; padding: 2em; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    h2 { color: #228B22; text-align: center; }
    table { width: 100%; border-collapse: collapse; margin: 1em 0; }
    th, td { padding: 10px; border: 1px solid #ccc; text-align: left; }
    th { background: #228B22; color: white; }
    input, select { padding: 0.5em; margin: 0.3em 0; width: 100%; }
    button { background: #228B22; color: white; border: none; padding: 0.5em 1em; border-radius: 5px; cursor: pointer; font-weight: bold; }
    button:hover { background: #006400; }
    .logout { margin-top: 1em; color: #228B22; text-decoration: underline; cursor: pointer; }
    .service-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .service-row input { flex: 1; }
  </style>
</head>
<body>

<header><h1>Admin Dashboard</h1></header>

<main class="admin-container">
  <h2>Create Invoice</h2>
  <form id="invoiceForm" onsubmit="createInvoice(event)">
    <input type="email" id="invoiceEmail" placeholder="Customer Email" required>
    <input type="text" id="invoiceNumber" placeholder="Invoice Number" required>
    <input type="date" id="invoiceDueDate" required><br>
    <div id="serviceList"></div>
    <button type="button" onclick="addServiceRow()">+ Add Service</button>
    <p><strong>Total: $<span id="totalAmount">0.00</span></strong></p>
    <button type="submit">Create Invoice</button>
  </form>

  <h2>Accepted Quotes</h2>
  <table id="acceptedQuotesTable">
    <thead><tr><th>Name</th><th>Email</th><th>Service</th><th>Notes</th><th>Amount</th><th>Actions</th></tr></thead>
    <tbody></tbody>
  </table>

  <h2>Invoices Due</h2>
  <table id="invoicesDueTable">
    <thead><tr><th>Email</th><th>Invoice #</th><th>Amount</th><th>Due Date</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody></tbody>
  </table>

  <h2>Paid Invoices</h2>
  <table id="invoicesPaidTable">
    <thead><tr><th>Email</th><th>Invoice #</th><th>Amount</th><th>Due Date</th><th>Status</th></tr></thead>
    <tbody></tbody>
  </table>

  <a onclick="logout()" class="logout">Logout</a>
</main>

<footer id="footer">&copy; 2025 Holliday's Lawn & Garden. All rights reserved.</footer>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="firebase-init.js"></script>

<script>
const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user => {
  if (user?.email === "ronellbradley@bradleyvs.com") {
    addServiceRow();
    loadInvoices();
    loadAcceptedQuotes();
  } else {
    location.href = "login.html";
  }
});

function addServiceRow(desc = "", amt = "") {
  const container = document.getElementById("serviceList");
  const row = document.createElement("div");
  row.className = "service-row";
  row.innerHTML = `
    <input type="text" placeholder="Description" value="${desc}" oninput="calcTotal()">
    <input type="number" placeholder="Amount" min="0" step="0.01" value="${amt}" oninput="calcTotal()">
    <button type="button" onclick="this.parentElement.remove(); calcTotal()">❌</button>
  `;
  container.appendChild(row);
}

function calcTotal() {
  let total = 0;
  document.querySelectorAll(".service-row").forEach(row => {
    total += parseFloat(row.querySelector("input[type=number]").value || 0);
  });
  document.getElementById("totalAmount").innerText = total.toFixed(2);
}

function createInvoice(e) {
  e.preventDefault();
  const email = document.getElementById("invoiceEmail").value;
  const number = document.getElementById("invoiceNumber").value;
  const due = document.getElementById("invoiceDueDate").value;
  const services = [];
  document.querySelectorAll(".service-row").forEach(row => {
    const desc = row.querySelector("input[type=text]").value;
    const amt = parseFloat(row.querySelector("input[type=number]").value || 0);
    if (desc && amt) services.push({ description: desc, amount: amt });
  });
  const total = services.reduce((sum, s) => sum + s.amount, 0);

  db.collection("invoices").add({
    customerEmail: email,
    invoiceNumber: number,
    services,
    amountDue: total,
    dueDate: due,
    paid: false,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(() => {
    alert("✅ Invoice Created");
    document.getElementById("invoiceForm").reset();
    document.getElementById("serviceList").innerHTML = "";
    addServiceRow();
    calcTotal();
    loadInvoices();
  });
}

function loadInvoices() {
  const dueBody = document.querySelector("#invoicesDueTable tbody");
  const paidBody = document.querySelector("#invoicesPaidTable tbody");
  db.collection("invoices").orderBy("dueDate", "desc").onSnapshot(snapshot => {
    dueBody.innerHTML = "";
    paidBody.innerHTML = "";
    snapshot.forEach(doc => {
      const d = doc.data();
      const row = `
        <tr>
          <td>${d.customerEmail}</td>
          <td>${d.invoiceNumber}</td>
          <td>$${d.amountDue.toFixed(2)}</td>
          <td>${d.dueDate}</td>
          <td>${d.paid ? "Paid" : "Unpaid"}</td>
          <td>
            ${!d.paid ? `<button onclick="markPaid('${doc.id}')">Mark Paid</button>` : ""}
            <button onclick="deleteInvoice('${doc.id}')">Delete</button>
          </td>
        </tr>`;
      d.paid ? paidBody.innerHTML += row : dueBody.innerHTML += row;
    });
  });
}

function markPaid(id) {
  db.collection("invoices").doc(id).update({ paid: true });
}

function deleteInvoice(id) {
  if (confirm("Delete this invoice?")) {
    db.collection("invoices").doc(id).delete();
  }
}

function loadAcceptedQuotes() {
  const tbody = document.querySelector("#acceptedQuotesTable tbody");
  db.collection("quotes").where("status", "==", "Accepted").onSnapshot(snapshot => {
    tbody.innerHTML = "";
    snapshot.forEach(doc => {
      const q = doc.data();
      tbody.innerHTML += `
        <tr>
          <td>${q.name || ''}</td>
          <td>${q.email || ''}</td>
          <td>${q.service || ''}</td>
          <td>${q.notes || ''}</td>
          <td>$${parseFloat(q.amount || 0).toFixed(2)}</td>
          <td><button onclick='loadQuoteIntoInvoice(${JSON.stringify({ email: q.email, service: q.service, amount: q.amount })})'>Create Invoice</button></td>
        </tr>`;
    });
  });
}

function loadQuoteIntoInvoice(quote) {
  document.getElementById("invoiceEmail").value = quote.email;
  document.getElementById("invoiceNumber").value = "INV-" + Math.floor(1000 + Math.random() * 9000);
  document.getElementById("invoiceDueDate").value = new Date().toISOString().split("T")[0];
  document.getElementById("serviceList").innerHTML = "";
  addServiceRow(quote.service, quote.amount);
  calcTotal();
}

function logout() {
  firebase.auth().signOut().then(() => location.href = "login.html");
}
</script>

</body>
</html>
