<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f9f4;
      margin: 0;
    }
    header, footer {
      background: #228B22;
      color: white;
      text-align: center;
      padding: 1em;
    }
    .admin-container {
      max-width: 1200px;
      margin: auto;
      padding: 2em;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ccc;
      text-align: left;
    }
    th {
      background: #228B22;
      color: white;
    }
    .overdue {
      background: #ffe5e5;
    }
    input, button, textarea {
      padding: 0.5em;
      margin: 0.5em 0;
      border-radius: 5px;
      width: 100%;
      box-sizing: border-box;
    }
    button {
      background: #228B22;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #006400;
    }
    .logout {
      display: inline-block;
      margin-top: 1em;
      color: #228B22;
      cursor: pointer;
      text-decoration: underline;
    }
    #loadingSpinner {
      display: none;
      margin-top: 1em;
      color: #228B22;
    }
  </style>
</head>
<body>
<header>
  <h1>Admin Dashboard</h1>
</header>
<main class="admin-container">
  <h2>Service Requests</h2>
  <table id="requestsTable">
    <thead>
      <tr>
        <th>Customer Name</th>
        <th>Email</th>
        <th>Service Requested</th>
        <th>Preferred Date</th>
        <th>Notes</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>Create Invoice</h2>
  <form id="invoiceForm" onsubmit="createInvoice(event)">
    <input type="email" id="invoiceEmail" placeholder="Customer Email" required /><br />
    <input type="text" id="invoiceNumber" placeholder="Invoice Number" required /><br />
    <textarea id="invoiceDescriptions" placeholder="One line per service description" rows="3"></textarea><br />
    <textarea id="invoiceAmounts" placeholder="One line per matching amount" rows="3"></textarea><br />
    <input type="date" id="invoiceDueDate" required /><br />
    <button type="submit">Create Invoice</button>
  </form>

  <h2>Invoices Due</h2>
  <table id="invoicesDueTable">
    <thead>
      <tr>
        <th>Customer</th>
        <th>Email</th>
        <th>Invoice #</th>
        <th>Amount</th>
        <th>Due Date</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>Paid Invoices</h2>
  <table id="invoicesPaidTable">
    <thead>
      <tr>
        <th>Customer</th>
        <th>Email</th>
        <th>Invoice #</th>
        <th>Amount</th>
        <th>Due Date</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <a onclick="logout()" class="logout">Logout</a>
  <div id="loadingSpinner">Logging out...</div>
</main>

<footer id="footer"></footer>

<script>
const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user => {
  if (user) {
    const adminEmails = ["ronellbradley@bradleyvs.com"];
    if (!adminEmails.includes(user.email)) {
      alert("Access Denied. Redirecting...");
      window.location.href = "index.html";
    } else {
      loadServiceRequests();
      loadInvoices();
    }
  } else {
    window.location.href = "login.html";
  }
});

function loadServiceRequests() {
  db.collection("service_requests").orderBy("submittedAt", "desc").get().then(snapshot => {
    const tbody = document.querySelector("#requestsTable tbody");
    tbody.innerHTML = "";
    snapshot.forEach(doc => {
      const d = doc.data();
      const row = \`<tr>
        <td>\${d.fullName || "N/A"}</td>
        <td>\${d.email || "N/A"}</td>
        <td>\${d.serviceType || "N/A"}</td>
        <td>\${d.preferredDate ? new Date(d.preferredDate).toLocaleDateString() : "N/A"}</td>
        <td>\${d.notes || "N/A"}</td>
        <td>Pending</td>
        <td><button onclick="markCompleted('\${doc.id}')">Mark Completed</button></td>
      </tr>\`;
      tbody.innerHTML += row;
    });
  });
}

function loadInvoices() {
  const dueTbody = document.querySelector("#invoicesDueTable tbody");
  const paidTbody = document.querySelector("#invoicesPaidTable tbody");
  dueTbody.innerHTML = "";
  paidTbody.innerHTML = "";

  db.collection("invoices").orderBy("dueDate", "asc").get().then(snapshot => {
    snapshot.forEach(doc => {
      const data = doc.data();
      const dueDate = new Date(data.dueDate);
      const isOverdue = dueDate < new Date() && !data.paid;
      const trClass = isOverdue ? 'overdue' : '';
      const viewBtn = \`<button onclick="viewInvoiceById('\${doc.id}')">View</button>\`;
      const actions = \`
        <button onclick="markPaid('\${doc.id}')">Mark Paid</button>
        \${viewBtn}
        <button onclick="deleteInvoice('\${doc.id}')">Delete</button>\`;

      const row = \`<tr class="\${trClass}">
        <td>\${data.customerEmail.split('@')[0]}</td>
        <td>\${data.customerEmail}</td>
        <td>\${data.invoiceNumber}</td>
        <td>$\${data.amountDue.toFixed(2)}</td>
        <td>\${dueDate.toLocaleDateString()}</td>
        <td>\${data.paid ? "Paid" : "Unpaid"}</td>
        <td>\${data.paid ? "" : actions}</td>
      </tr>\`;
      (data.paid ? paidTbody : dueTbody).innerHTML += row;
    });
  });
}

function createInvoice(e) {
  e.preventDefault();
  const email = document.getElementById("invoiceEmail").value;
  const number = document.getElementById("invoiceNumber").value;
  const descriptions = document.getElementById("invoiceDescriptions").value.split("\n");
  const amounts = document.getElementById("invoiceAmounts").value.split("\n").map(a => parseFloat(a));
  const dueDate = document.getElementById("invoiceDueDate").value;
  const total = amounts.reduce((a,b)=>a+b,0);

  db.collection("invoices").add({
    customerEmail: email,
    invoiceNumber: number,
    services: descriptions.map((desc, i) => ({ desc, amt: amounts[i] || 0 })),
    amountDue: total,
    dueDate: dueDate,
    paid: false,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(() => {
    alert("✅ Invoice Created!");
    document.getElementById("invoiceForm").reset();
    loadInvoices();
  });
}

function viewInvoiceById(id) {
  db.collection("invoices").doc(id).get().then(doc => {
    if (!doc.exists) return alert("Invoice not found.");
    const data = doc.data();
    const win = window.open("", "_blank");
    const rows = data.services.map(s => \`<tr><td>\${s.desc}</td><td style="text-align:right;">$\${s.amt.toFixed(2)}</td></tr>\`).join("");
    win.document.write(\`
      <html><head><title>Invoice \${data.invoiceNumber}</title></head>
      <body style="font-family:Arial;padding:2em;">
        <img src="Hollidays_Lawn_Garden_Logo.png" style="max-height:80px"><br><br>
        <h2>Holliday's Lawn & Garden</h2>
        <p><strong>Owner:</strong> Karl Holliday<br>
           <strong>Phone:</strong> 504-717-1887<br>
           <strong>Email:</strong> 7holliday@gmail.com</p>
        <hr>
        <h3>Invoice #: \${data.invoiceNumber}</h3>
        <p><strong>Customer:</strong> \${data.customerEmail}<br>
           <strong>Due Date:</strong> \${new Date(data.dueDate).toLocaleDateString()}</p>
        <table style="width:100%;border-collapse:collapse;">
          <thead><tr><th>Description</th><th style="text-align:right;">Amount</th></tr></thead>
          <tbody>\${rows}<tr><td><strong>Total</strong></td><td style="text-align:right;"><strong>$\${data.amountDue.toFixed(2)}</strong></td></tr></tbody>
        </table>
        <br><p>Thank you for your business!</p>
        <button onclick="window.print()">🖨️ Print</button>
      </body></html>
    \`);
  });
}

function markCompleted(id) {
  db.collection("service_requests").doc(id).delete().then(loadServiceRequests);
}

function markPaid(id) {
  db.collection("invoices").doc(id).update({ paid: true }).then(loadInvoices);
}

function deleteInvoice(id) {
  if (confirm("Are you sure you want to delete this invoice?")) {
    db.collection("invoices").doc(id).delete().then(loadInvoices);
  }
}

function logout() {
  document.getElementById("loadingSpinner").style.display = "block";
  firebase.auth().signOut().then(() => {
    setTimeout(() => {
      alert("✅ Logged out!");
      window.location.href = "login.html";
    }, 1000);
  });
}

document.addEventListener("DOMContentLoaded", () => {
  const year = new Date().getFullYear();
  document.getElementById("footer").innerHTML = \`&copy; \${year} Holliday's Lawn & Garden. All rights reserved.\`;
});
</script>
</body>
</html>
