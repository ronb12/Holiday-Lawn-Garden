<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f9f4; }
    header, footer { background: #228B22; color: white; text-align: center; padding: 1em; }
    header img { max-height: 60px; display: block; margin: auto; }
    .tabs { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
    .tabs button { padding: 10px 20px; border: none; background: #228B22; color: white; cursor: pointer; }
    .tabs button.active { background: #006400; }
    .tab-content { display: none; padding: 20px; }
    .tab-content.active { display: block; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 10px; border: 1px solid #ccc; }
    th { background: #228B22; color: white; }
    input, select, button { margin-top: 10px; padding: 8px; width: 100%; max-width: 400px; }
    .profit-summary { background: #e8f5e9; padding: 10px; border-radius: 5px; margin-top: 10px; }
  </style>
</head>
<body>
<header>
  <img src="Hollidays_Lawn_Garden_Logo.png" alt="Logo" />
  <h1>Admin Dashboard</h1>
</header>

<div class="tabs">
  <button class="tablink active" onclick="openTab('requests')">Requests</button>
  <button class="tablink" onclick="openTab('quotes')">Quotes</button>
  <button class="tablink" onclick="openTab('invoices')">Invoices</button>
  <button class="tablink" onclick="openTab('profit')">Profit Calculator</button>
</div>

<div id="requests" class="tab-content active">
  <h2>Service Requests</h2>
  <table>
    <thead><tr><th>Name</th><th>Email</th><th>Request</th><th>Status</th></tr></thead>
    <tbody id="requestsTable"><tr><td colspan="4">Loading...</td></tr></tbody>
  </table>
</div>

<div id="quotes" class="tab-content">
  <h2>Create Quote</h2>
  <form onsubmit="createQuote(event)">
    <input type="email" id="quoteEmail" placeholder="Customer Email" required />
    <input type="text" id="quoteDescription" placeholder="Quote Description" required />
    <input type="number" id="quoteAmount" placeholder="Quote Amount ($)" required />
    <button type="submit">Create Quote</button>
  </form>

  <h3>All Quotes</h3>
  <table>
    <thead><tr><th>Email</th><th>Description</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
    <tbody id="quotesTable"><tr><td colspan="5">Loading...</td></tr></tbody>
  </table>
</div>

<div id="invoices" class="tab-content">
  <h2>Invoices</h2>
  <table>
    <thead><tr><th>Email</th><th>Invoice #</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
    <tbody id="invoicesTable"><tr><td colspan="5">Loading...</td></tr></tbody>
  </table>
</div>

<div id="profit" class="tab-content">
  <h2>Auto Profit Calculator</h2>
  <form oninput="calculateProfit()">
    <input type="number" id="labor" placeholder="Labor Cost ($)" required />
    <input type="number" id="materials" placeholder="Material Cost ($)" required />
    <input type="number" id="gas" placeholder="Gas Cost ($)" required />
    <input type="number" id="margin" placeholder="Desired Profit Margin (%)" required />
  </form>
  <div class="profit-summary" id="profitOutput">
    <p><strong>Total Cost:</strong> $0.00</p>
    <p><strong>Suggested Price:</strong> $0.00</p>
  </div>
  <button onclick="exportProfitPDF()">Export to PDF</button>
</div>

<footer>
  <p>&copy; 2025 Holliday's Lawn & Garden</p>
</footer>

<script>
  function openTab(tabId) {
    document.querySelectorAll(".tab-content").forEach(tab => tab.classList.remove("active"));
    document.querySelectorAll(".tablink").forEach(btn => btn.classList.remove("active"));
    document.getElementById(tabId).classList.add("active");
    document.querySelector(`.tablink[onclick="openTab('${tabId}')"]`).classList.add("active");
  }

  function calculateProfit() {
    const labor = parseFloat(document.getElementById("labor").value || 0);
    const materials = parseFloat(document.getElementById("materials").value || 0);
    const gas = parseFloat(document.getElementById("gas").value || 0);
    const margin = parseFloat(document.getElementById("margin").value || 0);

    const cost = labor + materials + gas;
    const suggested = cost + (cost * (margin / 100));

    document.getElementById("profitOutput").innerHTML = `
      <p><strong>Total Cost:</strong> $${cost.toFixed(2)}</p>
      <p><strong>Suggested Price:</strong> $${suggested.toFixed(2)}</p>
    `;
  }

  function exportProfitPDF() {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();
    const labor = document.getElementById("labor").value;
    const materials = document.getElementById("materials").value;
    const gas = document.getElementById("gas").value;
    const margin = document.getElementById("margin").value;
    const output = document.getElementById("profitOutput").innerText;

    pdf.text("Auto Profit Calculator", 10, 10);
    pdf.text(`Labor: $${labor}`, 10, 20);
    pdf.text(`Materials: $${materials}`, 10, 30);
    pdf.text(`Gas: $${gas}`, 10, 40);
    pdf.text(`Margin: ${margin}%`, 10, 50);
    pdf.text(output, 10, 60);
    pdf.save("profit-estimate.pdf");
  }

  function createQuote(e) {
    e.preventDefault();
    const email = document.getElementById("quoteEmail").value;
    const desc = document.getElementById("quoteDescription").value;
    const amt = parseFloat(document.getElementById("quoteAmount").value);
    // Save to Firestore...
    alert(`Quote created for ${email} - $${amt}`);
  }
</script>
</body>
</html>
