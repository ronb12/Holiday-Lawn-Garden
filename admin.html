<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f9f4;
    }
    header, footer {
      background: #228B22;
      color: white;
      text-align: center;
      padding: 1em;
    }
    .tabs {
      display: flex;
      justify-content: center;
      background: #228B22;
    }
    .tab {
      padding: 1em;
      color: white;
      cursor: pointer;
      background: #228B22;
      border: none;
      font-weight: bold;
    }
    .tab:hover, .tab.active {
      background: #1a6b1a;
    }
    .tab-content {
      display: none;
      padding: 1.5em;
    }
    .tab-content.active {
      display: block;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1em;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 0.75em;
      text-align: left;
    }
    th {
      background-color: #228B22;
      color: white;
    }
    .form-row {
      margin-bottom: 1em;
    }
    input, select, textarea {
      padding: 0.5em;
      width: 100%;
      box-sizing: border-box;
    }
    button {
      background: #228B22;
      color: white;
      padding: 0.5em 1.5em;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #1a6b1a;
    }
  </style>
</head>
<body>

  <header>
    <h1>Admin Dashboard</h1>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="showTab('requestsTab')">Requests</button>
    <button class="tab" onclick="showTab('quotesTab')">Quotes</button>
    <button class="tab" onclick="showTab('invoicesTab')">Invoices</button>
    <button class="tab" onclick="showTab('profitTab')">Profit Calculator</button>
  </div>

  <main>
    <!-- ✅ Service Requests Tab -->
    <section id="requestsTab" class="tab-content active">
      <h2>Service Requests</h2>
      <table id="requestsTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Request</th>
            <th>Convert</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="4">Loading...</td></tr>
        </tbody>
      </table>
    </section>

    <!-- ✅ Quotes Tab -->
    <section id="quotesTab" class="tab-content">
      <h2>Create Quote</h2>
      <div class="form-row">
        <label>Customer Name</label>
        <input id="quoteName" type="text" required>
      </div>
      <div class="form-row">
        <label>Email</label>
        <input id="quoteEmail" type="email" required>
      </div>
      <div class="form-row">
        <label>Service Description</label>
        <textarea id="quoteService" rows="2" required></textarea>
      </div>
      <div class="form-row">
        <label>Amount ($)</label>
        <input id="quoteAmount" type="number" required>
      </div>
      <button onclick="createQuote()">Create Quote</button>

      <h2 style="margin-top:2em;">Quotes</h2>
      <table id="quotesTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Service</th>
            <th>Amount</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="4">Loading...</td></tr>
        </tbody>
      </table>
    </section>
    <!-- ✅ Invoices Tab -->
    <section id="invoicesTab" class="tab-content">
      <h2>Invoices</h2>
      <table id="invoicesTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Service</th>
            <th>Amount</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="4">Loading...</td></tr>
        </tbody>
      </table>
    </section>

    <!-- ✅ Profit Calculator Tab -->
    <section id="profitTab" class="tab-content">
      <h2>Auto Profit Calculator</h2>
      <div class="form-row"><label>Service Price ($)</label><input id="price" type="number"></div>
      <div class="form-row"><label>Labor Cost ($)</label><input id="labor" type="number"></div>
      <div class="form-row"><label>Gas Mileage ($)</label><input id="gas" type="number"></div>
      <div class="form-row"><label>Materials/Supplies ($)</label><input id="materials" type="number"></div>
      <button onclick="calculateProfit()">Calculate Profit</button>
      <h3 id="profitResult"></h3>
    </section>
  </main>

  <footer>
    &copy; 2025 Holliday's Lawn & Garden. All rights reserved.
  </footer>

  <script>
    const db = firebase.firestore();
    let currentUser;

    firebase.auth().onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        checkAdminAccess(user.uid);
      } else {
        window.location.href = "login.html";
      }
    });

    async function checkAdminAccess(uid) {
      const doc = await db.collection("users").doc(uid).get();
      if (doc.exists && doc.data().role === "admin") {
        loadRequests();
        loadQuotes();
        loadInvoices();
      } else {
        alert("Access denied.");
        firebase.auth().signOut();
      }
    }

    function showTab(id) {
      document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      event.target.classList.add("active");
    }

    function loadRequests() {
      const tbody = document.querySelector("#requestsTable tbody");
      db.collection("service_requests").orderBy("submittedAt", "desc").get().then(snapshot => {
        tbody.innerHTML = "";
        if (snapshot.empty) return tbody.innerHTML = "<tr><td colspan='4'>No requests.</td></tr>";
        snapshot.forEach(doc => {
          const r = doc.data();
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${r.fullName}</td>
            <td>${r.email}</td>
            <td>${r.notes}</td>
            <td><button onclick="convertToQuote('${r.fullName}', '${r.email}', \`${r.notes}\`)">Quote</button></td>
          `;
          tbody.appendChild(row);
        });
      });
    }

    function convertToQuote(name, email, notes) {
      document.getElementById("quoteName").value = name;
      document.getElementById("quoteEmail").value = email;
      document.getElementById("quoteService").value = notes;
      showTab('quotesTab');
    }

    function createQuote() {
      const name = document.getElementById("quoteName").value;
      const email = document.getElementById("quoteEmail").value;
      const service = document.getElementById("quoteService").value;
      const amount = parseFloat(document.getElementById("quoteAmount").value);

      db.collection("quotes").add({
        name, email, service, amount,
        status: "pending",
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(() => {
        alert("Quote created!");
        loadQuotes();
      });
    }

    function loadQuotes() {
      const tbody = document.querySelector("#quotesTable tbody");
      db.collection("quotes").orderBy("createdAt", "desc").get().then(snapshot => {
        tbody.innerHTML = "";
        snapshot.forEach(doc => {
          const q = doc.data();
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${q.name}</td>
            <td>${q.service}</td>
            <td>$${q.amount.toFixed(2)}</td>
            <td>
              <button onclick="convertQuoteToInvoice('${doc.id}', '${q.name}', '${q.email}', '${q.service}', ${q.amount})">Invoice</button>
            </td>
          `;
          tbody.appendChild(row);
        });
      });
    }

    function convertQuoteToInvoice(id, name, email, service, amount) {
      db.collection("invoices").add({
        name, customerEmail: email, service, amount,
        paid: false,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(() => {
        db.collection("quotes").doc(id).update({ status: "converted" });
        alert("Quote converted to invoice!");
        loadInvoices();
        loadQuotes();
      });
    }

    function loadInvoices() {
      const tbody = document.querySelector("#invoicesTable tbody");
      db.collection("invoices").orderBy("createdAt", "desc").get().then(snapshot => {
        tbody.innerHTML = "";
        snapshot.forEach(doc => {
          const i = doc.data();
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${i.name}</td>
            <td>${i.service}</td>
            <td>$${i.amount.toFixed(2)}</td>
            <td>${i.paid ? "✅ Paid" : "❌ Unpaid"}</td>
          `;
          tbody.appendChild(row);
        });
      });
    }

    function calculateProfit() {
      const price = parseFloat(document.getElementById("price").value) || 0;
      const labor = parseFloat(document.getElementById("labor").value) || 0;
      const gas = parseFloat(document.getElementById("gas").value) || 0;
      const materials = parseFloat(document.getElementById("materials").value) || 0;

      const cost = labor + gas + materials;
      const profit = price - cost;

      const result = profit >= 0
        ? `✅ Profit: $${profit.toFixed(2)}`
        : `❌ Loss: $${Math.abs(profit).toFixed(2)}`;

      document.getElementById("profitResult").innerText = result;
    }
  </script>

</body>
</html>
