<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>

  <!-- jsPDF and AutoTable libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <style>
    /* (same CSS you already have, keeping it clean) */
    .admin-container { max-width: 1200px; margin: 3em auto; padding: 2em; background: white; border-radius: 8px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1);}
    table { width: 100%; margin-top: 20px; border-collapse: collapse; }
    th, td { padding: 10px; border: 1px solid #ddd; }
    th { background-color: #228B22; color: white; }
    td.overdue { background-color: #ffcccc; }
    button { background-color: #228B22; color: white; padding: 0.5em 1em; margin: 5px; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background-color: #006400; }
    .logout { margin-top: 2em; display: inline-block; color: #228B22; font-weight: bold; cursor: pointer; text-decoration: none; }
    .logout:hover { text-decoration: underline; }
    input { padding: 0.5em; margin: 0.5em; width: 250px; }
  </style>
</head>

<body>

<header>
  <img src="Hollidays_Lawn_Garden_Logo.png" alt="Logo" style="max-height: 80px; margin-top: 10px;">
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="gallery.html">Gallery</a>
    <a href="login.html">Login</a>
  </nav>
  <p>Admin Dashboard</p>
</header>

<main>
  <div class="admin-container fade-in">
    <h2>Create Invoice</h2>
    <form id="invoiceForm" onsubmit="createInvoice(event)">
      <input type="text" id="invoiceEmail" placeholder="Customer Email" required><br>
      <input type="text" id="invoiceNumber" placeholder="Invoice Number" required><br>
      <input type="number" id="invoiceAmount" placeholder="Amount Due ($)" min="1" step="0.01" required><br>
      <input type="date" id="invoiceDueDate" required><br>
      <button type="submit">Create Invoice</button>
    </form>

    <div id="downloadPDF" style="margin-top: 20px; display:none;">
      <button onclick="downloadLatestPDF()">📄 Download Invoice PDF</button>
    </div>

    <h2>Invoices Due</h2>
    <table id="invoicesDueTable">
      <thead>
        <tr>
          <th>Customer</th>
          <th>Email</th>
          <th>Invoice #</th>
          <th>Amount</th>
          <th>Due Date</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <h2>Paid Invoices</h2>
    <table id="invoicesPaidTable">
      <thead>
        <tr>
          <th>Customer</th>
          <th>Email</th>
          <th>Invoice #</th>
          <th>Amount</th>
          <th>Due Date</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <a onclick="logout()" class="logout">Logout</a>
  </div>
</main>

<footer>
  &copy; 2025 Holliday's Lawn & Garden. All rights reserved.
</footer>

<script>
  const db = firebase.firestore();
  let latestInvoiceData = null;

  firebase.auth().onAuthStateChanged(user => {
    if (user) {
      const adminEmails = ["ronellbradley@bradleyvs.com"];
      if (!adminEmails.includes(user.email)) {
        alert("Access Denied");
        window.location.href = "index.html";
      } else {
        loadInvoices();
      }
    } else {
      window.location.href = "login.html";
    }
  });

  function createInvoice(event) {
    event.preventDefault();
    const email = document.getElementById('invoiceEmail').value;
    const number = document.getElementById('invoiceNumber').value;
    const amount = parseFloat(document.getElementById('invoiceAmount').value);
    const dueDate = document.getElementById('invoiceDueDate').value;

    latestInvoiceData = { email, number, amount, dueDate };

    db.collection("invoices").add({
      customerEmail: email,
      invoiceNumber: number,
      amountDue: amount,
      dueDate: dueDate,
      paid: false,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
      alert("✅ Invoice Created!");
      document.getElementById('invoiceForm').reset();
      document.getElementById('downloadPDF').style.display = 'block';
      loadInvoices();
    }).catch(error => {
      console.error("Error creating invoice:", error);
      alert("❌ Error creating invoice.");
    });
  }

  function loadInvoices() {
    const dueTbody = document.querySelector("#invoicesDueTable tbody");
    const paidTbody = document.querySelector("#invoicesPaidTable tbody");
    dueTbody.innerHTML = "";
    paidTbody.innerHTML = "";

    db.collection("invoices").orderBy("dueDate", "asc").get().then(snapshot => {
      snapshot.forEach(doc => {
        const data = doc.data();
        if (!data.paid) {
          dueTbody.innerHTML += `<tr>
            <td>${data.customerEmail.split('@')[0]}</td>
            <td>${data.customerEmail}</td>
            <td>${data.invoiceNumber}</td>
            <td>$${data.amountDue.toFixed(2)}</td>
            <td>${data.dueDate}</td>
            <td>Unpaid</td>
          </tr>`;
        } else {
          paidTbody.innerHTML += `<tr>
            <td>${data.customerEmail.split('@')[0]}</td>
            <td>${data.customerEmail}</td>
            <td>${data.invoiceNumber}</td>
            <td>$${data.amountDue.toFixed(2)}</td>
            <td>${data.dueDate}</td>
            <td>Paid</td>
          </tr>`;
        }
      });
    });
  }

  function downloadLatestPDF() {
    if (!latestInvoiceData) {
      alert("No invoice created yet.");
      return;
    }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(18);
    doc.text("Holliday's Lawn & Garden Invoice", 20, 20);

    doc.setFontSize(12);
    doc.text(`Customer: ${latestInvoiceData.email}`, 20, 40);
    doc.text(`Invoice Number: ${latestInvoiceData.number}`, 20, 50);
    doc.text(`Amount Due: $${latestInvoiceData.amount.toFixed(2)}`, 20, 60);
    doc.text(`Due Date: ${latestInvoiceData.dueDate}`, 20, 70);

    doc.autoTable({
      startY: 90,
      head: [['Service', 'Amount']],
      body: [['Lawn Care Services', `$${latestInvoiceData.amount.toFixed(2)}`]],
    });

    doc.setFontSize(10);
    doc.text("Thank you for your business!", 20, 200);

    doc.save(`Invoice_${latestInvoiceData.number}.pdf`);
  }

  function logout() {
    firebase.auth().signOut().then(() => {
      window.location.href = "login.html";
    }).catch((error) => {
      console.error("Logout error:", error);
      alert("❌ Error logging out.");
    });
  }
</script>

</body>
</html>
