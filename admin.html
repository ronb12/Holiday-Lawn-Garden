<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="firebase-init.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f9f4; }
    header, footer { background: #228B22; color: white; padding: 1em; }
    .tabs { display: flex; justify-content: center; background: #228B22; }
    .tab { padding: 1em; color: white; cursor: pointer; background: #228B22; border: none; font-weight: bold; }
    .tab:hover, .tab.active { background: #1a6b1a; }
    .tab-content { display: none; padding: 1.5em; }
    .tab-content.active { display: block; }
    table { width: 100%; border-collapse: collapse; margin-top: 1em; }
    th, td { border: 1px solid #ddd; padding: 0.75em; text-align: left; }
    th { background-color: #228B22; color: white; }
    input, textarea { width: 100%; padding: 0.5em; }
    button { background: #228B22; color: white; padding: 0.5em 1em; border: none; cursor: pointer; }
    button:hover { background: #1a6b1a; }
  </style>
</head>
<body>

<header style="display:flex; justify-content:space-between; align-items:center;">
  <h1 style="margin: 0 1em;">Admin Dashboard</h1>
  <div style="position:relative; margin-right: 1em;">
    <button onclick="toggleNotifications()" style="background:none; border:none; color:white; font-size:1.2em; position:relative;">
      🔔 Messages <span id="notifBadge" style="background:red; color:white; font-size:0.75em; border-radius:50%; padding:2px 6px; position:absolute; top:-5px; right:-10px; display:none;">0</span>
    </button>
    <button onclick="logout()" style="background-color:#ffffff22; color:white; border:1px solid white; padding:0.5em 1em; margin-left:1em;">Logout</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('requestsTab')">Requests</button>
  <button class="tab" onclick="showTab('quotesTab')">Quotes</button>
  <button class="tab" onclick="showTab('invoicesTab')">Invoices</button>
  <button class="tab" onclick="showTab('profitTab')">Profit Calculator</button>
</div>

<main>
  <section id="requestsTab" class="tab-content active">
    <h2>Service Requests</h2>
    <table id="requestsTable">
      <thead><tr><th>Name</th><th>Email</th><th>Request</th><th>Actions</th></tr></thead>
      <tbody><tr><td colspan="4">Loading...</td></tr></tbody>
    </table>
  </section>
</main>

<footer>
  &copy; 2025 Holliday's Lawn & Garden. All rights reserved.
</footer>
<script>
const db = firebase.firestore();
let currentUser;

firebase.auth().onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    checkAdminAccess(user.uid);
  } else {
    window.location.href = "login.html";
  }
});

async function checkAdminAccess(uid) {
  const doc = await db.collection("users").doc(uid).get();
  if (doc.exists && doc.data().role === "admin") {
    loadRequests();
    loadQuotes();
    loadInvoices();
    loadNotifications();
  } else {
    alert("Access denied.");
    firebase.auth().signOut();
  }
}

function logout() {
  firebase.auth().signOut();
}

function showTab(id) {
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  event.target.classList.add("active");
}

function loadRequests() {
  const tbody = document.querySelector("#requestsTable tbody");
  db.collection("service_requests").orderBy("submittedAt", "desc").onSnapshot(snapshot => {
    tbody.innerHTML = "";
    if (snapshot.empty) {
      tbody.innerHTML = "<tr><td colspan='4'>No requests found</td></tr>";
      return;
    }
    snapshot.forEach(doc => {
      const r = doc.data();
      const badge = r.hasUnreadFromCustomer ? "🔴 New Message" : "";
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${r.fullName || 'N/A'}</td>
        <td>${r.email || 'N/A'}</td>
        <td>${r.notes || ''} ${badge ? `<br><small>${badge}</small>` : ""}</td>
        <td><button onclick="openChat('${doc.id}')">💬 Chat</button></td>
      `;
      tbody.appendChild(row);
    });
  });
}

// Include similar functions for:
// ✅ loadQuotes()
// ✅ createQuote()
// ✅ convertQuoteToInvoice()
// ✅ exportQuotesPDF()
// ✅ loadInvoices()
// ✅ createManualInvoice()
// ✅ exportInvoicesPDF()
// ✅ toggleNotifications()
// ✅ markAllAsRead()
// ✅ openChat(), loadChatMessages(), sendChatMessage()
// ✅ calculateProfit()

// You can find these in previous responses or I can paste them here next.

</script>
</body>
</html>
