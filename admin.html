
<!-- Full Updated Admin Dashboard with All Features - Holliday's Lawn & Garden -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - Holliday's Lawn & Garden</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f9f4;
      margin: 0;
    }
    header, footer {
      background: #228B22;
      color: white;
      text-align: center;
      padding: 1em;
    }
    .admin-container {
      max-width: 1100px;
      margin: auto;
      padding: 2em;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    h2 {
      color: #228B22;
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ccc;
      text-align: left;
    }
    th {
      background: #228B22;
      color: white;
    }
    .overdue {
      background: #ffe5e5;
    }
    input, select {
      padding: 0.5em;
      margin: 0.3em 0;
      width: 100%;
    }
    button {
      background: #228B22;
      color: white;
      border: none;
      padding: 0.5em 1em;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #006400;
    }
    .logout {
      margin-top: 1em;
      color: #228B22;
      text-decoration: underline;
      cursor: pointer;
    }
    .service-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .service-row input, .service-row select {
      flex: 1;
    }
  </style>
</head>
<body>
<header><h1>Admin Dashboard</h1></header>
<main class="admin-container">
  <h2>Create Invoice</h2>
  <form id="invoiceForm" onsubmit="createInvoice(event)">
    <input type="email" id="invoiceEmail" placeholder="Customer Email" required>
    <input type="text" id="invoiceNumber" placeholder="Invoice Number" required>
    <input type="date" id="invoiceDueDate" required><br>
    <div id="serviceList"></div>
    <button type="button" onclick="addServiceRow()">+ Add Service</button>
    <p><strong>Total: $<span id="totalAmount">0.00</span></strong></p>
    <button type="submit">Create Invoice</button>
  </form>

  <h2>Service Requests</h2>
  <table id="serviceRequestsTable">
    <thead>
      <tr><th>Name</th><th>Email</th><th>Request</th><th>Status</th><th>Update</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>Invoices Due</h2>
  <table id="invoicesDueTable">
    <thead>
      <tr><th>Customer</th><th>Email</th><th>Invoice #</th><th>Amount</th><th>Due Date</th><th>Status</th><th>Actions</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>Paid Invoices</h2>
  <table id="invoicesPaidTable">
    <thead>
      <tr><th>Customer</th><th>Email</th><th>Invoice #</th><th>Amount</th><th>Due Date</th><th>Status</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <a onclick="logout()" class="logout">Logout</a>
</main>
<footer id="footer"></footer>

<!-- Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="firebase-init.js"></script>
<script src="admin-functions.js"></script>
<script>
document.getElementById("footer").innerHTML = "&copy; " + new Date().getFullYear() + " Holliday's Lawn & Garden. All rights reserved.";
</script>
</body>
</html>
