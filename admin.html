<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body {
      background: #f4f9f4;
      font-family: Arial, sans-serif;
      margin: 0;
    }
    header {
      background-color: #228B22;
      padding: 1em;
      color: white;
      text-align: center;
    }
    .admin-container {
      max-width: 1200px;
      margin: 3em auto;
      background: white;
      padding: 2em;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
    }
    th {
      background: #228B22;
      color: white;
    }
    .logout {
      margin-top: 2em;
      color: #228B22;
      text-decoration: underline;
      cursor: pointer;
    }
    button {
      background: #228B22;
      color: white;
      padding: 0.5em 1em;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover {
      background: #006400;
    }
    .overdue {
      background: #ffe5e5;
    }
  </style>
</head>
<body>
<header>
  <h1>Admin Dashboard</h1>
</header>
<main class="admin-container">
  <h2>Service Requests</h2>
  <table id="requestsTable">
    <thead>
      <tr>
        <th>Name</th><th>Email</th><th>Service</th><th>Date</th><th>Notes</th><th>Status</th><th>Action</th>
      </tr>
    </thead>
    <tbody><tr><td colspan="7">Loading...</td></tr></tbody>
  </table>
  <h2>Create Invoice</h2>
  <form id="invoiceForm" onsubmit="createInvoice(event)">
    <input type="email" id="invoiceEmail" placeholder="Customer Email" required><br>
    <input type="text" id="invoiceNumber" placeholder="Invoice Number" required><br>
    <input type="text" id="serviceDescription" placeholder="Service Description" required><br>
    <input type="number" id="serviceAmount" placeholder="Amount ($)" required><br>
    <input type="date" id="invoiceDueDate" required><br>
    <button type="submit">Create Invoice</button>
  </form>
  <h2>Invoices Due</h2>
  <table id="invoicesDueTable">
    <thead>
      <tr>
        <th>Customer</th><th>Email</th><th>Invoice #</th><th>Amount</th><th>Due Date</th><th>Status</th><th>Actions</th>
      </tr>
    </thead>
    <tbody><tr><td colspan="7">Loading...</td></tr></tbody>
  </table>
  <h2>Paid Invoices</h2>
  <table id="invoicesPaidTable">
    <thead>
      <tr>
        <th>Customer</th><th>Email</th><th>Invoice #</th><th>Amount</th><th>Due Date</th><th>Status</th>
      </tr>
    </thead>
    <tbody><tr><td colspan="6">Loading...</td></tr></tbody>
  </table>
  <a onclick="logout()" class="logout">Logout</a>
</main>
<footer style="text-align:center; margin-top: 2em;">&copy; 2025 Holliday's Lawn & Garden</footer>
<script>// Firebase logic will be handled here</script>
</body>
</html>
