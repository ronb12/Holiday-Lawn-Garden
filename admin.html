<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - Holliday's Lawn & Garden</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f9f4;
      margin: 0;
    }
    header, footer {
      background: #228B22;
      color: white;
      text-align: center;
      padding: 1em;
    }
    .admin-container {
      max-width: 1200px;
      margin: auto;
      padding: 2em;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .invoice-form {
      background: #f9f9f9;
      padding: 1em;
      border-radius: 8px;
      margin-bottom: 2em;
    }
    .invoice-form h3 {
      margin-top: 0;
    }
    .service-line {
      display: flex;
      gap: 1em;
      margin-bottom: 1em;
    }
    .service-line select, .service-line input {
      flex: 1;
      padding: 0.5em;
    }
    button.add-service {
      margin-top: 1em;
      background-color: #006400;
      color: white;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ccc;
    }
    th {
      background: #228B22;
      color: white;
    }
    .logout {
      display: inline-block;
      margin-top: 1em;
      color: #228B22;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header><h1>Admin Dashboard</h1></header>
  <main class="admin-container">
    <div class="invoice-form">
      <h3>Create Invoice</h3>
      <form id="invoiceForm" onsubmit="createInvoice(event)">
        <input type="email" id="invoiceEmail" placeholder="Customer Email" required><br>
        <input type="text" id="invoiceNumber" placeholder="Invoice Number" required><br>
        <div id="servicesContainer">
          <div class="service-line">
            <select class="service-name">
              <option value="">Select service</option>
              <option value="Lawn Mowing">Lawn Mowing</option>
              <option value="Shrub Trimming">Shrub Trimming</option>
              <option value="Pressure Washing">Pressure Washing</option>
              <option value="">-- Other --</option>
            </select>
            <input type="text" class="service-desc" placeholder="Custom description">
            <input type="number" class="service-amount" placeholder="Amount" min="1" step="0.01">
          </div>
        </div>
        <button type="button" class="add-service" onclick="addServiceLine()">+ Add Service</button><br><br>
        <input type="date" id="invoiceDueDate" required><br>
        <button type="submit">Create Invoice</button>
      </form>
    </div>
  </main>
  <footer>&copy; 2025 Holliday's Lawn & Garden</footer>
  <script>
    function addServiceLine() {
      const container = document.getElementById('servicesContainer');
      const div = document.createElement('div');
      div.className = 'service-line';
      div.innerHTML = \`
        <select class="service-name">
          <option value="">Select service</option>
          <option value="Lawn Mowing">Lawn Mowing</option>
          <option value="Shrub Trimming">Shrub Trimming</option>
          <option value="Pressure Washing">Pressure Washing</option>
          <option value="">-- Other --</option>
        </select>
        <input type="text" class="service-desc" placeholder="Custom description">
        <input type="number" class="service-amount" placeholder="Amount" min="1" step="0.01">
      \`;
      container.appendChild(div);
    }
    function createInvoice(e) {
      e.preventDefault();
      alert("Invoice Created - Firebase save logic goes here.");
    }
  </script>
</body>
</html>
